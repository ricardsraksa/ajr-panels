<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Log a lead · AJR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0C; --surface:#141418; --surface2:#1C1C22; --border:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.12);
  --text:#F5F5F7; --muted:#8B8B95; --faint:#5A5A64;
  --accent:#38BDF8; --accent-dim:rgba(56,189,248,.14);
  --go:#34D399; --go-ink:#052E22; --amber:#FBBF24; --red:#F87171;
  --e1:#38BDF8; --e2:#818CF8; --e3:#C084FC; --booked:#34D399; --archive:#71717A;
  --r:14px; --r-lg:18px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --shadow:0 20px 50px -12px rgba(0,0,0,.7);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
button,input,select,textarea{font:inherit;color:inherit;letter-spacing:inherit}
button{cursor:pointer;touch-action:manipulation;border:none;background:none}
a{color:var(--accent);cursor:pointer;text-decoration:none}
:focus{outline:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.mono{font-variant-numeric:tabular-nums;letter-spacing:0}
.opt{color:var(--muted);font-weight:400;font-size:.85em}
.small{font-size:.8rem}
.demo-banner{background:var(--amber);color:#241a00;text-align:center;font-weight:600;font-size:.75rem;letter-spacing:.04em;padding:5px 12px}

.wrap{max-width:900px;margin:0 auto;padding:20px 18px 60px}
@media(min-width:640px){.wrap{padding:26px 24px 72px}}

/* header */
.hdr{display:flex;align-items:center;flex-wrap:wrap;gap:10px 14px;padding:2px 0 20px}
.hdr h1{font-size:1.18rem;font-weight:600;letter-spacing:-.02em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none;transition:background-color .25s}
.dot.ok{background:var(--go);box-shadow:0 0 0 3px rgba(52,211,153,.18)}
.dot.err{background:var(--red);box-shadow:0 0 0 3px rgba(248,113,113,.18)}
.hdr-spacer{flex:1}
.hdr-meta{color:var(--faint);font-size:.8rem;font-variant-numeric:tabular-nums;white-space:nowrap}
.hdr-meta strong{color:var(--muted);font-weight:600}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--muted);transition:.18s}
.icon-btn:hover:not(:disabled){color:var(--text);background:var(--surface2);border-color:var(--border-2)}
.icon-btn:disabled{opacity:.4;cursor:not-allowed}
.icon-btn svg{width:18px;height:18px}
.icon-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:18px}
.tab{min-height:44px;padding:0 20px;border-radius:11px;border:1px solid transparent;color:var(--muted);font-weight:600;transition:.16s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);background:var(--surface2);border-color:var(--border)}
.tab .cnt{font-variant-numeric:tabular-nums;font-size:.78rem;margin-left:6px;color:var(--amber)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:18px}
@media(min-width:640px){.card{padding:24px}}

/* setup / skeleton / error */
.setup-card{max-width:520px;margin:44px auto}
.setup-card p{color:var(--muted);font-size:.88rem;margin-bottom:16px}
.setup-field{display:block;margin-bottom:14px;font-size:.8rem;font-weight:500;color:var(--muted)}
.setup-field input{display:block;width:100%;margin-top:7px;min-height:48px;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:16px}
.setup-field input:focus{border-color:var(--border-2)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;padding:0 22px;border-radius:var(--r);background:var(--go);color:var(--go-ink);font-weight:700;transition:.16s}
.btn-primary:hover:not(:disabled){filter:brightness(1.06)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.skel-row{height:16px;border-radius:7px;margin-bottom:14px;background:linear-gradient(90deg,var(--surface2) 25%,#26262e 45%,var(--surface2) 65%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
@keyframes shimmer{from{background-position:100% 0}to{background-position:0 0}}
.skel-row.w60{width:60%}.skel-row.w40{width:40%}.skel-row.big{height:52px}
.load-error{text-align:center}
.load-error p{color:var(--muted);margin-bottom:14px}

/* search + autocomplete */
.search-wrap{position:relative}
.search-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--faint);pointer-events:none}
.search-input{width:100%;min-height:56px;padding:12px 16px 12px 48px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:1.05rem;font-weight:500;transition:border-color .18s}
.search-input::placeholder{color:var(--faint);font-weight:400}
.search-input:focus{border-color:var(--border-2)}
.ac-list{position:absolute;z-index:30;top:calc(100% + 6px);left:0;right:0;list-style:none;background:var(--surface2);border:1px solid var(--border-2);border-radius:var(--r);overflow:hidden;overflow-y:auto;max-height:336px;box-shadow:var(--shadow)}
.ac-item{display:grid;grid-template-columns:1fr auto auto;gap:3px 12px;align-items:center;padding:11px 15px;min-height:46px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .13s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--accent-dim)}
.ac-handle{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-meta{grid-column:1;color:var(--muted);font-size:.75rem;display:flex;gap:10px}
.ac-date{grid-column:3;grid-row:1 / span 2;font-variant-numeric:tabular-nums;font-size:.75rem;color:var(--faint);text-align:right}
.badge{display:inline-block;grid-column:2;grid-row:1 / span 2;padding:2px 10px;border-radius:999px;border:1px solid;font-size:.7rem;font-weight:600;white-space:nowrap}
.temp-hot{color:var(--amber)}

/* armed chip */
.arm-chip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;padding:11px 15px;min-height:46px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);font-size:.9rem}
.arm-chip.is-new{border-color:rgba(52,211,153,.4)}
.arm-chip.is-new .tag-new{color:var(--go-ink);background:var(--go);padding:2px 9px;border-radius:999px;font-size:.68rem;font-weight:700;letter-spacing:.04em}
.arm-chip.is-hint{border-style:dashed;color:var(--muted)}
.arm-chip .chip-meta{color:var(--muted)}
.tag-new{color:var(--go-ink);background:var(--go);padding:2px 9px;border-radius:999px;font-size:.68rem;font-weight:700}
.ig-mini{color:var(--accent);font-size:.8rem;white-space:nowrap}

/* stage buttons */
.stage-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
.stage-btn{flex:1 1 118px;min-height:50px;padding:8px 14px;border-radius:var(--r);border:1px solid;font-weight:600;font-size:.94rem;background:transparent;transition:.16s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.stage-btn:active:not(:disabled){transform:scale(.98)}
.stage-btn:disabled{opacity:.4;cursor:not-allowed}
.stage-btn kbd{font-family:inherit;font-size:.66rem;opacity:.6;font-weight:500}
.stage-e1{color:var(--e1);border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.08)}
.stage-e1:hover:not(:disabled){background:rgba(56,189,248,.18)}
.stage-e2{color:var(--e2);border-color:rgba(129,140,248,.4);background:rgba(129,140,248,.08)}
.stage-e2:hover:not(:disabled){background:rgba(129,140,248,.18)}
.stage-e3{color:var(--e3);border-color:rgba(192,132,252,.4);background:rgba(192,132,252,.08)}
.stage-e3:hover:not(:disabled){background:rgba(192,132,252,.18)}
.stage-booked{color:var(--go-ink);border-color:var(--go);background:var(--go)}
.stage-booked:hover:not(:disabled){filter:brightness(1.06)}
.stage-archive{color:#CBD5E1;border-color:rgba(113,113,122,.5);background:rgba(113,113,122,.14)}
.stage-archive:hover:not(:disabled){background:rgba(113,113,122,.28)}
.stage-row-secondary{margin-top:9px}
.stage-sec{flex:0 1 auto;min-height:44px;font-size:.85rem;font-weight:500;color:var(--muted);border-color:var(--border);background:transparent}
.stage-sec:hover:not(:disabled){color:var(--text);border-color:var(--border-2)}
.stage-btn.preselect{outline:2px solid var(--accent);outline-offset:2px}

/* status chips + temp + note */
.chips-set{border:none;margin-top:20px}
.chips-set legend{font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{min-height:42px;padding:6px 15px;border-radius:999px;border:1px solid var(--border);color:var(--muted);font-size:.85rem;font-weight:500;background:transparent;transition:.16s}
.chip:hover:not(:disabled){color:var(--text);border-color:var(--border-2)}
.chip[aria-pressed="true"]{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.temp-row{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
.temp-row label{font-size:.8rem;font-weight:500;color:var(--muted)}
.temp-row select{min-height:44px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:.9rem;cursor:pointer}
.temp-row select:focus{border-color:var(--border-2)}
.note-input{flex:1 1 200px;min-height:44px;padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:.9rem}
.note-input:focus{border-color:var(--border-2)}

/* log button */
.log-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center}
.btn-log{flex:1 1 260px;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;padding:0 20px;border-radius:var(--r);background:var(--accent);color:#04121C;font-weight:700;font-size:.96rem;transition:.16s}
.btn-log:hover:not(:disabled){filter:brightness(1.06)}
.btn-log:disabled{opacity:.35;cursor:not-allowed}
.btn-log svg{width:19px;height:19px}
.btn-log kbd{font-family:inherit;font-size:.68rem;opacity:.6}

/* voice */
.voice-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.mic-btn{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;flex:none;border-radius:50%;background:var(--go);color:var(--go-ink);border:none;transition:.18s;box-shadow:0 4px 14px -4px rgba(52,211,153,.5)}
.mic-btn svg{width:24px;height:24px}
.mic-btn:hover{filter:brightness(1.06)}
.mic-btn.listening{background:var(--red);color:#fff;box-shadow:none;animation:pulse 1.3s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}50%{box-shadow:0 0 0 12px rgba(248,113,113,0)}}
.voice-hint{color:var(--faint);font-size:.84rem}

/* confirm bar */
.confirm-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--surface2);border:1px solid var(--border-2);border-radius:var(--r);padding:14px 18px;margin-bottom:18px}
.confirm-text{flex:1 1 240px;font-size:.94rem}
.confirm-text .mono{font-weight:600}
.confirm-actions{display:flex;gap:9px;align-items:center}
.btn-cancel{min-height:46px;padding:0 18px;border-radius:11px;border:1px solid var(--border);color:var(--muted);transition:.15s}
.btn-cancel:hover{color:var(--text);border-color:var(--border-2)}
kbd{font-family:inherit;font-size:.72rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2px 6px;color:var(--muted)}

/* recent */
.recent-list{list-style:none}
.recent-list .empty{color:var(--faint);font-size:.88rem}
.recent-item{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 0;border-top:1px solid var(--border);font-size:.88rem}
.recent-item:first-child{border-top:none}
.recent-row-num{font-variant-numeric:tabular-nums;font-size:.74rem;color:var(--faint);flex:none}
.recent-handle{font-weight:600}
.recent-extra{color:var(--muted);font-size:.82rem}
.recent-mode{margin-left:auto;font-size:.66rem;font-weight:700;padding:2px 9px;border-radius:7px}
.recent-mode.updated{color:var(--accent);background:var(--accent-dim)}
.recent-mode.created{color:var(--go);background:rgba(52,211,153,.12)}
.recent-time{font-variant-numeric:tabular-nums;font-size:.74rem;color:var(--faint)}

/* queue */
.q-filters{display:flex;gap:14px;align-items:center;margin-bottom:12px;flex-wrap:wrap;color:var(--muted);font-size:.85rem}
.q-filters label{display:inline-flex;align-items:center;gap:6px;min-height:40px;cursor:pointer}
.q-row{display:grid;grid-template-columns:1fr auto;gap:2px 12px;padding:12px 4px;border-top:1px solid var(--border);align-items:center}
.q-row:first-child{border-top:none}
.q-main{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.q-handle{font-weight:600;cursor:pointer;background:none;border:none;color:var(--text);padding:4px 2px;min-height:40px;display:inline-flex;align-items:center}
.q-handle:hover{color:var(--accent)}
.q-sub{grid-column:1;color:var(--muted);font-size:.78rem;display:flex;gap:10px;flex-wrap:wrap}
.q-actions{grid-column:2;grid-row:1 / span 2;display:flex;gap:8px;align-items:center}
.q-log{min-height:40px;padding:0 14px;border-radius:9px;border:1px solid rgba(56,189,248,.4);color:var(--accent);font-weight:600;font-size:.82rem;white-space:nowrap;transition:.15s}
.q-log:hover:not(:disabled){background:var(--accent-dim)}
.q-log:disabled{opacity:.4;cursor:not-allowed}
.q-ig{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);border-radius:9px;border:1px solid var(--border)}
.q-ig:hover{color:var(--text);border-color:var(--border-2)}
.q-ig svg{width:16px;height:16px}
.days{font-variant-numeric:tabular-nums;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid}
.days.fresh{color:var(--go);border-color:rgba(52,211,153,.4)}
.days.warn{color:var(--amber);border-color:rgba(251,191,36,.45)}
.days.late{color:var(--red);border-color:rgba(248,113,113,.45)}
.qual-tag{font-size:.68rem;font-weight:600;color:var(--e3);border:1px solid rgba(192,132,252,.4);border-radius:999px;padding:1px 8px;white-space:nowrap}

/* toasts */
.toasts{position:fixed;z-index:60;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:9px;width:min(460px,calc(100vw - 32px))}
.toast{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border-2);border-radius:var(--r);padding:13px 16px;font-size:.88rem;box-shadow:var(--shadow);animation:rise .24s cubic-bezier(.2,.8,.2,1)}
.toast.ok{border-left:3px solid var(--go)}
.toast.err{border-left:3px solid var(--red)}
.toast .msg{flex:1}
.toast .mono{font-weight:600}
.toast-act{min-height:38px;padding:0 14px;border-radius:9px;border:1px solid var(--border-2);color:var(--accent);font-weight:600;font-size:.84rem;flex:none;transition:.15s}
.toast-act:hover{background:var(--accent-dim)}
.toast-x{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;color:var(--faint);flex:none;border-radius:8px}
.toast-x:hover{color:var(--text)}
.toast-x svg{width:15px;height:15px}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
kbd.hint{margin-left:6px;opacity:.6}
@media(max-width:640px){.search-input,.note-input,.deal-filter{font-size:16px}}
.deal-filter{width:100%;min-height:46px;padding:10px 14px;margin-bottom:10px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:.9rem}
.deal-filter:focus{border-color:var(--border-2)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="demo-banner" id="demoBanner" hidden>DEMO — writes go nowhere</div>

<div class="wrap">
  <header class="hdr">
    <span class="dot" id="connDot" role="status" aria-label="Connecting"></span>
    <h1>Log a lead</h1>
    <span class="hdr-spacer"></span>
    <span class="hdr-meta">Sheet date <strong class="mono" id="metaDate">—</strong></span>
    <span class="hdr-meta"><strong id="metaCount">—</strong> leads</span>
    <a class="hdr-meta" id="linkWorklist" href="worklist.html" style="color:var(--accent)">Worklist →</a>
    <button class="icon-btn" id="gearBtn" aria-label="Edit connection settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 0 1 1.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.559.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.894.149c-.424.07-.764.383-.929.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 0 1-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.398.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 0 1-.12-1.45l.527-.737c.25-.35.272-.806.108-1.204-.165-.397-.506-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.108-1.204l-.526-.738a1.125 1.125 0 0 1 .12-1.45l.773-.773a1.125 1.125 0 0 1 1.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894Z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
    </button>
    <button class="icon-btn" id="refreshBtn" aria-label="Refresh leads from the sheet" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
    </button>
  </header>

  <section class="card setup-card" id="setupCard" hidden>
    <h2>Connect to the CRM</h2>
    <p>Paste your web-app URL and key. Stored only on this device.</p>
    <label class="setup-field">Web app URL
      <input id="setupUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off" spellcheck="false">
    </label>
    <label class="setup-field">API key
      <input id="setupKey" type="text" autocomplete="off" spellcheck="false">
    </label>
    <button class="btn-primary" id="setupSave">Save &amp; connect</button>
    <p class="small" style="margin-top:14px">No credentials yet? <a href="?demo=1">Open the demo</a> instead.</p>
  </section>

  <section class="card" id="skeleton" hidden aria-label="Loading leads">
    <div class="skel-row big"></div>
    <div class="skel-row w60"></div>
    <div class="skel-row"></div>
    <div class="skel-row w40"></div>
  </section>

  <section class="card load-error" id="loadError" hidden>
    <p id="loadErrorMsg">Couldn't load leads.</p>
    <button class="btn-primary" id="loadRetry">Retry</button>
  </section>

  <main id="app" hidden>
    <div id="viewUpdate">
    <section class="card">
      <div class="search-wrap">

<script src="./parser.js?v=20260707"></script>
<script>
(function () {
'use strict';

var $ = function (id) { return document.getElementById(id); };

var PRIMARY = ['Engaged 1', 'Engaged 2', 'Engaged 3', 'Booked', 'Archive'];
var SECONDARY = ['No Reply', 'Closed'];
var ALL_STAGES = PRIMARY.concat(SECONDARY);
var LEVEL_COLORS = {
  'Engaged 1': '#38BDF8', 'Engaged 2': '#818CF8', 'Engaged 3': '#C084FC',
  'Booked': '#22C55E', 'Archive': '#64748B', 'No Reply': '#94A3B8', 'Closed': '#F8FAFC'
};
var LS_URL = 'ajr_api_url', LS_KEY = 'ajr_api_key';

var state = {
  demo: false,
  url: '', key: '',
  leads: [],                 // raw bootstrap rows
  byHandle: new Map(),       // handle -> bottom-most lead row (mirrors server duplicate rule)
  unique: [],                // deduped leads in sheet order
  statuses: [], temps: [],
  serverDate: '',
  armed: null,               // {mode:'existing',lead} | {mode:'new',handle} | {mode:'hint'}
  selectedStatus: '',
  pending: null,             // parsed utterance awaiting confirm
  busy: false,
  acResults: [], acIndex: -1, acOpen: false,
  listening: false
};

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
function squash(s) { return String(s || '').replace(/[\s._]/g, ''); }
function newReqId() { return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function daysSince(dmy) {
  var d = CRMParse.parseDMY(dmy);
  var ref = CRMParse.parseDMY(state.serverDate) || new Date();
  if (!d) return null;
  return Math.round((ref - d) / 864e5);
}
function daysBadge(dmy) {
  var n = daysSince(dmy);
  if (n === null) return '<span class="days late">never</span>';
  var cls = n <= 7 ? 'fresh' : n <= 14 ? 'warn' : 'late';
  return '<span class="days ' + cls + '">' + (n <= 0 ? 'today' : n + 'd ago') + '</span>';
}
function canonIn(list, v) {
  if (!v) return null;
  var t = String(v).trim().toLowerCase();
  for (var i = 0; i < list.length; i++) if (list[i].toLowerCase() === t) return list[i];
  return null;
}

/* ---------- toasts ---------- */
function toast(opts) {
  var el = document.createElement('div');
  el.className = 'toast ' + (opts.type || '');
  var msg = document.createElement('span');
  msg.className = 'msg';
  msg.innerHTML = opts.html;
  el.appendChild(msg);
  if (opts.action) {
    var act = document.createElement('button');
    act.className = 'toast-act';
    act.textContent = opts.action.label;
    act.addEventListener('click', function () { el.remove(); opts.action.fn(); });
    el.appendChild(act);
  }
  var x = document.createElement('button');
  x.className = 'toast-x';
  x.setAttribute('aria-label', 'Dismiss');
  x.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 18 18 6M6 6l12 12"/></svg>';
  x.addEventListener('click', function () { el.remove(); });
  el.appendChild(x);
  $('toasts').appendChild(el);
  if (!opts.sticky) setTimeout(function () { el.remove(); }, opts.ttl || 4500);
}

/* ---------- mock adapter (?demo=1 or saved url "mock") ---------- */
function makeMock() {
  var today = CRMParse.formatDate(new Date());
  function ago(n) { var d = new Date(); d.setDate(d.getDate() - n); return CRMParse.formatDate(d); }
  function L(h, url, level, status, temp, qual, last) {
    return { h: h, url: url, level: level, status: status, temp: temp, qual: qual, lastContact: last };
  }
  var IG = 'https://www.instagram.com/';
  var leads = [
    L('oscarwxng', IG + 'oscarwxng/?igsh=MzRlODBiNWFlZA==', 'Engaged 2', 'Story reply', 'Warm Lead', 'Qualified 2', ago(4)),
    L('fitwithmarco', IG + 'fitwithmarco/', 'Engaged 1', 'LM Sent', 'Cold Lead', '', ago(17)),
    L('lena.builds', IG + 'lena.builds/', 'Booked', 'Call Pitched', 'Hot Lead', 'Qualified 3', ago(1)),
    L('thedtcguy', IG + 'thedtcguy/?utm_source=ig_web', 'No Reply', 'Follow up Sent', 'Cold Lead', '', ago(43)),
    L('sofia_scales', IG + 'sofia_scales/', 'Engaged 1', "Haven't read", 'Warm Lead', '', ago(10)),
    L('bram.vandijk', IG + 'bram.vandijk/', 'Archive', 'Left on read', 'Cold Lead', 'Unqualified', ago(90)),
    L('ecom.aiden', IG + 'ecom.aiden/', 'Engaged 3', 'Mid convo', 'Hot Lead', 'Qualified 2', ago(3)),
    L('kayla.growth', IG + 'kayla.growth/', 'Engaged 2', 'Meme sent', 'Warm Lead', '', ago(6)),
    L('marcus_media', IG + 'marcus_media/', 'Closed', 'End of convo', 'Hot Lead', 'Qualified 3', ago(22)),
    L('couldnt find', '', '', '', 'Cold Lead', '', ''),
    L('nina.creates', IG + 'nina.creates/', 'Engaged 1', 'Lifestyle sent', 'Warm Lead', '', ago(8)),
    L('fitwithmarco', IG + 'fitwithmarco/', 'Engaged 3', 'Call Pitched', 'Warm Lead', 'Qualified 1', ago(2)),
    L('jordan.flips', IG + 'jordan.flips/', 'No Reply', 'Follow up Sent', 'Cold Lead', '', ago(51))
  ];
  var closing = [
    { row: 2, name: 'Lena Builds', link: IG + 'lena.builds/', status: 'Discovery Call', meeting: ago(-1), followup: '', qual: 'Qualified 3', cash: '', hasFF: false },
    { row: 3, name: 'Marcus Media', link: IG + 'marcus_media/', status: 'Closed', meeting: ago(20), followup: '', qual: 'Qualified 3', cash: 3000, hasFF: true }
  ];
  var STATUSES = ['Follow up Sent', "Haven't read", 'End of convo', 'Mid convo', 'Lifestyle sent',
    'Left on read', 'Story reply', 'Call Pitched', 'Meme sent', 'LM Sent'];
  var TEMPS = ['Warm Lead', 'Cold Lead', 'Hot Lead'];

  return function (action, payload) {
    return new Promise(function (resolve, reject) {
      setTimeout(function () {
        if (action === 'ping') return resolve({ ok: true, time: new Date().toISOString() });
        if (action === 'bootstrap') {
          return resolve({
            ok: true, serverDate: today, stages: ALL_STAGES.slice(), statuses: STATUSES.slice(),
            temps: TEMPS.slice(),
            leads: leads.map(function (l) { return Object.assign({}, l); }),
            closing: closing.map(function (c) { return Object.assign({}, c); })
          });
        }
        if (action === 'setterUpdate') {
          var h = CRMParse.normalizeHandle(payload.handle);
          if (!h) return reject(new Error('bad handle'));
          var idxs = [];
          leads.forEach(function (l, i) { if (l.h === h) idxs.push(i); });
          if (idxs.length) {
            var i = idxs[idxs.length - 1];
            var prev = { level: leads[i].level, status: leads[i].status, temp: leads[i].temp, lastContact: leads[i].lastContact };
            if (payload.stage) leads[i].level = payload.stage;
            if (payload.status) leads[i].status = payload.status;
            if (payload.temp) leads[i].temp = payload.temp;
            leads[i].lastContact = today;
            return resolve({ ok: true, mode: 'updated', row: i + 2, handle: h, duplicates: idxs.length, prev: prev,
              closingRow: payload.stage === 'Booked' ? true : undefined });
          }
          if (!payload.stage) return reject(new Error('stage required to create'));
          leads.push(L(h, IG + h + '/', payload.stage, payload.status || '', payload.temp || 'Warm Lead', '', today));
          return resolve({ ok: true, mode: 'created', row: leads.length + 1, handle: h });
        }
        if (action === 'interpret') {
          var t = (payload.text || '').toLowerCase();
          var intent = { route: 'setter', handle: '', stage: '', status: '', temp: '',
            target: '', deal_status: '', meeting: '', followup: '', cash: '', notes: '', confidence: 'high' };
          intent.handle = (t.match(/\b(oscar\w*|fitwithmarco|marco|lena\S*|sofia\S*|ecom\.aiden|aiden|kayla\S*|nina\S*|jordan\S*)/) || [])[1] || (payload.deal || '');
          if (/engaged? (?:one|1)/.test(t)) intent.stage = 'Engaged 1';
          else if (/engaged? (?:two|2)/.test(t)) intent.stage = 'Engaged 2';
          else if (/engaged? (?:three|3)/.test(t)) intent.stage = 'Engaged 3';
          else if (/book/.test(t)) intent.stage = 'Booked';
          else if (/archiv/.test(t)) intent.stage = 'Archive';
          if (/story repl/.test(t)) intent.status = 'Story reply';
          else if (/follow.?up/.test(t)) intent.status = 'Follow up Sent';
          else if (/left on read/.test(t)) intent.status = 'Left on read';
          else if (/mid convo/.test(t)) intent.status = 'Mid convo';
          if (/hot/.test(t)) intent.temp = 'Hot Lead';
          else if (/warm/.test(t)) intent.temp = 'Warm Lead';
          else if (/cold/.test(t)) intent.temp = 'Cold Lead';
          var nm = t.match(/(?:wants?|needs?|note[sd]?:?)\s+(.+)$/);
          if (nm) intent.notes = nm[1].replace(/[.,]+$/, '').trim();
          if (!intent.handle) intent.route = 'unknown';
          return resolve({ ok: true, intent: intent, model: 'demo-mock' });
        }
        if (action === 'restore') {
          var li = payload.row - 2;
          if (leads[li]) {
            ['level', 'status', 'temp', 'lastContact'].forEach(function (k) {
              if (payload.values[k] !== undefined) leads[li][k === 'level' ? 'level' : k] = payload.values[k];
            });
          }
          return resolve({ ok: true, row: payload.row, restored: Object.keys(payload.values) });
        }
        reject(new Error('unknown action'));
      }, 280 + Math.random() * 240);
    });
  };
}
var mock = null;

/* ---------- api wrapper ---------- */
function api(action, payload) {
  if (state.demo) return mock(action, payload).then(function (d) { setDot('ok'); return d; });
  var ctrl = new AbortController();
  var timer = setTimeout(function () { ctrl.abort(); }, 25000); // Apps Script cold starts can take 5-10s
  var req;
  if (action === 'bootstrap' || action === 'ping') {
    req = fetch(state.url + '?action=' + action + '&key=' + encodeURIComponent(state.key),
      { signal: ctrl.signal, redirect: 'follow' });
  } else {
    // text/plain body avoids the CORS preflight Apps Script can't answer
    req = fetch(state.url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(Object.assign({ action: action, key: state.key }, payload || {})),
      signal: ctrl.signal, redirect: 'follow'
    });
  }
  return req
    .then(function (res) {
      return res.json().catch(function () {
        throw new Error('Bad response — check the web app URL and deployment.');
      });
    })
    .then(function (data) {
      if (!data.ok) throw new Error(data.error || 'Unknown server error');
      setDot('ok');
      return data;
    })
    .catch(function (err) {
      setDot('err');
      if (err.name === 'AbortError') throw new Error('Request timed out (8s).');
      throw err;
    })
    .finally(function () { clearTimeout(timer); });
}

function setDot(s) {
  var dot = $('connDot');
  dot.className = 'dot' + (s ? ' ' + s : '');
  dot.setAttribute('aria-label', s === 'ok' ? 'Connected' : s === 'err' ? 'Connection error' : 'Connecting');
}

/* ---------- bootstrap ---------- */
function runBootstrap(firstLoad) {
  var btn = $('refreshBtn');
  btn.disabled = true; btn.classList.add('spinning');
  if (firstLoad) { $('skeleton').hidden = false; $('loadError').hidden = true; $('app').hidden = true; }
  api('bootstrap').then(function (data) {
    state.serverDate = data.serverDate || '';
    state.leads = data.leads || [];
    state.statuses = data.statuses || [];
    state.temps = data.temps || [];
    buildIndex();
    $('metaDate').textContent = state.serverDate || '—';
    $('metaCount').textContent = String(state.leads.length);
    renderStatusChips();
    renderTempSelect();
    updateLogBtn();
    $('skeleton').hidden = true; $('loadError').hidden = true; $('app').hidden = false;
    if (state.deepLead) { $('searchInput').value = state.deepLead; state.deepLead = ''; }
    applyQuery($('searchInput').value);
    if (firstLoad) $('searchInput').focus();
  }).catch(function (err) {
    if (firstLoad || $('app').hidden) {
      $('skeleton').hidden = true;
      $('loadError').hidden = false;
      $('loadErrorMsg').textContent = 'Couldn’t load leads: ' + err.message;
    } else {
      toast({ type: 'err', html: 'Refresh failed: ' + esc(err.message), sticky: true,
        action: { label: 'Retry', fn: function () { runBootstrap(false); } } });
    }
  }).finally(function () {
    btn.disabled = false; btn.classList.remove('spinning');
  });
}

function buildIndex() {
  state.byHandle = new Map();
  state.leads.forEach(function (l) { state.byHandle.set(l.h, l); }); // later rows win = bottom-most
  state.unique = [];
  var seen = new Set();
  state.leads.forEach(function (l) {
    if (!seen.has(l.h)) { seen.add(l.h); state.unique.push(state.byHandle.get(l.h)); }
  });
}

/* ---------- status chips + temp ---------- */
function renderStatusChips() {
  var box = $('statusChips');
  box.innerHTML = '';
  state.selectedStatus = '';
  state.statuses.forEach(function (s) {
    var b = document.createElement('button');
    b.className = 'chip';
    b.type = 'button';
    b.textContent = s;
    b.setAttribute('aria-pressed', 'false');
    b.addEventListener('click', function () { selectStatus(state.selectedStatus === s ? '' : s); });
    box.appendChild(b);
  });
  box.closest('fieldset').hidden = state.statuses.length === 0;
}
function selectStatus(s) {
  state.selectedStatus = s;
  if ($('logBtnLabel')) updateLogBtn();
  var chips = $('statusChips').children;
  for (var i = 0; i < chips.length; i++) {
    chips[i].setAttribute('aria-pressed', chips[i].textContent === s ? 'true' : 'false');
  }
}
function renderTempSelect() {
  var sel = $('tempSel');
  while (sel.options.length > 1) sel.remove(1);
  state.temps.forEach(function (t) {
    var o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
}

/* ---------- search / autocomplete / arming ---------- */
function searchLeads(q) {
  var qs = squash(q);
  var out = [];
  state.unique.forEach(function (l) {
    var rank = -1;
    if (l.h === q) rank = 0;
    else if (l.h.indexOf(q) === 0) rank = 1;
    else if (l.h.indexOf(q) !== -1) rank = 2;
    else if (qs && squash(l.h).indexOf(qs) !== -1) rank = 3;
    if (rank >= 0) out.push({ rank: rank, lead: l });
  });
  out.sort(function (a, b) { return a.rank - b.rank || a.lead.h.localeCompare(b.lead.h); });
  return out.slice(0, 8).map(function (r) { return r.lead; });
}

function applyQuery(raw) {
  var q = CRMParse.normalizeHandle(raw);
  if (!q) {
    state.armed = null;
    renderChip(); closeAc();
    return;
  }
  var exact = state.byHandle.get(q);
  if (exact) state.armed = { mode: 'existing', lead: exact };
  else if (/\s/.test(q)) state.armed = { mode: 'hint', handle: q };
  else state.armed = { mode: 'new', handle: q };
  renderChip();
  renderAc(searchLeads(q));
  updateLogBtn();
}

function renderChip() {
  var chip = $('armChip');
  var a = state.armed;
  if (!a) { chip.hidden = true; chip.innerHTML = ''; return; }
  chip.hidden = false;
  chip.className = 'arm-chip' + (a.mode === 'new' ? ' is-new' : a.mode === 'hint' ? ' is-hint' : '');
  if (a.mode === 'existing') {
    var l = a.lead;
    var dups = state.leads.filter(function (x) { return x.h === l.h; }).length;
    chip.innerHTML = '<span class="mono">@' + esc(l.h) + '</span><span class="chip-meta">— ' +
      esc(l.level || 'no level') +
      (l.status ? ' · ' + esc(l.status) : '') +
      (l.lastContact ? ' · ' + daysBadge(l.lastContact) : '') +
      (l.qual ? ' <span class="qual-tag">' + esc(l.qual) + '</span>' : '') +
      (dups > 1 ? ' · ' + dups + ' rows' : '') + '</span>' +
      (l.url ? '<a class="ig-mini" href="' + esc(l.url) + '" target="_blank" rel="noopener">open IG ↗</a>' : '') +
      (l.notes ? '<span class="chip-meta" title="' + esc(l.notes) + '">📝</span>'.replace('📝', '&#9998;') : '');
  } else if (a.mode === 'new') {
    chip.innerHTML = '<span class="tag-new">NEW</span><span>will create <span class="mono">@' + esc(a.handle) + '</span></span>';
  } else {
    chip.innerHTML = '<span>Press <kbd>Enter</kbd> to run this command.</span>';
  }
}

function renderAc(results) {
  state.acResults = results;
  state.acIndex = -1;
  var list = $('acList');
  if (!results.length) { closeAc(); return; }
  list.innerHTML = results.map(function (l, i) {
    var c = LEVEL_COLORS[l.level] || '#94A3B8';
    return '<li class="ac-item" id="ac-opt-' + i + '" role="option" aria-selected="false" data-i="' + i + '">' +
      '<span class="ac-handle">@' + esc(l.h) + '</span>' +
      '<span class="badge" style="color:' + c + ';border-color:' + c + '55;background:' + c + '1A">' + esc(l.level || '—') + '</span>' +
      '<span class="ac-meta"><span' + (l.temp === 'Hot Lead' ? ' class="temp-hot"' : '') + '>' + esc(l.temp || '—') + '</span>' +
      (l.status ? '<span>' + esc(l.status) + '</span>' : '') +
      (l.qual ? '<span class="qual-tag">' + esc(l.qual) + '</span>' : '') + '</span>' +
      '<span class="ac-date">' + esc(l.lastContact || '—') + '</span>' +
      '</li>';
  }).join('');
  list.hidden = false;
  state.acOpen = true;
  $('searchInput').setAttribute('aria-expanded', 'true');
}

function closeAc() {
  $('acList').hidden = true;
  $('acList').innerHTML = '';
  state.acOpen = false;
  state.acIndex = -1;
  $('searchInput').setAttribute('aria-expanded', 'false');
  $('searchInput').removeAttribute('aria-activedescendant');
}

function moveAc(delta) {
  if (!state.acOpen) { applyQuery($('searchInput').value); if (!state.acOpen) return; }
  var n = state.acResults.length;
  state.acIndex = (state.acIndex + delta + n) % n;
  var items = $('acList').children;
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('active', i === state.acIndex);
    items[i].setAttribute('aria-selected', i === state.acIndex ? 'true' : 'false');
  }
  items[state.acIndex].scrollIntoView({ block: 'nearest' });
  $('searchInput').setAttribute('aria-activedescendant', 'ac-opt-' + state.acIndex);
}

function pickLead(lead) {
  $('searchInput').value = lead.h;
  state.armed = { mode: 'existing', lead: lead };
  renderChip();
  closeAc();
  updateLogBtn();
}

/* ---------- AI: natural sentences -> interpret (mode:'setter') ---------- */
function aiBadge() {
  return '<span style="display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:.66rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-right:6px">' +
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.8 15.9 9 18.75l-.8-2.85a4.5 4.5 0 0 0-3.1-3.1L2.25 12l2.85-.8a4.5 4.5 0 0 0 3.1-3.1L9 5.25l.8 2.85a4.5 4.5 0 0 0 3.1 3.1L15.75 12l-2.85.8a4.5 4.5 0 0 0-3.1 3.1Z"/></svg>Claude</span>';
}
var aiBusy = false;
function aiInterpret(text) {
  if (aiBusy) return;
  aiBusy = true;
  var chip = $('armChip');
  chip.hidden = false; chip.className = 'arm-chip is-hint';
  chip.innerHTML = aiBadge() + '<span>Reading…</span>';
  var armed = state.armed && state.armed.mode === 'existing' ? state.armed.lead.h : '';
  api('interpret', { text: text, mode: 'setter', deal: armed || undefined })
    .then(function (res) {
      var cmd = CRMParse.intentToCommand(res.intent, {
        now: new Date(), leads: state.unique, closing: [], statuses: state.statuses
      });
      if (cmd.route !== 'setter' || !cmd.setter.handle) {
        renderChip();
        toast({ html: aiBadge() + (cmd.route === 'closer'
          ? 'That sounds like a sales-call update — that’s Reinis’s Log-the-call tool.'
          : esc((cmd.hint || 'Couldn’t tell what to update — name the lead and what changed.'))), ttl: 6000 });
        return;
      }
      var st = cmd.setter;
      if (!st.stage && !st.status && !st.temp && !st.notes) {
        renderChip();
        toast({ html: aiBadge() + 'Heard the lead but no change — say a stage, status or temp.', ttl: 5000 });
        return;
      }
      var isNew = !state.byHandle.get(st.handle);
      if (isNew && !st.stage) {
        renderChip();
        toast({ html: aiBadge() + '<span class="mono">@' + esc(st.handle) + '</span> isn’t a lead yet — include a stage (e.g. “engaged 1”) to create it.', ttl: 6000 });
        return;
      }
      $('searchInput').value = st.handle;
      applyQuery(st.handle);
      if (st.status) selectStatus(canonIn(state.statuses, st.status) || '');
      if (st.temp) $('tempSel').value = st.temp;
      if (st.notes) $('noteInput').value = st.notes;
      state.pending = { handle: st.handle, stage: st.stage, status: st.status, isNew: isNew, ai: true,
        note: st.notes, why: st.stage === 'Booked' ? ' · pings Reinis on WhatsApp' : '' };
      showConfirmBar();
    })
    .catch(function (err) {
      renderChip();
      if (/not configured/i.test(err.message)) {
        toast({ html: 'AI isn’t configured — use “handle stage”, e.g. “oscarwxng engaged 2”.', ttl: 6000 });
      } else {
        toast({ type: 'err', html: 'Couldn’t read that: ' + esc(err.message), ttl: 6000 });
      }
    })
    .finally(function () { aiBusy = false; });
}

/* ---------- utterance parse (typed Enter or voice final) ---------- */
function tryUtterance(text) {
  var r = CRMParse.parseSetterUtterance(text, { leads: state.unique });
  if (!r || !r.handle) return false;
  var stage = canonIn(ALL_STAGES, r.stage);
  var match = (r.matches && r.matches.length) ? r.matches[0] : null;
  if (r.matches && r.matches.length > 1) {
    toast({ html: r.matches.length + ' leads match — using <span class="mono">@' + esc(match.h) + '</span>. Check before confirming.', ttl: 5000 });
  }
  // keep dots/underscores for genuinely new handles; squash only joins spoken spaces
  var handle = match ? match.h : (r.handle.indexOf(' ') === -1 ? r.handle : squash(r.handle));
  if (!stage) {
    if (r.stage) {
      toast({ type: 'err', html: 'Didn’t recognize stage “' + esc(r.stage) + '” — say e.g. “engaged 2” or “booked”.' });
      return true;
    }
    if (match) { pickLead(match); return true; } // plain handle utterance: just arm it
    return false;
  }
  var status = canonIn(state.statuses, r.status) || r.status || '';
  if (canonIn(state.statuses, r.status)) selectStatus(canonIn(state.statuses, r.status));
  $('searchInput').value = handle;
  applyQuery(handle);
  state.pending = { handle: handle, stage: stage, status: status, isNew: !state.byHandle.get(handle) };
  showConfirmBar();
  return true;
}

function showConfirmBar() {
  var p = state.pending;
  markStage(p.stage);
  var effStatus = p.status || state.selectedStatus;
  $('confirmText').innerHTML =
    (p.ai ? aiBadge() : '') +
    (p.isNew ? '<span class="tag-new" style="color:#052E16;background:var(--green);padding:1px 8px;border-radius:999px;font-size:.72rem;font-weight:700">NEW</span> ' : '') +
    '<span class="mono">@' + esc(p.handle) + '</span> → <span class="mono">' + esc(p.stage) + '</span>' +
    (effStatus ? ' · ' + esc(effStatus) : '') +
    ($('tempSel').value ? ' · ' + esc($('tempSel').value) : '') +
    (p.note ? ' · <span class="opt">“' + esc(p.note.length > 40 ? p.note.slice(0, 40) + '…' : p.note) + '”</span>' : '') +
    (p.why ? '<span class="opt">' + esc(p.why) + '</span>' : '');
  $('confirmBar').hidden = false;
  $('confirmBtn').focus();
}

function hideConfirmBar() {
  state.pending = null;
  $('confirmBar').hidden = true;
  markStage(null);
}

function markStage(stage) {
  document.querySelectorAll('.stage-btn').forEach(function (b) {
    b.classList.toggle('preselect', !!stage && b.dataset.stage === stage);
  });
}

/* ---------- the ONE action: write ---------- */
function setBusy(v) {
  state.busy = v;
  document.querySelectorAll('.stage-btn, #confirmBtn').forEach(function (b) { b.disabled = v; });
}

function doWrite(args) {
  if (state.busy) return;
  setBusy(true);
  if (!args.reqId) args.reqId = newReqId(); // stable across retries — server dedupes
  var payload = { handle: args.handle, reqId: args.reqId };
  if (args.stage) payload.stage = args.stage;
  if (args.status) payload.status = args.status;
  if (args.temp) payload.temp = args.temp;
  if (args.note) payload.note = args.note;
  api('setterUpdate', payload).then(function (res) {
    var extras = [];
    if (args.status) extras.push(args.status);
    if (args.temp) extras.push(args.temp);
    if (args.note) extras.push('note saved');
    var html = (res.mode === 'created' ? 'Created ' : '') +
      '<span class="mono">@' + esc(res.handle) + '</span>' +
      (args.stage ? ' → <span class="mono">' + esc(args.stage) + '</span>' : ' logged') +
      (extras.length ? ' (' + esc(extras.join(', ')) + ')' : '') +
      (args.stage ? '' : ' — stage unchanged') + ', contact date stamped.';
    if (args.stage === 'Booked') {
      html += res.closingRow === false
        ? ' <strong>Heads-up: no Closing row appeared — check SELF_COPY_ON_BOOKED (SETUP §7).</strong>'
        : ' Reinis gets a WhatsApp ping.';
    }
    if (res.mode === 'updated' && res.duplicates > 1) html += ' ' + res.duplicates + ' rows share this handle — bottom-most updated.';
    var undoAction = (res.mode === 'updated' && res.prev)
      ? { label: 'Undo', fn: function () { undoWrite(res); } } : null;
    toast({ type: 'ok', html: html, ttl: 8000, action: undoAction });
    addRecent(res, args);
    applyWriteLocally(res, args);
    resetAction();
  }).catch(function (err) {
    toast({ type: 'err', html: 'Write failed: ' + esc(err.message), sticky: true,
      action: { label: 'Retry', fn: function () { doWrite(args); } } });
  }).finally(function () { setBusy(false); });
}

function undoWrite(res) {
  api('restore', { tab: 'instagram', row: res.row, values: res.prev, reqId: newReqId() })
    .then(function () {
      var l = state.byHandle.get(res.handle);
      if (l) {
        l.level = res.prev.level; l.status = res.prev.status;
        l.temp = res.prev.temp; l.lastContact = res.prev.lastContact;
      }
      toast({ type: 'ok', html: 'Undone — <span class="mono">@' + esc(res.handle) + '</span> restored to ' + esc(res.prev.level || 'no level') + '.' });
    })
    .catch(function (err) {
      toast({ type: 'err', html: 'Undo failed: ' + esc(err.message), sticky: true });
    });
}

function applyWriteLocally(res, args) {
  if (res.mode === 'updated') {
    var l = state.byHandle.get(res.handle);
    if (!l) return;
    if (args.stage) l.level = args.stage;
    if (args.status) l.status = args.status;
    if (args.temp) l.temp = args.temp;
    l.lastContact = state.serverDate;
    return;
  }
  {
    var nl = {
      h: res.handle, url: 'https://www.instagram.com/' + res.handle + '/',
      level: args.stage || '', status: args.status || '', temp: args.temp || 'Warm Lead',
      qual: '', notes: args.note || '', lastContact: state.serverDate
    };
    state.leads.push(nl);
    state.byHandle.set(nl.h, nl);
    state.unique.push(nl);
    $('metaCount').textContent = String(state.leads.length);
  }
}

function resetAction() {
  $('searchInput').value = '';
  state.armed = null;
  renderChip(); closeAc(); hideConfirmBar();
  // status chip + temp stay STICKY for batch logging; note is per-lead
  $('noteInput').value = '';
  updateLogBtn();
  $('searchInput').focus();
}

/* ---------- recent actions ---------- */
var recent = [];
function addRecent(res, args) {
  recent.unshift({
    row: res.row, handle: res.handle, mode: res.mode, stage: args.stage,
    status: args.status || '', temp: args.temp || '',
    time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  });
  var list = $('recentList');
  list.innerHTML = recent.map(function (r) {
    var extras = [r.status, r.temp].filter(Boolean).join(', ');
    return '<li class="recent-item">' +
      '<span class="recent-row-num">row ' + esc(r.row) + '</span>' +
      '<span class="recent-handle">@' + esc(r.handle) + '</span>' +
      '<span>→ ' + esc(r.stage || (r.status ? 'logged' : 'updated')) + '</span>' +
      (extras ? '<span class="recent-extra">' + esc(extras) + '</span>' : '') +
      '<span class="recent-mode ' + esc(r.mode) + '">' + esc(r.mode) + '</span>' +
      '<span class="recent-time">' + esc(r.time) + '</span>' +
      '</li>';
  }).join('');
}

/* ---------- voice ---------- */
var SRCls = window.SpeechRecognition || window.webkitSpeechRecognition;
var recog = null;

function initVoice() {
  if (!SRCls) {
    $('voiceHint').textContent = 'Use your keyboard’s mic key to dictate into the search box — e.g. “oscarwxng engaged 2”.';
    return;
  }
  $('micBtn').hidden = false;
  $('voiceHint').textContent = 'say it naturally — “moved oscar to engaged 2, story reply, seems warm”';
  $('micBtn').addEventListener('click', function () {
    if (state.listening) { recog.stop(); return; }
    recog = new SRCls();
    recog.lang = 'en-US';
    recog.interimResults = true;
    recog.continuous = false;
    recog.maxAlternatives = 1;
    var finalText = '';
    recog.onstart = function () {
      state.listening = true;
      $('micBtn').classList.add('listening');
      $('micBtn').setAttribute('aria-pressed', 'true');
    };
    recog.onresult = function (e) {
      var text = '';
      for (var i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
      text = text.trim();
      $('searchInput').value = text;
      applyQuery(text);
      if (e.results[e.results.length - 1].isFinal) finalText = text;
    };
    recog.onerror = function (e) { toast({ type: 'err', html: esc(voiceErrorHint(e.error)), ttl: 7000 }); };
    recog.onend = function () {
      state.listening = false;
      $('micBtn').classList.remove('listening');
      $('micBtn').setAttribute('aria-pressed', 'false');
      if (finalText && !tryUtterance(finalText)) aiInterpret(finalText);
    };
    try { recog.start(); } catch (err) { toast({ type: 'err', html: 'Mic couldn’t start — try again.' }); }
  });
}

function voiceErrorHint(code) {
  var safari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  switch (code) {
    case 'not-allowed':
    case 'service-not-allowed':
      return safari
        ? 'Mic blocked. On Safari enable Siri & Dictation in system settings, or use your keyboard’s mic key.'
        : 'Mic access blocked — allow the microphone for this site, or use your keyboard’s mic key.';
    case 'no-speech': return 'Didn’t hear anything — tap the mic and speak.';
    case 'audio-capture': return 'No microphone found on this device.';
    case 'network': return 'Speech service unreachable — use your keyboard’s mic key instead.';
    default: return 'Voice error (' + code + ') — use your keyboard’s mic key instead.';
  }
}

/* ---------- stage / log actions (guards live here) ---------- */
function stageAction(stage) {
  var a = state.armed;
  if (!a || a.mode === 'hint') {
    if (a && a.mode === 'hint' && tryUtterance($('searchInput').value)) return;
    toast({ html: 'Couldn’t tell which lead — pick one from the list first.', ttl: 3000 });
    $('searchInput').focus();
    return;
  }
  var needsConfirm = false;
  var why = '';
  if (a.mode === 'new') {
    needsConfirm = true; // creating a row deserves one deliberate confirm
    var similar = searchLeads(a.handle).slice(0, 2).map(function (l) { return '@' + l.h; });
    why = similar.length ? ' · similar: ' + similar.join(', ') : '';
  } else if (stage === 'Booked') {
    needsConfirm = true; why = ' · pings Reinis on WhatsApp';
  } else if (a.lead.level === 'Closed' && stage !== 'Closed') {
    needsConfirm = true; why = ' · this lead is CLOSED';
  }
  var args = {
    handle: a.mode === 'existing' ? a.lead.h : a.handle,
    stage: stage,
    status: state.selectedStatus,
    temp: $('tempSel').value,
    note: $('noteInput').value.trim()
  };
  if (needsConfirm) {
    state.pending = { handle: args.handle, stage: stage, status: args.status, isNew: a.mode === 'new', why: why, note: args.note };
    showConfirmBar();
    return;
  }
  hideConfirmBar();
  doWrite(args);
}

function logAction() {
  var a = state.armed;
  if (!a || a.mode !== 'existing') {
    toast({ html: 'Pick an existing lead first — “Log” never changes the stage.', ttl: 3500 });
    return;
  }
  doWrite({
    handle: a.lead.h,
    status: state.selectedStatus || 'Follow up Sent',
    temp: $('tempSel').value,
    note: $('noteInput').value.trim()
  });
}

function updateLogBtn() {
  var a = state.armed;
  var st = state.selectedStatus || 'Follow up Sent';
  $('logBtnLabel').textContent = 'Log “' + st + '” — keep stage';
  $('logBtn').disabled = !(a && a.mode === 'existing') || state.busy;
}

/* ---------- events ---------- */
function bindEvents() {
  var input = $('searchInput');

  input.addEventListener('input', function () {
    if (state.pending) hideConfirmBar(); // editing invalidates a parsed command
    var v = input.value;
    if (v.indexOf('instagram.com') !== -1) {
      var h = CRMParse.normalizeHandle(v);
      if (h) { input.value = h; v = h; }
    }
    applyQuery(v);
  });

  input.addEventListener('keydown', function (e) {
    if (!$('confirmBar').hidden) return; // document-level handler owns Enter/Esc then
    if (e.key === 'ArrowDown') { e.preventDefault(); moveAc(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveAc(-1); }
    else if (e.key === 'Escape') { closeAc(); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      // don't let this same keystroke bubble to the document handler and
      // auto-confirm the bar it just opened — confirming takes its own Enter
      e.stopPropagation();
      if (state.acOpen && state.acIndex >= 0) pickLead(state.acResults[state.acIndex]);
      else if (!tryUtterance(input.value) && input.value.trim().indexOf(' ') !== -1) aiInterpret(input.value.trim());
    }
  });

  input.addEventListener('blur', function () {
    setTimeout(closeAc, 150); // let option mousedown land first
  });

  $('acList').addEventListener('mousedown', function (e) {
    var li = e.target.closest('.ac-item');
    if (!li) return;
    e.preventDefault();
    pickLead(state.acResults[Number(li.dataset.i)]);
  });

  document.querySelectorAll('.stage-btn').forEach(function (btn) {
    btn.addEventListener('click', function () { stageAction(btn.dataset.stage); });
  });

  $('confirmBtn').addEventListener('click', function () {
    var p = state.pending;
    if (!p) return;
    if (!p.stage && p.isNew) { toast({ type: 'err', html: 'New lead needs a stage first.' }); return; }
    hideConfirmBar();
    doWrite({ handle: p.handle, stage: p.stage, status: p.status || state.selectedStatus, temp: $('tempSel').value, note: p.note || $('noteInput').value.trim() });
  });
  $('cancelBtn').addEventListener('click', function () {
    hideConfirmBar();
    $('searchInput').focus();
  });

  document.addEventListener('keydown', function (e) {
    if ($('confirmBar').hidden) return;
    if (e.key === 'Enter' && e.target !== $('confirmBtn') && e.target !== $('cancelBtn')) {
      e.preventDefault();
      $('confirmBtn').click();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      $('cancelBtn').click();
    }
  });

  $('refreshBtn').addEventListener('click', function () { runBootstrap(false); });
  $('loadRetry').addEventListener('click', function () { runBootstrap(true); });
  $('gearBtn').addEventListener('click', function () {
    $('setupUrl').value = state.demo ? 'mock' : state.url;
    $('setupKey').value = state.demo ? '' : state.key;
    $('setupCard').hidden = false;
    $('app').hidden = true;
    $('loadError').hidden = true;
  });

  $('logBtn').addEventListener('click', logAction);

  // keyboard shortcuts when not typing: 1/2/3 stages, B/A/N/C, F = log, Esc = clear
  document.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) {
      if (e.key === 'Escape') { resetAction(); }
      return;
    }
    if (!$('confirmBar').hidden) return; // bar owns Enter/Esc
    var map = { '1': 'Engaged 1', '2': 'Engaged 2', '3': 'Engaged 3', 'b': 'Booked', 'a': 'Archive', 'n': 'No Reply', 'c': 'Closed' };
    var k = e.key.toLowerCase();
    if (map[k] && state.armed) { e.preventDefault(); stageAction(map[k]); }
    else if (k === 'f' && state.armed) { e.preventDefault(); logAction(); }
    else if (e.key === 'Escape') { resetAction(); }
  });

  var hiddenAt = null;
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) { hiddenAt = Date.now(); return; }
    if (hiddenAt && Date.now() - hiddenAt > 5 * 60 * 1000 && !$('app').hidden) runBootstrap(true);
    hiddenAt = null;
  });

  $('setupSave').addEventListener('click', function () {
    var url = $('setupUrl').value.trim();
    var key = $('setupKey').value.trim();
    if (url !== 'mock' && url.indexOf('https://') !== 0) {
      toast({ type: 'err', html: 'The web app URL must start with https:// (the Apps Script /exec link).' });
      return;
    }
    if (url !== 'mock' && !key) {
      toast({ type: 'err', html: 'The API key is required.' });
      return;
    }
    localStorage.setItem(LS_URL, url);
    localStorage.setItem(LS_KEY, key);
    $('setupCard').hidden = true;
    start();
  });
}

/* ---------- init ---------- */
function readFragmentConfig() {
  var qp = new URLSearchParams(location.search);
  state.deepLead = qp.get('lead') || '';
  if (!location.hash) return;
  var p = new URLSearchParams(location.hash.slice(1));
  var u = p.get('u'), k = p.get('k');
  if (u && k) {
    localStorage.setItem(LS_URL, u);
    localStorage.setItem(LS_KEY, k);
    history.replaceState(null, '', location.pathname + location.search);
  }
}

function start() {
  state.url = localStorage.getItem(LS_URL) || '';
  state.key = localStorage.getItem(LS_KEY) || '';
  state.demo = new URLSearchParams(location.search).get('demo') === '1' || state.url === 'mock';
  if (state.demo) {
    mock = makeMock();
    $('demoBanner').hidden = false;
  } else if (!state.url || !state.key) {
    $('setupCard').hidden = false;
    $('setupUrl').focus();
    return;
  }
  runBootstrap(true);
}

document.addEventListener('DOMContentLoaded', function () {
  if (typeof window.CRMParse === 'undefined') {
    document.querySelector('.wrap').insertAdjacentHTML('beforeend',
      '<section class="card load-error"><p>parser.js failed to load — the panel can’t run without it. ' +
      'Make sure parser.js sits next to setter.html.</p></section>');
    return;
  }
  readFragmentConfig();
  initVoice();
  bindEvents();
  start();
});
})();
</script>
