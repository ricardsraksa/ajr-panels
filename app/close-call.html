<style id="v2-theme">
@view-transition{navigation:auto}
:root{
  --bg:#f9f8f5; --side:#f4f2ed; --card:#fff; --rowsel:#fdfcf9;
  --line:#e6e2da; --line-2:#ddd8cd; --divider:#f0ede6;
  --ink:#211f1b; --ink-2:#4d4a42; --ink-3:#6d675b; --muted:#8a8375; --muted-2:#98917f; --off:#ccc5b6;
  --go:#2a6a4d; --go-hi:#1d4d37; --go-tint:#eef5f0; --go-line:#c9dfd2; --done:#f7faf7;
  --red:#b4543e; --amber:#a8762a; --amber-tint:#faf3e6;
  --ai:#7c56c9; --ai-line:#e2d9f4; --ai-tint:#f6f2fb;
  --font:'Instrument Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--go);text-decoration:none}
a:hover{color:var(--go-hi)}
:focus{outline:none}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:6px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
input::placeholder,textarea::placeholder{color:var(--off)}

/* layout */
.v2-shell{display:flex;min-height:100vh}
.v2-side{width:206px;flex:none;border-right:1px solid var(--line);background:var(--side);padding:20px 14px;
  display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;
  align-self:flex-start} /* flex would stretch it and break position:sticky */
.v2-side .wm{font-weight:700;font-size:14px;letter-spacing:.02em;padding:2px 10px 16px}
.v2-side .grp{font:600 10.5px var(--font);letter-spacing:.1em;color:var(--muted-2);padding:4px 10px}
.v2-side .grp.gap{padding-top:14px}
.v2-side a.nav{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--ink-2);font-size:13.5px}
.v2-side a.nav:hover{background:rgba(33,31,27,.05);color:var(--ink)}
.v2-side a.nav.on{background:var(--ink);color:var(--bg);font-weight:600}
.v2-side a.nav.on:hover{background:var(--ink);color:var(--bg)}
.v2-side .badge-n{margin-left:auto;font:600 11px var(--mono);background:rgba(255,255,255,.18);border-radius:99px;padding:1px 7px}
.v2-side a.nav:not(.on) .badge-n{background:transparent;color:var(--muted);padding:0}
.v2-side .badge-red{margin-left:auto;font-size:11px;color:var(--red);font-weight:600}
.v2-side .sp{flex:1}
.v2-side .krow{display:flex;align-items:center;gap:8px;padding:8px 10px;color:var(--muted-2);font-size:12px;cursor:pointer}
.v2-side .krow kbd{margin-left:auto;font:600 11px var(--mono);border:1px solid var(--line-2);border-radius:5px;padding:1px 6px;background:#fff;color:var(--ink-3)}
.v2-side .me{display:flex;align-items:center;gap:9px;padding:10px 10px 2px;border-top:1px solid var(--line);margin-top:6px}
.v2-side .me .av{width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--bg);display:inline-flex;
  align-items:center;justify-content:center;font:600 11px var(--mono);flex:none}
.v2-side .me .nm{display:block;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v2-side .me .rl{display:block;font-size:11px;color:var(--muted-2)}

@media(max-width:900px) and (min-width:761px){.v2-side{width:64px;padding:16px 8px}.v2-side .wm,.v2-side .grp,.v2-side .krow,.v2-side .me .nm,.v2-side .me .rl{display:none}}

  .v2-shell{display:block}

  .v2-main{padding:16px 14px 60px}

/* headers */
.v2-h{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}

/* buttons */
.v2-btn{min-height:34px;padding:0 14px;border-radius:8px;border:1px solid var(--line-2);background:#fff;
  color:var(--ink-2);font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:7px}

.v2-btn.dash{border-style:dashed;color:var(--muted);font-weight:500;background:transparent}
.v2-btn.dash:hover{color:var(--ink-2)}
.v2-btn.sm{min-height:28px;padding:0 10px;font-size:11.5px}

/* inputs */
.v2-in{min-height:34px;padding:7px 12px;background:#fff;border:1px solid var(--line-2);border-radius:8px;
  color:var(--ink);font-size:13px;width:100%}
.v2-in:focus{border-color:var(--muted-2)}
select.v2-in{cursor:pointer}
textarea.v2-in{min-height:76px;resize:vertical;line-height:1.55}

/* cards + tables */
.v2-card{background:var(--card);border:1px solid var(--line);border-radius:12px}
.v2-thead{display:grid;gap:10px;padding:9px 18px;font:600 10px var(--mono);letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted-2);border-bottom:1px solid var(--divider)}
.v2-row{display:grid;gap:10px;padding:13px 18px;align-items:center;border-top:1px solid var(--divider)}
.v2-row:first-of-type{border-top:none}
.v2-row:hover{background:var(--rowsel)}
.v2-scroll{overflow-x:auto}
.v2-empty{padding:30px 18px;text-align:center;color:var(--muted)}

.v2-age{font-family:var(--mono);font-size:12.5px;color:var(--ink-3)}
.v2-age.warn{color:var(--amber);font-weight:600}
.v2-age.late{color:var(--red);font-weight:600}

.v2-money{font-family:var(--mono);font-weight:600;color:var(--go)}

.v2-toasts{position:fixed;z-index:80;bottom:20px;left:50%;transform:translateX(-50%);display:flex;

<script src="./parser.js"></script>
<script type="module">
import * as core from './crm-core.js?v=20260722p';
const _session = await core.requireAuth();
if (_session) {
await core.installChrome({ active: 'close-call' });
var $ = function (id) { return document.getElementById(id); };

var state = {
  demo: false,
  unique: [], byHandle: new Map(), closing: [], statuses: [], serverDate: '',
  parsed: null, chooserRow: null, cashConfirmed: false, aiBusy: false, pinnedRow: null,
  callBanner: null, deepLinkRow: null, afterCall: false, pickerOpen: false,
  writeArgs: null, canWrite: false, needCash: false,
  busy: false, listening: false, connErr: false,
  screen: 'idle', // idle | picker | interpreting | ambiguous | preview | money | saved | error
  savedTimer: null
};
var recent = [];

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
function newReqId() { return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function fmtCash(n) { return Number(n).toLocaleString('en-US'); }
function displayName(deal) {
  if (deal.name && !/^#(N\/A|REF!)/.test(deal.name)) return deal.name;
  var h = CRMParse.normalizeHandle(deal.link);
  return h ? '@' + h : (deal.link || 'row ' + deal.row);
}
function pinnedDeal() {
  if (state.pinnedRow == null) return null;
  for (var i = 0; i < state.closing.length; i++) if (state.closing[i].row === state.pinnedRow) return state.closing[i];
  return null;
}
function daysUntil(dmy) {
  var d = CRMParse.parseDMY(dmy), ref = CRMParse.parseDMY(state.serverDate) || new Date();
  if (!d) return null;
  return Math.round((d - ref) / 864e5);
}
function relBadge(dmy, kind) {
  var n = daysUntil(dmy);
  if (n === null) return '';
  if (n === 0) return '<span class="rel today">' + kind + ' today</span>';
  if (n < 0) return '<span class="rel late">' + (-n) + 'd overdue</span>';
  if (n <= 7) return '<span class="rel">' + kind + ' ' + n + 'd</span>';
  return '';
}
function warnIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v3.75m9.303-1.626a1.734 1.734 0 0 1-1.51 2.626H4.207a1.734 1.734 0 0 1-1.51-2.626M12 5.25 3.31 16.874M12 5.25l8.69 11.624M12 15.75h.007v.008H12v-.008Z"/></svg>';
}

/* ---------- header dot + label ---------- */
function setDot(cls) { // cls: 'ok' | 'err' | ''
  state.connErr = cls === 'err';
  paintHeader();
}
function paintHeader() {
  var lbl = $('hdrLabel'), s = state.screen;
  var pin = pinnedDeal(), banner = pin && state.callBanner === pin.row;
  var label = 'Log the call', dotCls = '';
  if (s === 'setup') label = 'Connect';
  else if (state.connErr && s === 'error') { label = 'Offline'; dotCls = 'err'; }
  else if (state.connErr) dotCls = 'err';
  else if (s === 'preview') label = 'Check & save';
  else if (s === 'money') label = 'Confirm cash';
  else if (s === 'saved') label = 'Logged';
  else if (s === 'interpreting') label = 'Reading';
  else if (banner) { label = 'Just hopped off'; }
  lbl.textContent = label;
}

/* ---------- toasts (errors) ---------- */
var toast = core.toast;

/* ---------- data layer: Supabase via crm-core ---------- */
function api(action, payload) {
  if (action === 'bootstrap') {
    return core.bootstrap().then(function (d) {
      setDot('ok');
      return { ok: true, serverDate: d.serverDate, closing: d.deals, leads: d.leads, statuses: core.STATUSES.slice() };
    }).catch(function (e) { setDot('err'); throw e; });
  }
  if (action === 'interpret') {
    return core.interpret(payload.text, payload.mode, payload.deal)
      .then(function (r) { setDot('ok'); return r; }).catch(function (e) { setDot('err'); throw e; });
  }
  if (action === 'closerUpdate') {
    return core.closerUpdate(payload).then(function (r) { setDot('ok'); return r; })
      .catch(function (e) { setDot('err'); throw e; });
  }
  if (action === 'pending') {
    return core.pendingCalls().then(function (calls) { setDot('ok'); return { ok: true, calls: calls }; })
      .catch(function (e) { setDot('err'); throw e; });
  }
  throw new Error('unknown action ' + action);
}

/* ---------- bootstrap ---------- */
function runBootstrap(quiet) {
  $('refreshBtn').disabled = true; $('refreshBtn').classList.add('spinning');
  return api('bootstrap').then(function (data) {
    state.serverDate = data.serverDate || '';
    state.statuses = data.statuses || [];
    state.closing = data.closing || [];
    var uniq = new Map();
    (data.leads || []).forEach(function (l) { uniq.set(l.h, l); }); // bottom-most wins
    state.byHandle = uniq;
    state.unique = Array.from(uniq.values());
    $('app').hidden = false;
    if (state.deepLinkRow) {
      var hit = null;
      state.closing.forEach(function (d) { if (d.row === state.deepLinkRow) hit = d; });
      if (hit && !pinnedDeal()) { state.callBanner = hit.row; state.pinnedRow = hit.row; }
      state.deepLinkRow = null;
    }
    reparse();
    // Opened by the watcher the instant a call ended (?after=1) with no deal
    // known yet — drop straight into the picker so it's one tap to the deal.
    if (state.afterCall && !pinnedDeal()) { state.afterCall = false; openPicker(true); }
    startPendingWatch();
    initBell();
    if (!quiet && !state.pickerOpen) $('bar').focus();
  }).catch(function (err) {
    if ($('app').hidden) {
      showError(err.message, function () { runBootstrap(quiet); });
    } else {
      toast({ type: 'err', html: 'Couldn’t refresh: ' + esc(err.message), sticky: true, action: { label: 'Retry', fn: function () { runBootstrap(quiet); } } });
    }
  }).finally(function () { $('refreshBtn').disabled = false; $('refreshBtn').classList.remove('spinning'); });
}

/* ---------- stage visibility ---------- */
// One screen visible at a time inside the middle; the pin area, input bar and
// recent list show only when it makes sense.
function showStage(name) {
  state.screen = name;
  var ids = { hero: 'hero', interpreting: 'thinking', ambiguous: 'ambig', preview: 'pv', money: 'money', saved: 'saved', error: 'errScreen' };
  Object.keys(ids).forEach(function (k) { $(ids[k]).hidden = k !== name; });
  $('moneyActs').hidden = name !== 'money';
  var pin = pinnedDeal();
  // pin area shows on the "input" screens; hidden while previewing/confirming
  var showPin = (name === 'hero' || name === 'picker');
  $('pinArea').hidden = !showPin;
  $('picker').hidden = !(name === 'picker' || (state.pickerOpen && name === 'hero'));
  if (name === 'picker') { $('hero').hidden = true; }
  // bar + recent
  var showBar = (name === 'hero') && !state.pickerOpen;
  $('barArea').hidden = !showBar;
  $('recentWrap').hidden = !(showBar && !pin && recent.length);
  paintHeader();
}

/* ---------- parse + preview ---------- */
// Typing keeps the resting hero on screen — natural sentences are only understood
// on submit (Claude, with a local keyword fallback). No half-parsed preview.
function reparse() {
  state.writeArgs = null; state.canWrite = false; state.needCash = false;
  state.cashConfirmed = false; state.aiText = null; state.chooserRow = null;
  state.parsed = null;
  renderRest();
}

// resting screen: picker, or the mic hero (idle / awaiting)
function renderRest() {
  renderPinArea();
  if (state.pickerOpen) { showStage('picker'); renderDeals(); return; }
  var pin = pinnedDeal();
  $('heroMic').className = 'hero-mic' + (state.listening ? ' listening' : (pin ? ' active' : ''));
  $('heroTitle').textContent = state.listening ? 'Listening…' : (pin ? 'How did it go?' : 'Say how the call went');
  var ex = $('heroEx');
  if (pin) { ex.hidden = true; ex.innerHTML = ''; }
  else {
    ex.hidden = false;
    ex.innerHTML = '<code data-ex="closed for 3k, follow up next tuesday, wants the full flow revamp">“closed for 3k, follow up next tuesday, wants the flow revamp”</code>';
    Array.prototype.forEach.call(ex.querySelectorAll('[data-ex]'), function (c) {
      c.addEventListener('click', function () { $('bar').value = c.getAttribute('data-ex'); $('bar').focus(); });
    });
  }
  $('bar').placeholder = pin ? 'How did it go?' : 'Say how the call went…';
  showStage('hero');
}

function localFallback(text) {
  var c = CRMParse.parseCloserUtterance(text, { now: new Date(), closing: state.closing });
  state.parsed = { route: 'closer', closer: c, ai: false };
  state.chooserRow = null; state.cashConfirmed = false;
  state.aiText = text;
  renderPreview();
}

function localActionable() {
  var p = state.parsed;
  if (!p || p.route !== 'closer') return false;
  var deal = pinnedDeal() || (p.closer.matches.length === 1 ? p.closer.matches[0] : null);
  return !!deal && Object.keys(p.closer.fields).length > 0;
}

function submit() {
  if (state.busy || state.aiBusy) return;
  var text = $('bar').value.trim();
  if (!text) return;
  smartInterpret(text);
}

function smartInterpret(text) {
  state.aiBusy = true;
  showStage('interpreting');
  var pin = pinnedDeal();
  api('interpret', { text: text, mode: 'closer', deal: pin ? displayName(pin) : undefined })
    .then(function (res) {
      state.parsed = CRMParse.intentToCommand(res.intent, {
        now: new Date(), leads: state.unique, closing: state.closing, statuses: state.statuses
      });
      state.chooserRow = null; state.cashConfirmed = false; state.aiText = text;
      renderPreview();
    })
    .catch(function (err) {
      if (/not configured/i.test(err.message)) { localFallback(text); return; } // no AI key → keyword parse
      showError('Couldn’t read that', function () { reparse(); }, esc(err.message));
    })
    .finally(function () { state.aiBusy = false; });
}

function aiTag() {
  return '<span style="display:inline-flex;align-items:center;gap:4px;color:var(--dim);font:600 10.5px var(--mono);letter-spacing:.06em;text-transform:uppercase"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.8 15.9 9 18.75l-.8-2.85a4.5 4.5 0 0 0-3.1-3.1L2.25 12l2.85-.8a4.5 4.5 0 0 0 3.1-3.1L9 5.25l.8 2.85a4.5 4.5 0 0 0 3.1 3.1L15.75 12l-2.85.8a4.5 4.5 0 0 0-3.1 3.1Z"/></svg>Claude</span>';
}

// The "check & save" screen — where he glances before committing.
function renderPreview() {
  var p = state.parsed;
  state.canWrite = false; state.needCash = false; state.writeArgs = null;

  if (!p) { reparse(); return; }

  if (p.route === 'ambiguous') {
    $('ambig').innerHTML = '<h2>Which call was this?</h2>' +
      (Array.isArray(p.candidates) ? p.candidates : []).map(function (d, i) {
        return '<button data-amb="' + i + '"><span class="an">' + esc(displayName(d)) + '</span>' +
          '<span class="am">' + (d.status ? esc(d.status) : 'row ' + d.row) + '</span></button>';
      }).join('') || pvHintHtml(p.hint || 'More than one deal matches.');
    Array.prototype.forEach.call($('ambig').querySelectorAll('[data-amb]'), function (b) {
      b.addEventListener('click', function () { pinDeal(p.candidates[+b.getAttribute('data-amb')].row); });
    });
    showStage('ambiguous');
    return;
  }

  if (p.route === 'setter') {
    pvNote(aiTag() + ' That reads like an Instagram-lead update — this popup only logs sales-call deals.');
    return;
  }

  // closer
  var c = p.closer;
  var pin = pinnedDeal();
  // named-but-many, no pin → let him choose
  if (!pin && c.matches.length > 1 && !state.chooserRow) {
    p.route = 'ambiguous'; p.candidates = c.matches.slice(0, 6); p.hint = 'More than one deal matches.';
    renderPreview();
    return;
  }
  var deal = pin || state.chooserRow || (c.matches.length === 1 ? c.matches[0] : null);
  if (!deal) {
    pvNote(c.targetText
      ? 'No deal matches “<span class="mono">' + esc(c.targetText) + '</span>” — pick the deal from the list.'
      : 'Pick the deal you called, or start with their name.');
    return;
  }
  var fields = c.fields;
  if (!Object.keys(fields).length) {
    pvNote('<span class="mono">' + esc(displayName(deal)) + '</span> — say what happened on the call.');
    return;
  }

  var LBL = { status: 'Status', meeting: 'Meeting', followup: 'Follow-up', cash: 'Cash collected', notes: 'Notes' };
  var rows = ['status', 'meeting', 'followup', 'cash', 'notes'].filter(function (k) { return fields[k] != null && fields[k] !== ''; }).map(function (k) {
    var v = k === 'cash' ? '$' + fmtCash(fields[k]) : fields[k];
    var cls = k === 'cash' ? 'v money' : ((k === 'meeting' || k === 'followup') ? 'v mono' : 'v');
    return '<div class="pv-field"><span class="k">' + LBL[k] + '</span><span class="' + cls + '">' + esc(String(v).length > 80 ? String(v).slice(0, 80) + '…' : v) + '</span></div>';
  }).join('');
  var warns = (c.warnings || []).length
    ? '<div class="pv-warn">' + warnIcon() + '<span>' + c.warnings.map(esc).join(' ') + '</span></div>' : '';

  $('pvHead').innerHTML = '<span class="pv-name">' + esc(displayName(deal)) + '</span><span class="pv-row-num">row ' + deal.row + '</span>' +
    (p.ai ? '<span style="margin-left:auto">' + aiTag() + '</span>' : '');
  $('pvBody').innerHTML = rows + warns;

  state.writeArgs = { kind: 'closer', deal: deal, fields: fields };
  state.needCash = fields.cash != null && fields.cash !== '';
  state.canWrite = !state.needCash || state.cashConfirmed;
  renderActRow();
  showStage('preview');
}

function pvHintHtml(msg) { return '<div class="pv-hint">' + msg + '</div>'; }
// a non-actionable preview: message + a "back" is implicit (bar returns via clear)
function pvNote(msgHtml) {
  $('pvHead').innerHTML = '';
  $('pvBody').innerHTML = pvHintHtml(msgHtml);
  $('actRow').innerHTML = '<button class="btn btn-ghost" id="backBtn">Back</button>';
  $('backBtn').addEventListener('click', function () { reparse(); $('bar').focus(); });
  showStage('preview');
}

function renderActRow() {
  var row = $('actRow');
  if (state.needCash && !state.cashConfirmed) {
    var amt = state.writeArgs.fields.cash;
    row.innerHTML = '<button class="btn btn-primary" id="goBtn">Continue — confirm $' + esc(fmtCash(amt)) + '</button>';
    $('goBtn').addEventListener('click', openMoney);
    return;
  }
  row.innerHTML = '<button class="btn btn-primary" id="goBtn">Save to CRM</button>';
  $('goBtn').addEventListener('click', execute);
}

/* ---------- money takeover ---------- */
function openMoney() {
  var amt = Number(state.writeArgs.fields.cash);
  var deal = state.writeArgs.deal;
  $('money').innerHTML =
    '<div class="ctx">' + esc(displayName(deal)) + ' · cash collected</div>' +
    '<div class="digits">$' + esc(fmtCash(amt)) + '</div>' +
    '<div class="words">' + esc(CRMParse.moneyToWords(amt)) + '</div>' +
    '';
  $('moneyActs').innerHTML =
    '<button class="btn btn-money" id="cashYes">Correct — save it</button>' +
    '<button class="btn btn-ghost" id="cashNo">Wrong amount — go back</button>';
  $('cashYes').addEventListener('click', function () { state.cashConfirmed = true; state.canWrite = true; execute(); });
  $('cashNo').addEventListener('click', function () { renderActRow(); showStage('preview'); });
  showStage('money');
  $('cashYes').focus();
}

/* ---------- deal picker / pin area ---------- */
function renderPinArea() {
  var pin = pinnedDeal();
  var area = $('pinArea');
  if (pin && state.callBanner === pin.row) {
    area.innerHTML = '<div class="banner-wrap"><div class="banner"><span class="bdot"></span>' +
      '<div style="flex:1;min-width:0"><div class="eyebrow">Just hopped off a Zoom</div>' +
      '<div class="who">' + esc(displayName(pin)) + '</div></div>' +
      '<button class="x" id="unpinBtn" aria-label="Clear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div></div>';
    $('unpinBtn').addEventListener('click', unpinDeal);
  } else if (pin) {
    area.innerHTML = '<div class="chip-wrap"><span class="chip">' + esc(displayName(pin)) +
      '<button class="x" id="unpinBtn" aria-label="Clear deal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 18 18 6M6 6l12 12"/></svg></button></span></div>';
    $('unpinBtn').addEventListener('click', unpinDeal);
  } else {
    area.innerHTML = '<button class="pick-row" id="pickOpen">' +
      '<svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m21 21-5.2-5.2m0 0A7.5 7.5 0 1 0 5.2 5.2a7.5 7.5 0 0 0 10.6 10.6Z"/></svg>' +
      'Pick who you met with' +
      '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>';
    $('pickOpen').addEventListener('click', function () { openPicker(true); });
  }
}
function openPicker(open) {
  state.pickerOpen = open;
  if (open) { renderRest(); $('dealFilter').value = ''; setTimeout(function () { $('dealFilter').focus(); }, 30); }
  else { renderRest(); }
}
function pinDeal(row) {
  state.pinnedRow = row; state.pickerOpen = false;
  reparse();
  $('bar').focus();
}
function unpinDeal() { state.pinnedRow = null; state.callBanner = null; reparse(); }
function dealSortKey(d) {
  var m = daysUntil(d.meeting), f = daysUntil(d.followup);
  var done = d.status === 'Closed' || d.status === 'No Close';
  if (done) return 1e6;
  var vals = [m, f].filter(function (x) { return x !== null; });
  return vals.length ? Math.min.apply(null, vals) : 1e5;
}
function renderDeals() {
  var q = ($('dealFilter').value || '').toLowerCase().trim();
  var list = $('dealList');
  var rows = state.closing.filter(function (d) {
    if (!q) return true;
    return (displayName(d) + ' ' + (d.link || '')).toLowerCase().indexOf(q) !== -1;
  }).slice().sort(function (a, b) { return dealSortKey(a) - dealSortKey(b); });
  if (!rows.length) { list.innerHTML = '<li style="padding:12px;color:var(--dim);font-size:13px">No deals match.</li>'; return; }
  list.innerHTML = rows.slice(0, 60).map(function (d) {
    var rel = relBadge(d.meeting, 'meet') || relBadge(d.followup, 'fu');
    return '<li><button class="deal-row" data-row="' + d.row + '">' +
      '<span class="dn">' + esc(displayName(d)) + '</span>' + rel +
      (d.status ? '<span class="ds">' + esc(d.status) + '</span>' : '') + '</button></li>';
  }).join('');
  Array.prototype.forEach.call(list.querySelectorAll('[data-row]'), function (b) {
    b.addEventListener('click', function () { pinDeal(+b.getAttribute('data-row')); });
  });
}

/* ---------- execute ---------- */
function execute() {
  if (state.busy || !state.writeArgs || !state.canWrite) return;
  var w = state.writeArgs;
  var reqId = newReqId();
  state.busy = true;
  var go = $('goBtn') || $('cashYes'); if (go) go.disabled = true;

  var run;
  if (w.kind === 'setter') {
    var sp = { handle: w.handle, reqId: reqId };
    if (w.stage) sp.stage = w.stage;
    if (w.status) sp.status = w.status;
    run = api('setterUpdate', sp).then(function (res) { onSetterOk(res, w); });
  } else {
    var cp = { row: w.deal.row, fields: w.fields };
    if (state.needCash) cp.cashConfirmed = true;
    run = api('closerUpdate', cp).then(function (res) { onCloserOk(res, w); });
  }
  run.catch(function (err) {
    if (err.message === 'row-moved') {
      toast({ type: 'err', html: 'The sheet moved that row — refresh and redo.', sticky: true, action: { label: 'Refresh', fn: function () { runBootstrap(true); } } });
    } else {
      toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true, action: { label: 'Retry', fn: function () { state.busy = true; run2(); } } });
    }
    reparse();
  }).finally(function () { state.busy = false; var g = $('goBtn') || $('cashYes'); if (g) g.disabled = false; });

  function run2() {
    var again = w.kind === 'setter'
      ? api('setterUpdate', Object.assign({ handle: w.handle, reqId: reqId }, w.stage ? { stage: w.stage } : {}, w.status ? { status: w.status } : {})).then(function (res) { onSetterOk(res, w); })
      : api('closerUpdate', Object.assign({ row: w.deal.row, fields: w.fields }, state.needCash ? { cashConfirmed: true } : {})).then(function (res) { onCloserOk(res, w); });
    again.catch(function (err) { toast({ type: 'err', html: 'Failed again: ' + esc(err.message), sticky: true }); }).finally(function () { state.busy = false; });
  }
}

function onSetterOk(res, w) {
  var html = (res.mode === 'created' ? 'Created ' : '') + '@' + esc(res.handle) + (w.stage ? ' → ' + esc(w.stage) : ' logged');
  var l = state.byHandle.get(res.handle);
  if (l) { if (w.stage) l.level = w.stage; if (w.status) l.status = w.status; l.lastContact = state.serverDate; }
  pushRecent(html);
  showSaved(res.handle ? '@' + res.handle : 'Lead', html, (res.mode === 'updated' && res.prev) ? function () { undoSetter(res); } : null);
}
function onCloserOk(res, w) {
  var applied = Object.keys(res.applied || w.fields);
  var sum = applied.map(function (k) { return ({ status: 'status', meeting: 'meeting', followup: 'follow-up', cash: 'cash', notes: 'notes' })[k] || k; }).join(', ');
  var d = w.deal, f = w.fields;
  if (f.status) d.status = f.status; if (f.meeting) d.meeting = f.meeting; if (f.followup) d.followup = f.followup;
  if (f.cash != null && f.cash !== '') d.cash = f.cash;
  if (f.notes) d.notes = (!d.notes || d.notes.indexOf('[draft]') === 0) ? f.notes : d.notes + '\n' + f.notes;
  var name = res.name || displayName(w.deal);
  pushRecent(esc(name) + ' — ' + esc(sum) + (f.cash ? ', $' + fmtCash(f.cash) : ''));
  showSaved(name, sum + ' written', res.prev ? function () { undoCloser(res, w.deal); } : null);
}
function undoSetter(res) {
  api('restore', { tab: 'instagram', row: res.row, values: res.prev, reqId: newReqId() }).then(function () {
    var l = state.byHandle.get(res.handle);
    if (l) { l.level = res.prev.level; l.status = res.prev.status; l.lastContact = res.prev.lastContact; }
  }).catch(function (err) { toast({ type: 'err', html: 'Undo failed: ' + esc(err.message), sticky: true }); });
}
function undoCloser(res, deal) {
  core.undoWrite(res.undo).then(function () {
    if (res.prev.status !== undefined) deal.status = res.prev.status;
    if (res.prev.meeting !== undefined) deal.meeting = core.isoToDmy(res.prev.meeting);
    if (res.prev.followup !== undefined) deal.followup = core.isoToDmy(res.prev.followup);
    if (res.prev.cash !== undefined) deal.cash = res.prev.cash == null ? '' : res.prev.cash;
    if (res.prev.notes !== undefined) deal.notes = res.prev.notes;
  }).catch(function (err) { toast({ type: 'err', html: 'Undo failed: ' + esc(err.message), sticky: true }); });
}

/* ---------- saved screen ---------- */
function showSaved(name, summary, undoFn) {
  if (state.savedTimer) clearTimeout(state.savedTimer);
  $('saved').innerHTML =
    '<div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="var(--money-chk)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m4.5 12.75 6 6 9-13.5"/></svg></div>' +
    '<div class="who">Logged — ' + esc(name) + '</div>' +
    '<div class="sum">' + esc(summary) + '</div>' +
    (undoFn ? '<button class="btn-sm" id="undoBtn">Undo</button>' : '');
  if (undoFn) $('undoBtn').addEventListener('click', function () {
    if (state.savedTimer) clearTimeout(state.savedTimer);
    undoFn(); finishSaved();
  });
  showStage('saved');
  state.savedTimer = setTimeout(finishSaved, 4500);
}
function finishSaved() {
  if (state.savedTimer) { clearTimeout(state.savedTimer); state.savedTimer = null; }
  $('bar').value = ''; state.pinnedRow = null; state.callBanner = null;
  reparse(); $('bar').focus();
}

/* ---------- error screen ---------- */
function showError(title, retryFn, subtitle) {
  $('errScreen').innerHTML =
    '<svg viewBox="0 0 24 24" fill="none" stroke="var(--err)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v3.75m9.303-1.626a1.734 1.734 0 0 1-1.51 2.626H4.207a1.734 1.734 0 0 1-1.51-2.626M12 5.25 3.31 16.874M12 5.25l8.69 11.624M12 15.75h.007v.008H12v-.008Z"/></svg>' +
    '<div class="et">' + esc(title) + '</div>' +
    '<div class="es">' + esc(subtitle || 'Check your connection and try again.') + '</div>' +
    '<button class="btn-sm" id="retryBtn" style="margin-top:4px">Retry</button>';
  $('retryBtn').addEventListener('click', function () { retryFn(); });
  state.connErr = true;
  showStage('error');
}

/* ---------- recent ---------- */
function pushRecent(html) {
  recent.unshift({ html: html, t: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) });
  recent = recent.slice(0, 5);
  $('recentList').innerHTML = recent.map(function (r) {
    return '<li><span class="tag">MEET</span><span class="rx">' + r.html + '</span><span class="rt">' + r.t + '</span></li>';
  }).join('');
}

/* ---------- voice ---------- */
function initVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  $('micBtn').hidden = false;
  $('micBtn').title = 'Tell me what happened on the call';
  var rec = null, base = '';
  function toggle() {
    if (state.listening) { try { rec.stop(); } catch (e) {} return; }
    rec = new SR(); rec.lang = 'en-US'; rec.interimResults = true; rec.maxAlternatives = 1;
    base = $('bar').value ? $('bar').value.trim() + ' ' : '';
    rec.onresult = function (ev) { var t = ''; for (var i = 0; i < ev.results.length; i++) t += ev.results[i][0].transcript; $('bar').value = base + t.trim(); };
    rec.onend = function () {
      state.listening = false; $('micBtn').classList.remove('listening');
      if (state.screen === 'hero') renderRest();
      var text = $('bar').value.trim();
      if (text) smartInterpret(text);
    };
    rec.onerror = function (ev) {
      state.listening = false; $('micBtn').classList.remove('listening');
      if (state.screen === 'hero') renderRest();
      if (ev.error !== 'aborted') toast({ type: 'err', html: 'Voice: ' + esc(ev.error) + ' — type it instead.' });
    };
    try {
      rec.start(); state.listening = true; $('micBtn').classList.add('listening');
      if (state.screen === 'hero') renderRest();
    } catch (e) { toast({ type: 'err', html: 'Couldn’t start the mic — type it instead.' }); }
  }
  $('micBtn').addEventListener('click', toggle);
  $('heroMic').addEventListener('click', function () { if (state.screen === 'hero' && !state.pickerOpen) toggle(); });
}

/* ---------- call-finished watcher ---------- */
var PENDING_SEEN_KEY = 'ajr_pending_seen';
var pendingTimer = null;
function pendingSeen_() { try { return JSON.parse(localStorage.getItem(PENDING_SEEN_KEY) || '[]'); } catch (e) { return []; } }
function markPendingSeen_(id) {
  var seen = pendingSeen_().slice(-30);
  if (seen.indexOf(id) === -1) seen.push(id);
  localStorage.setItem(PENDING_SEEN_KEY, JSON.stringify(seen));
}
function startPendingWatch() {
  if (pendingTimer) clearInterval(pendingTimer);
  pendingTimer = core.pageInterval(pollPending, 45000);
  core.pageListen(window, 'focus', pollPending);
  pollPending();
}
function pollPending() {
  if (state.busy || state.aiBusy) return;
  api('pending', {}).then(function (res) {
    var seen = pendingSeen_();
    var fresh = (res.calls || []).filter(function (c) { return seen.indexOf(c.id) === -1; });
    if (!fresh.length) return;
    var call = fresh[fresh.length - 1];
    markPendingSeen_(call.id);
    var deal = null;
    for (var i = 0; i < state.closing.length; i++) if (state.closing[i].row === call.row) deal = state.closing[i];
    if (!deal) return;
    announceCall(deal);
  }).catch(function () {});
}
function announceCall(deal) {
  var name = displayName(deal);
  var idle = state.screen === 'hero' && !pinnedDeal() && !$('bar').value.trim();
  if (idle) {
    state.callBanner = deal.row;
    pinDeal(deal.row);
  } else {
    toast({ html: 'Call with <span class="mono">' + esc(name) + '</span> finished.', ttl: 8000 });
  }
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted' && !document.hasFocus()) {
    try {
      var n = new Notification('Call with ' + name + ' finished', { body: 'Tap to log how it went.', tag: 'ajr-call-' + deal.row, icon: 'icon.svg' });
      n.onclick = function () {
        try { window.focus(); } catch (e) {}
        if (!pinnedDeal()) { state.callBanner = deal.row; pinDeal(deal.row); }
        n.close();
      };
    } catch (e) {}
  }
}
function initBell() {
  if (typeof Notification === 'undefined') return;
  if (Notification.permission === 'default') {
    $('bellBtn').hidden = false;
    $('bellBtn').addEventListener('click', function () {
      Notification.requestPermission().then(function (perm) {
        $('bellBtn').hidden = perm !== 'default';
        if (perm === 'granted') toast({ html: 'You’ll get a ping here when a call finishes.' });
      });
    });
  }
}

/* ---------- corner window (pop-out) ---------- */
function isStandalone() {
  return !!(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
}
function isPoppedOut() { return !!window.opener || isStandalone() || window.outerWidth < 560; }
function isClosable() { return !!window.opener || isStandalone(); }
function closeWindow() {
  window.close();
  setTimeout(function () { toast({ type: 'err', html: 'Close it from the window’s own close button — the browser won’t let the page do it here.' }); }, 250);
}
function popOut() {
  var w = 400, h = 640;
  var sw = window.screen.availWidth || 1280, sh = window.screen.availHeight || 800;
  var left = Math.max(0, sw - w - 24), top = Math.max(0, sh - h - 48);
  var feat = 'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes';
  var win = window.open(location.href, 'ajrcall', feat);
  if (!win) { toast({ type: 'err', html: 'Allow pop-ups for this site, then click the pop-out again.' }); return; }
  try { win.focus(); } catch (e) {}
  try { window.close(); } catch (e2) {}
}
function registerSW() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function () {});
}

/* ---------- config + boot ---------- */
function readFragment() {
  var qp = new URLSearchParams(location.search);
  var dl = parseInt(qp.get('deal'), 10);
  if (dl >= 1) state.deepLinkRow = dl;
  if (qp.get('after') === '1') state.afterCall = true;
  var nid = qp.get('nudge');
  if (nid) markPendingSeen_(nid);
  return;
  /* eslint-disable */
  if (!location.hash) return;
  var pr = new URLSearchParams(location.hash.slice(1));
  var u = pr.get('u'), k = pr.get('k');
  if (u && k) { localStorage.setItem(LS_URL, u); localStorage.setItem(LS_KEY, k);
    history.replaceState(null, '', location.pathname + location.search); }
}
function bind() {
  if (isPoppedOut()) document.body.classList.add('popped');
  if (isClosable()) { $('closeBtn').hidden = false; $('closeBtn').addEventListener('click', closeWindow); }
  else { $('popBtn').hidden = false; $('popBtn').addEventListener('click', popOut); }
  $('bar').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
    else if (e.key === 'Escape') { $('bar').value = ''; }
  });
  $('dealFilter').addEventListener('input', renderDeals);
  $('dealFilter').addEventListener('keydown', function (e) { if (e.key === 'Escape') openPicker(false); });
  $('refreshBtn').addEventListener('click', function () { runBootstrap(true); });
  var hiddenAt = null;
  core.pageListen(document, 'visibilitychange', function () {
    if (document.hidden) { hiddenAt = Date.now(); return; }
    if (hiddenAt && Date.now() - hiddenAt > 5 * 60 * 1000 && !$('app').hidden) runBootstrap(true);
    hiddenAt = null;
  });
}
function start() { runBootstrap(false); }
function boot() {
  if (typeof window.CRMParse === 'undefined') {
    document.querySelector('.v2-main').insertAdjacentHTML('beforeend', '<p style="color:#b4543e;padding:20px">parser.js failed to load — keep it next to close-call.html.</p>');
    return;
  }
  readFragment(); initVoice(); bind(); start();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
}
</script>
