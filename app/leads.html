<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>All leads · AJR</title>
<style>
.l-thead,.l-row{grid-template-columns:118px 74px 44px 100px 60px 52px minmax(0,1fr)}
.l-row{cursor:pointer}
.lh{font-weight:600;font-size:13.5px;color:#211f1b;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lh:hover{color:#211f1b;text-decoration:underline;text-decoration-color:#ccc5b6}
.l-cell{font-size:12.5px;color:#4d4a42;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.l-cell.dim{color:#8a8375}
.l-mono{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6d675b}
.l-min{min-width:600px}
.pager{display:flex;align-items:center;gap:10px;padding:11px 18px;border-top:1px solid #f0ede6;color:#8a8375;font-size:12.5px}
.pager .sp{flex:1}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(33,31,27,.45);opacity:0;pointer-events:none;transition:opacity .18s;z-index:60}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(300px,100vw);background:#fdfcf9;
  border-left:1px solid #e6e2da;transform:translateX(100%);transition:transform .2s cubic-bezier(.2,.8,.2,1);
  z-index:70;display:flex;flex-direction:column}
.drawer.on{transform:none}
.dhead{padding:18px 20px 12px;border-bottom:1px solid #f0ede6;flex:none}
.dhead .lab{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:#98917f;display:block;margin-bottom:6px}
.dhead h2{font-size:16px;font-weight:700;display:inline-block;margin-right:8px}
.dbody{flex:1;overflow-y:auto;padding:16px 20px}
.dbody .meta{color:#8a8375;font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.fld{margin-bottom:13px}
.fld label{display:block;font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#98917f;margin-bottom:5px}
.hist{margin-top:4px;border-top:1px solid #f0ede6;padding-top:13px}
.hist h3{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#98917f;margin-bottom:8px}
.hist ul{list-style:none}
.hist li{display:flex;gap:8px;padding:5px 0;font-size:12px;color:#4d4a42}
.hist .who{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6d675b;flex:none}
.hist .who.ai{color:#7c56c9}
.hist .what{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist .when{color:#98917f;font-size:11px;flex:none}
.dfoot{padding:13px 20px;border-top:1px solid #f0ede6;flex:none;display:flex;flex-direction:column;gap:8px}
.dfoot .v2-btn{width:100%}
/* outreach pool */
.poolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid #f0ede6;font-size:13px;color:#4d4a42}
.poolbar .sp{flex:1}
.poolbar b{font-family:'IBM Plex Mono',monospace;color:#211f1b}
.poolgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}
.poolcell{display:flex;align-items:center;gap:9px;padding:10px 18px;border-top:1px solid #f0ede6;min-width:0}
.poolcell input{width:15px;height:15px;flex:none;cursor:pointer;accent-color:#2a6a4d}
.poolcell a{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.impbar{display:flex;align-items:center;gap:12px;padding:13px 18px;margin-bottom:14px;border:1px solid #c9dfd2;
  border-radius:12px;background:#eef5f0;color:#4d4a42;font-size:13px}
.impbar b{font-family:'IBM Plex Mono',monospace;color:#211f1b}
.impbar .sp{flex:1}
.pooldash{border:1px dashed #ddd8cd;border-radius:12px;padding:34px;text-align:center;color:#8a8375}
</style>
</head>
<body>
<main class="v2-main">
  <header class="v2-h">
    <h1>All leads</h1>
    <span class="sub" id="count">—</span>
    <span class="sp"></span>
    <button class="v2-btn dash" id="scanBtn" type="button">Paste screenshot ⌘V</button>
    <button class="v2-btn dash" id="importBtn" type="button">Import IG following…</button>
    <input id="importFile" type="file" accept=".json,application/json" hidden>
    <button class="v2-btn sm" id="refresh">Refresh</button>
  </header>

  <div class="v2-chips" id="sumbar"></div>

  <div class="v2-chips" style="margin-bottom:14px">
    <input class="v2-in" id="search" type="text" placeholder="Search handle, notes, email…"
           autocomplete="off" spellcheck="false" style="flex:1;min-width:140px;max-width:260px">
    <select class="v2-in" id="tempsel" style="width:auto">
      <option value="">Any temp</option><option>Hot Lead</option><option>Warm Lead</option><option>Cold Lead</option>
    </select>
  </div>

  <div class="v2-card" id="table"><div class="v2-empty" id="skel">Loading leads…</div></div>
</main>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Lead editor">
  <div class="dhead">
    <span class="lab">Selected lead</span>
    <h2 id="d-name">Lead</h2>
    <a id="d-ig" target="_blank" rel="noopener" hidden style="font-size:12.5px">open profile ↗</a>
    <button class="v2-btn sm" id="d-close" style="float:right;min-height:24px;padding:0 8px">×</button>
  </div>
  <div class="dbody">
    <div class="meta" id="d-meta"></div>
    <button class="v2-btn go" id="q-fu" style="width:100%;margin-bottom:6px">Log follow-up now</button>
    <a id="q-log" href="#" style="display:block;text-align:center;font-size:12.5px;margin-bottom:12px">Open in Log a lead →</a>
    <div class="g2">
      <div class="fld"><label>Stage</label>
        <select class="v2-in" id="f-level"><option value="">no level</option><option>Engaged 1</option><option>Engaged 2</option><option>Engaged 3</option><option>Booked</option><option>No Close</option><option>Outreach</option><option>Archive</option><option>No Reply</option><option>Closed</option></select>
      </div>
      <div class="fld"><label>Temp</label>
        <select class="v2-in" id="f-temp"><option value="">—</option><option>Hot Lead</option><option>Warm Lead</option><option>Cold Lead</option></select>
      </div>
      <div class="fld"><label>Status</label><select class="v2-in" id="f-status"><option value="">—</option></select></div>
      <div class="fld"><label>Qualification</label>
        <select class="v2-in" id="f-qual"><option value="">—</option><option>Qualified 1</option><option>Qualified 2</option><option>Qualified 3</option><option>Unqualified</option></select>
      </div>
      <div class="fld"><label>Email</label><input class="v2-in" id="f-email" type="email"></div>
      <div class="fld"><label>Phone</label><input class="v2-in" id="f-phone" type="text"></div>
    </div>
    <div class="fld"><label>Pain points</label><textarea class="v2-in" id="f-pains"></textarea></div>
    <div class="fld"><label>Notes</label><textarea class="v2-in mono" id="f-notes" style="font-size:12px"></textarea></div>
    <div class="fld"><label>LinkedIn</label><input class="v2-in" id="f-linkedin" type="text"></div>
    <div class="hist" id="hist" hidden><h3>History</h3><ul id="hist-list"></ul></div>
  </div>
  <div class="dfoot">
    <button class="v2-btn dark" id="d-save">Save</button>
    <button class="v2-btn" id="d-cancel">Close</button>
  </div>
</aside>


<script src="./parser.js"></script>
<script type="module">
import * as core from './crm-core.js?v=20260721h';
const session = await core.requireAuth();
if (session) {
await core.installChrome({ active: 'leads' });
const RULES = await core.worklistRules();
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

const STAGE_ORDER = ['Engaged 3', 'Engaged 2', 'Engaged 1', 'Booked', 'No Close', 'No Reply', '', 'Archive', 'Closed', 'Outreach'];
const LEVEL_COLORS = {
  'Engaged 1': '#a9a9b1', 'Engaged 2': '#c9c9cf', 'Engaged 3': '#e9e9ec',
  'Booked': '#8ee59a', 'No Close': '#d99a9a', 'Archive': '#6e6e78', 'No Reply': '#8a8a92', 'Closed': '#c9c9cf', 'Outreach': '#7f8fa6', '': '#6e6e78'
};
const state = { leads: [], sel: new Set(), filter: 'ALL', temp: '', q: '', sort: { key: 'lastContact', dir: -1 }, shown: 100, editing: null, busy: false };

const toast = core.toast;

function daysSince(dmy) {
  const d = CRMParse.parseDMY(dmy);
  if (!d) return null;
  return Math.round((new Date() - d) / 864e5);
}

/* ---------- summary bar ---------- */
function renderSumbar() {
  const counts = {};
  state.leads.forEach((l) => { const k = l.level || ''; counts[k] = (counts[k] || 0) + 1; });
  const realCount = state.leads.length - (counts['Outreach'] || 0);
  const chips = [['ALL', 'All', realCount]]
    .concat(STAGE_ORDER.filter((st) => counts[st]).map((st) => [st, st || 'No level', counts[st]]));
  $('sumbar').innerHTML = chips.map(([key, label, n]) => {
    const extra = key === 'Booked' ? ' green' : key === 'No Close' ? ' red' : '';
    return `<button class="v2-chip${state.filter === key ? ' on' : extra}" data-f="${esc(key)}">${esc(label)}<span class="n">${n}</span></button>`;
  }).join('');
  Array.prototype.forEach.call($('sumbar').children, (b) => {
    b.onclick = () => { state.filter = b.getAttribute('data-f'); state.shown = 100; renderSumbar(); renderTable(); };
  });
}

/* ---------- table ---------- */
const COLS = [
  ['h', 'Handle'], ['level', 'Stage'], ['temp', 'Temp'], ['status', 'Last status'],
  ['lastContact', 'Since'], ['dateAdded', 'Added'], ['notes', 'Notes'],
];
function cmp(a, b, key) {
  if (key === 'lastContact' || key === 'dateAdded') {
    const da = CRMParse.parseDMY(a[key]), db = CRMParse.parseDMY(b[key]);
    return (da ? da.getTime() : 0) - (db ? db.getTime() : 0);
  }
  return String(a[key] || '').localeCompare(String(b[key] || ''));
}
function visible() {
  const q = state.q.toLowerCase().trim();
  let list = state.leads.filter((l) => {
    // the outreach pool is a bucket, not part of the lead book — only visible
    // when its own chip is picked
    if (state.filter === 'ALL' && l.level === 'Outreach') return false;
    if (state.filter !== 'ALL' && (l.level || '') !== state.filter) return false;
    if (state.temp && l.temp !== state.temp) return false;
    if (q && !((l.h + ' ' + l.notes + ' ' + l.email + ' ' + l.status + ' ' + l.pains).toLowerCase().includes(q))) return false;
    return true;
  });
  list.sort((a, b) => cmp(a, b, state.sort.key) * state.sort.dir);
  return list;
}
/* ---------- outreach pool: work a mass-DM batch ---------- */
function renderPool() {
  const pool = state.leads.filter((l) => l.level === 'Outreach');
  const todo = pool.filter((l) => !l.lastContact);
  const sent = pool.length - todo.length;
  const sel = state.sel;
  const t = $('table');
  if (!pool.length) {
    t.innerHTML = '<div class="pooldash" style="margin:18px">' +
      '<div style="font-weight:600;color:#211f1b;margin-bottom:6px">Nothing imported yet</div>' +
      '<div style="margin-bottom:14px">Pool entries stay out of the lead book and the Worklist.</div>' +
      '<button class="v2-btn dark" id="poolImport">Import IG following…</button></div>';
    $('count').textContent = '0 in pool';
    return;
  }
  t.innerHTML =
    '<div class="poolbar">' +
      '<b>' + todo.length.toLocaleString() + '</b><span>not yet messaged</span>' +
      '<span style="color:#98917f">·</span><span>' + sent.toLocaleString() + ' sent</span>' +
      '<span class="sp"></span>' +
      '<button class="v2-btn sm' + (sel.size ? '' : ' dark') + '" data-take="25">Next 25</button>' +
      '<button class="v2-btn sm" data-take="50">50</button>' +
      '<button class="v2-btn sm" data-take="100">100</button>' +
    '</div>' +
    '<div class="poolbar">' +
      '<b>' + (sel.size || 0) + '</b><span>selected</span>' +
      '<button class="v2-btn sm" id="poolCopy">Copy handles</button>' +
      '<span class="sp"></span>' +
      '<button class="v2-btn go sm" id="poolMark"' + (sel.size ? '' : ' disabled') + '>Mark batch sent today</button>' +
    '</div>' +
    '<div class="poolgrid">' + todo.slice(0, 300).map((l) =>
      '<label class="poolcell">' +
        '<input type="checkbox" data-id="' + l.id + '"' + (sel.has(l.id) ? ' checked' : '') + '>' +
        '<a href="' + esc(l.url || ('https://instagram.com/' + l.h)) + '" target="_blank" rel="noopener">@' + esc(l.h) + '</a>' +
      '</label>').join('') + '</div>' +
    (todo.length > 300 ? '<div class="v2-empty">+ ' + (todo.length - 300).toLocaleString() + ' more…</div>' : '');
  $('count').textContent = pool.length.toLocaleString() + ' in pool';
}

function renderTable() {
  if (state.filter === 'Outreach') { renderPool(); return; }
  const rows = visible();
  const realTotal = state.leads.filter((l) => l.level !== 'Outreach').length;
  $('count').textContent = rows.length === realTotal
    ? realTotal + ' leads' : rows.length + ' of ' + realTotal;
  const head = '<div class="v2-thead l-thead l-min">' + COLS.map(([key, label]) =>
    `<button data-s="${key}" style="text-align:left;font:inherit;letter-spacing:inherit;text-transform:uppercase;color:inherit">${label}${state.sort.key === key ? `<span class="arr"> ${state.sort.dir > 0 ? '↑' : '↓'}</span>` : ''}</button>`).join('') + '</div>';
  const t = $('table');
  if (!rows.length) { t.innerHTML = '<div class="v2-scroll">' + head + '</div><div class="v2-empty">No leads match.</div>'; bindHead(); return; }
  const page = rows.slice(0, state.shown);
  t.innerHTML = '<div class="v2-scroll"><div class="l-min">' + head + page.map((l) => {
    const ds = daysSince(l.lastContact);
    const stageCls = l.level === 'Booked' ? 'color:#2a6a4d;font-weight:600'
      : l.level === 'No Close' ? 'color:#b4543e' : '';
    return `<div class="v2-row l-row" data-id="${l.id}">
      <a class="lh" href="${esc(l.url || 'https://instagram.com/' + l.h)}" target="_blank" rel="noopener">@${esc(l.h)}</a>
      <span class="l-cell" style="${stageCls}">${esc(l.level || 'no level')}</span>
      <span class="l-cell ${l.temp === 'Hot Lead' ? 'v2-hot' : 'dim'}">${l.temp ? esc(l.temp.split(' ')[0]) : ''}</span>
      <span class="l-cell">${esc(l.status || '')}</span>
      <span class="v2-age ${core.ageClass(ds, RULES)}">${l.lastContact ? (ds <= 0 ? 'today' : ds + 'd') : '—'}</span>
      <span class="l-mono">${esc((l.dateAdded || '').slice(0, 5))}</span>
      <span class="l-cell dim" title="${esc(l.notes)}">${esc(l.notes || '')}</span>
    </div>`;
  }).join('') + '</div></div>' +
    (rows.length > state.shown
      ? `<div class="pager"><span>1–${Math.min(state.shown, rows.length)} of ${rows.length.toLocaleString()}</span><span class="sp"></span><button class="v2-btn sm" id="more">Show 100 more</button></div>`
      : `<div class="pager"><span>${rows.length.toLocaleString()} shown</span></div>`);
  bindHead();
  Array.prototype.forEach.call(t.querySelectorAll('.l-row'), (r) => {
    r.onclick = () => openDrawer(+r.getAttribute('data-id'));
    const a = r.querySelector('.lh'); if (a) a.addEventListener('click', (e) => e.stopPropagation()); // @ opens IG, not the drawer
  });
  const more = $('more'); if (more) more.onclick = () => { state.shown += 100; renderTable(); };
}
function bindHead() {
  Array.prototype.forEach.call($('table').querySelectorAll('.v2-thead button'), (b) => {
    b.onclick = () => {
      const k = b.getAttribute('data-s');
      if (state.sort.key === k) state.sort.dir *= -1; else state.sort = { key: k, dir: k.includes('Contact') || k.includes('Added') ? -1 : 1 };
      renderTable();
    };
  });
}

/* ---------- drawer ---------- */
function leadById(id) { return state.leads.find((l) => l.id === id); }
async function openDrawer(id) {
  const l = leadById(id); if (!l) return;
  state.editing = id;
  $('d-name').textContent = '@' + l.h;
  const ig = $('d-ig');
  if (l.url) { ig.hidden = false; ig.href = l.url; } else ig.hidden = true;
  $('d-meta').textContent = (l.dateAdded ? 'added ' + l.dateAdded + ' · ' : '') + (l.lastContact ? 'last contact ' + l.lastContact : 'never contacted');
  $('q-log').href = 'log-lead.html?lead=' + encodeURIComponent(l.h);
  $('f-level').value = l.level || '';
  $('f-temp').value = l.temp || '';
  $('f-status').value = core.STATUSES.includes(l.status) ? l.status : '';
  $('f-qual').value = ['Qualified 1','Qualified 2','Qualified 3','Unqualified'].includes(l.qual) ? l.qual : '';
  $('f-notes').value = l.notes || '';
  $('f-pains').value = l.pains || '';
  $('f-email').value = l.email || '';
  $('f-phone').value = l.phone || '';
  $('f-linkedin').value = l.linkedin || '';
  $('scrim').classList.add('on'); $('drawer').classList.add('on');
  // history (async fill)
  $('hist').hidden = true;
  try {
    const acts = await core.loadActivity('leads', id, 8);
    if (acts.length && state.editing === id) {
      $('hist-list').innerHTML = acts.map((a) => {
        const who = a.actor === 'ai:fireflies' ? 'AI (call)' : (a.actor || '').split('@')[0] || 'someone';
        const what = a.action === 'restore' ? 'undid a change' :
          a.action === 'create' ? 'created the lead' :
          'set ' + Object.keys(a.next || {}).join(', ');
        return `<li><span class="who">${esc(who)}</span><span class="what">${esc(what)}</span><span class="when">${esc(core.relTime(a.created_at))}</span></li>`;
      }).join('');
      $('hist').hidden = false;
    }
  } catch (e) { /* history is best-effort */ }
}
function closeDrawer() {
  state.editing = null;
  $('scrim').classList.remove('on'); $('drawer').classList.remove('on');
}
async function saveDrawer() {
  const l = leadById(state.editing); if (!l || state.busy) return;
  const fields = {
    level: $('f-level').value, temp: $('f-temp').value,
    status: $('f-status').value || l.status, qual: $('f-qual').value,
    notes: $('f-notes').value, pains: $('f-pains').value,
    email: $('f-email').value.trim(), phone: $('f-phone').value.trim(), linkedin: $('f-linkedin').value.trim(),
  };
  state.busy = true; $('d-save').disabled = true;
  try {
    const res = await core.setLead(l.id, fields);
    l.level = fields.level; l.temp = fields.temp; l.status = fields.status; l.qual = fields.qual;
    l.notes = fields.notes; l.pains = fields.pains; l.email = fields.email; l.phone = fields.phone; l.linkedin = fields.linkedin;
    renderSumbar(); renderTable(); closeDrawer();
    if (res.undo) { state.lastUndo = { res, l }; $('d-cancel').textContent = 'Undo last'; }
    toast({ type: 'ok', html: '<span class="mono">@' + esc(l.h) + '</span> saved.', ttl: 7000,
      action: res.undo ? { label: 'Undo', fn: () => undo(res, l) } : null });
  } catch (e) {
    toast({ type: 'err', html: 'Save failed: ' + esc(e.message), sticky: true });
  } finally { state.busy = false; $('d-save').disabled = false; }
}
async function undo(res, l) {
  try {
    await core.undoWrite(res.undo);
    const p = res.prev, M = { level: 'level', last_status: 'status', temp: 'temp', qualification: 'qual',
      notes: 'notes', pain_points: 'pains', email: 'email', phone: 'phone', linkedin: 'linkedin',
      status: 'status', qual: 'qual', pains: 'pains' };
    Object.keys(p).forEach((k) => { if (M[k]) l[M[k]] = p[k] || ''; });
    renderSumbar(); renderTable();
    toast({ type: 'ok', html: 'Undone — <span class="mono">@' + esc(l.h) + '</span> restored.' });
  } catch (e) { toast({ type: 'err', html: 'Undo failed: ' + esc(e.message), sticky: true }); }
}
async function quickFu() {
  const l = leadById(state.editing); if (!l || state.busy) return;
  state.busy = true;
  try {
    const res = await core.setterUpdate({ handle: l.h, status: 'Follow up Sent' });
    l.status = 'Follow up Sent'; l.lastContact = core.todayDmy();
    renderTable(); closeDrawer();
    toast({ type: 'ok', html: '<span class="mono">@' + esc(l.h) + '</span> — follow-up logged.', ttl: 6000,
      action: res.undo ? { label: 'Undo', fn: () => undo(res, l) } : null });
  } catch (e) { toast({ type: 'err', html: esc(e.message), sticky: true }); }
  finally { state.busy = false; }
}

/* ---------- boot ---------- */
async function load() {
  $('refresh').classList.add('spin');
  try {
    const leads = await core.loadLeads();
    state.leads = leads;
    renderSumbar(); renderTable();
    // ?lead=<handle> deep link (palette / cross-page)
    const dl = new URLSearchParams(location.search).get('lead');
    if (dl) { const hit = leads.find((l) => l.h === dl.toLowerCase()); if (hit) openDrawer(hit.id); }
  } catch (e) {
    $('table').innerHTML = '<div class="v2-empty">Couldn’t load: ' + esc(e.message) + '</div>';
  } finally { $('refresh').classList.remove('spin'); }
}

// status select options
core.STATUSES.forEach((st) => { const o = document.createElement('option'); o.textContent = st; $('f-status').appendChild(o); });

$('search').oninput = (e) => { state.q = e.target.value; state.shown = 100; renderTable(); };
$('tempsel').onchange = (e) => { state.temp = e.target.value; state.shown = 100; renderTable(); };
$('refresh').onclick = load;
$('scrim').onclick = closeDrawer;
$('d-close').onclick = closeDrawer;
$('d-cancel').onclick = () => {
  if (state.lastUndo) {
    const { res, l } = state.lastUndo;
    state.lastUndo = null; $('d-cancel').textContent = 'Close';
    undo(res, l);
    closeDrawer();
  } else closeDrawer();
};
$('d-save').onclick = saveDrawer;
$('q-fu').onclick = quickFu;
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && state.editing) closeDrawer(); });

core.installPalette({ leads: () => state.leads, onLead: (l) => openDrawer(l.id) });
/* ---------- pool interactions ---------- */
$('table').addEventListener('change', (e) => {
  const cb = e.target.closest('input[type=checkbox][data-id]');
  if (!cb) return;
  const id = +cb.getAttribute('data-id');
  if (cb.checked) state.sel.add(id); else state.sel.delete(id);
  renderPool();
});
$('table').addEventListener('click', async (e) => {
  const take = e.target.closest('[data-take]');
  if (take) {
    const n = +take.getAttribute('data-take');
    const todo = state.leads.filter((l) => l.level === 'Outreach' && !l.lastContact);
    state.sel = new Set(todo.slice(0, n).map((l) => l.id));
    renderPool();
    return;
  }
  if (e.target.closest('#poolCopy')) {
    const todo = state.leads.filter((l) => l.level === 'Outreach' && !l.lastContact);
    const pick = state.sel.size ? todo.filter((l) => state.sel.has(l.id)) : todo.slice(0, 100);
    const txt = pick.map((l) => '@' + l.h).join('\n');
    try { await navigator.clipboard.writeText(txt); toast({ type: 'ok', html: 'Copied ' + pick.length + ' handles.' }); }
    catch (err) { toast({ type: 'err', html: 'Copy failed: ' + esc(err.message) }); }
    return;
  }
  const mark = e.target.closest('#poolMark');
  if (mark && !mark.disabled) {
    const ids = Array.from(state.sel);
    mark.disabled = true;
    try {
      const res = await core.markOutreachSent(ids);
      const today = core.todayDmy();
      state.leads.forEach((l) => { if (state.sel.has(l.id)) { l.lastContact = today; l.status = 'Follow up Sent'; } });
      state.sel = new Set();
      renderSumbar(); renderPool();
      toast({ type: 'ok', html: 'Marked <b>' + res.marked + '</b> as sent today.', ttl: 10000,
        action: res.undo ? { label: 'Undo', fn: async () => { await core.undoOutreachSent(res.undo); load(); } } : null });
    } catch (err) {
      mark.disabled = false;
      toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true });
    }
  }
});

/* ---------- import the IG following export ---------- */
$('importBtn').onclick = () => $('importFile').click();
$('table').addEventListener('click', (e) => { if (e.target.closest('#poolImport')) $('importFile').click(); });
$('importFile').onchange = async () => {
  const f = $('importFile').files[0];
  if (!f) return;
  $('importBtn').disabled = true;
  try {
    const text = await f.text();
    const res = await core.importFollowing(text);
    if (!res.total) { toast({ type: 'err', html: 'No handles found in that file — is it the following.json from your IG export?', sticky: true }); return; }
    await load();
    state.filter = 'Outreach'; renderSumbar(); renderTable();
    const bar = document.createElement('div');
    bar.className = 'impbar';
    bar.innerHTML = 'Imported <b>' + res.added.toLocaleString() + '</b> · <b>' + res.skippedExisting.toLocaleString() +
      '</b> already leads, left untouched<span class="sp"></span>';
    const ub = document.createElement('button');
    ub.className = 'v2-btn sm'; ub.textContent = 'Undo import';
    ub.onclick = async () => {
      ub.disabled = true;
      const u = await core.undoImport(res.ids);
      bar.remove(); load();
      toast({ type: 'ok', html: 'Import undone — ' + u.deleted + ' removed' + (u.kept ? ', ' + u.kept + ' kept (already worked or promoted)' : '') + '.' });
    };
    bar.appendChild(ub);
    $('table').parentNode.insertBefore(bar, $('table'));
    toast({ type: 'ok', ttl: 12000,
      html: 'Imported <b>' + res.added + '</b> into the outreach pool · ' + res.skippedExisting + ' already leads (untouched).',
      action: res.ids && res.ids.length ? { label: 'Undo import', fn: async () => { await core.undoImport(res.ids); load(); } } : null });
  } catch (err) {
    toast({ type: 'err', html: 'Import failed: ' + esc(err.message), sticky: true });
  } finally { $('importBtn').disabled = false; $('importFile').value = ''; }
};

const scanner = core.installScanner({
  statuses: core.STATUSES,
  exists: (h) => { const hit = state.leads.find((l) => l.h === h); return hit ? hit.h : null; },
  onDone: (n) => { toast({ type: 'ok', html: 'Screenshot: ' + n + ' lead' + (n === 1 ? '' : 's') + ' written.' }); load(); },
});
$('scanBtn').onclick = () => scanner.openFile();
load();
}
</script>
</body>
</html>
