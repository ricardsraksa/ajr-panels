const session = await core.requireAuth();
if (session) {
await core.installChrome({ active: 'leads' });
const RULES = await core.worklistRules();
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

const STAGE_ORDER = ['Engaged 3', 'Engaged 2', 'Engaged 1', 'Booked', 'No Close', 'No Reply', '', 'Archive', 'Closed', 'Outreach'];
const LEVEL_COLORS = {
  'Engaged 1': '#a9a9b1', 'Engaged 2': '#c9c9cf', 'Engaged 3': '#e9e9ec',
  'Booked': '#8ee59a', 'No Close': '#d99a9a', 'Archive': '#6e6e78', 'No Reply': '#8a8a92', 'Closed': '#c9c9cf', 'Outreach': '#7f8fa6', '': '#6e6e78'
};
const _ss = (k, d) => { try { return sessionStorage.getItem(k) || d; } catch (e) { return d; } };
const state = { leads: [], sel: new Set(), src: 'due',
  kind: _ss('ajr_kind', 'followup'), poolSort: _ss('ajr_poolsort', 'new'), stale: null, filter: 'ALL', q: '', sort: { key: 'lastContact', dir: -1 }, shown: 100, editing: null, busy: false };

const toast = core.toast;

function daysSince(dmy) {
  const d = CRMParse.parseDMY(dmy);
  if (!d) return null;
  return Math.round((new Date() - d) / 864e5);
}

/* ---------- summary bar ---------- */
function renderSumbar() {
  // one compact dropdown instead of a chip per stage — ten chips ate a full
  // row of the screen; the counts live on inside the options
  const counts = {};
  state.leads.forEach((l) => { const k = l.level || ''; counts[k] = (counts[k] || 0) + 1; });
  const realCount = state.leads.length - (counts['Outreach'] || 0) - (counts['Archive'] || 0);
  const opts = [['ALL', 'All', realCount]]
    .concat(STAGE_ORDER.filter((st) => counts[st]).map((st) => [st, st || 'No level', counts[st]]));
  const sel = $('stageSel');
  sel.innerHTML = opts.map(([key, label, n]) =>
    `<option value="${esc(key)}">${esc(label)} (${n})</option>`).join('');
  sel.value = state.filter;
  sel.onchange = () => {
    state.filter = sel.value; state.shown = 100;
    // picking Outreach IS the pool — land on its tab, not the follow-up queue
    if (state.filter === 'Outreach') { state.src = 'pool'; state.kind = 'followup'; state.sel = new Set(); }
    renderSumbar(); renderTable();
  };
}

/* ---------- table ---------- */
const COLS = [
  ['h', 'Handle'], ['level', 'Stage'], ['status', 'Last status'],
  ['lastContact', 'Since'], ['dateAdded', 'Added'], ['notes', 'Notes'],
];
function cmp(a, b, key) {
  if (key === 'lastContact' || key === 'dateAdded') {
    const da = CRMParse.parseDMY(a[key]), db = CRMParse.parseDMY(b[key]);
    return (da ? da.getTime() : 0) - (db ? db.getTime() : 0);
  }
  return String(a[key] || '').localeCompare(String(b[key] || ''));
}
function visible() {
  const q = state.q.toLowerCase().trim();
  let list = state.leads.filter((l) => {
    // Outreach and Archive are buckets, not the working book — each is only
    // visible under its own chip. 'All' means the leads actually in play.
    if (state.filter === 'ALL' && (l.level === 'Outreach' || l.level === 'Archive')) return false;
    if (state.filter !== 'ALL' && (l.level || '') !== state.filter) return false;
    if (q && !((l.h + ' ' + l.notes + ' ' + l.email + ' ' + l.status + ' ' + l.pains).toLowerCase().includes(q))) return false;
    return true;
  });
  list.sort((a, b) => cmp(a, b, state.sort.key) * state.sort.dir);
  return list;
}
/* ---------- batch DMs: work a queue, copy handles, mark them sent ----------
   Two queues share one tool. 'due' is leads that have gone quiet past the
   overdue window — real leads with history, so a re-touch. 'pool' is the
   imported IG following, nobody's ever messaged them. */
// Instagram's own universal link: on a phone this hands off to the app (the
// same /_u/ form their data export uses); on desktop it just redirects.
const onPhone = matchMedia('(max-width: 760px)').matches || /iPhone|Android/i.test(navigator.userAgent);
function profileHref(l) {
  return onPhone ? 'https://www.instagram.com/_u/' + encodeURIComponent(l.h) + '/'
                 : (l.url || 'https://instagram.com/' + l.h);
}

function batchList() {
  if (state.src !== 'pool') return state.stale || [];
  // Instagram's following list in follow-date order — tracked CRM leads
  // included, but rendered exactly like everyone else (bare handle; their
  // details live in the Worklist/book, not here). Their last_contact makes
  // them read as 'sent' (dimmed), which is the correct signal: no re-DM.
  // Only Archive stays out — those are deliberate removals.
  const pool = state.leads.filter((l) => l.followed && l.level !== 'Archive');
  const key = (l) => l.followed ? core.dmyToIso(l.followed) : '';
  return pool.sort((a, b) => {
    const ka = key(a), kb = key(b);
    if (!ka && !kb) return 0;
    if (!ka) return 1;
    if (!kb) return -1;
    return state.poolSort === 'new' ? kb.localeCompare(ka) : ka.localeCompare(kb);
  });
}
function renderPool() {
  const due = (state.stale || []).length;
  const todo = batchList(); // pool: the full IG mirror; due: the stale queue
  const fresh = state.src === 'pool' ? todo.filter((l) => !l.lastContact) : todo;
  const sentToday = state.src === 'pool'
    ? todo.filter((l) => l.lastContact === core.todayDmy()) : [];
  const sel = state.sel;
  const t = $('table');

  const tabs = '<div class="poolbar">' +
    '<div class="tf" id="srcTabs" role="group" aria-label="Batch source">' +
      '<button data-src="due" aria-pressed="' + (state.src === 'due') + '">Due a follow-up ' + due.toLocaleString() + '</button>' +
      '<button data-src="pool" aria-pressed="' + (state.src === 'pool') + '">IG following ' + (state.src === 'pool' ? todo.length : state.leads.filter((l) => l.followed && l.level !== 'Archive').length).toLocaleString() + '</button>' +
    '</div>' +
    '<span class="sp"></span>' +
    (state.src === 'pool' ? '<button class="v2-btn sm" id="poolImport">Import IG following…</button>' : '') +
    '</div>';

  if (!todo.length) {
    t.innerHTML = tabs + '<div class="pooldash" style="margin:18px">' +
      (state.src === 'pool'
        ? '<div style="font-weight:600;color:#211f1b;margin-bottom:6px">Nothing imported yet</div>' +
          '<div style="margin-bottom:14px">Takes <b>following.json</b> from your Instagram data export, or a CSV with a column of handles or profile links. ' +
          'Pool entries stay out of the lead book and the Worklist.</div>' +
          '<button class="v2-btn dark" id="poolImport2">Import IG following…</button>'
        : '<div style="font-weight:600;color:#211f1b;margin-bottom:6px">Nobody is overdue</div>' +
          '<div>Every live lead has been touched inside the overdue window. Nothing to batch.</div>') +
      '</div>';
    $('count').textContent = state.src === 'pool' ? '0 followed' : '0 due';
    return;
  }

  t.innerHTML = tabs +
    '<div class="poolbar">' +
      (state.src === 'pool'
        ? '<b>' + fresh.length.toLocaleString() + '</b><span>not yet messaged</span>' +
          '<span style="color:#98917f">·</span><span>' + (todo.length - fresh.length).toLocaleString() + ' sent</span>'
        : '<b>' + todo.length.toLocaleString() + '</b><span>waiting on a follow-up</span>') +
      '<span class="sp"></span>' +
      (state.src === 'pool'
        ? '<span style="color:#8a8375">followed</span>' +
          '<div class="tf" id="poolSort" role="group" aria-label="Sort by follow date">' +
            '<button data-sort="new" aria-pressed="' + (state.poolSort === 'new') + '">Newest</button>' +
            '<button data-sort="old" aria-pressed="' + (state.poolSort === 'old') + '">Oldest</button>' +
          '</div>'
        : '') +
      '<button class="v2-btn sm' + (sel.size ? '' : ' dark') + '" data-take="25">Next 25</button>' +
      '<button class="v2-btn sm" data-take="50">50</button>' +
      '<button class="v2-btn sm" data-take="100">100</button>' +
    '</div>' +
    '<div class="poolbar">' +
      '<b>' + (sel.size || 0) + '</b><span>selected</span>' +
      (state.prevSel ? '<button class="v2-btn sm" id="selRestore">Restore selection (' + state.prevSel.size + ')</button>' : '') +
      '<button class="v2-btn sm" id="poolCopy">Copy handles</button>' +
      '<span class="sp"></span>' +
      '<span style="color:#8a8375">counts as</span>' +
      '<div class="tf" id="kindTabs" role="group" aria-label="Counts as">' +
        '<button data-kind="followup" aria-pressed="' + (state.kind === 'followup') + '">Follow-up</button>' +
        '<button data-kind="cold" aria-pressed="' + (state.kind === 'cold') + '">Cold DM</button>' +
      '</div>' +
      '<button class="v2-btn sm" id="poolSkip"' + (sel.size ? '' : ' disabled') + ' title="Friends, family, anyone who should never be contacted">Not a lead</button>' +
      '<input class="v2-in" type="date" id="sentDate" value="' + esc(state.sentDate) + '" max="' + esc(core.dmyToIso(core.todayDmy())) + '" title="The day these DMs went out" style="width:auto;min-height:32px;padding:0 8px">' +
      '<button class="v2-btn go sm" id="poolMark"' + (sel.size ? '' : ' disabled') + '>' +
        (state.sentDate === core.dmyToIso(core.todayDmy())
          ? 'Mark batch sent today'
          : 'Mark batch sent ' + esc(core.isoToDmy(state.sentDate).slice(0, 5))) + '</button>' +
      (state.lastBatchUndo
        ? '<button class="v2-btn sm" id="poolUndo">Undo last batch (' + state.lastBatchUndo.count + ')</button>'
        : '') +
    '</div>' +
    (sentToday.length
      ? '<div class="poolbar senttoday"><span class="v2-lab" style="margin:0">Sent today ' + sentToday.length + '</span>' +
        sentToday.slice(0, 40).map((l) =>
          '<a class="st-h" href="log-lead.html?lead=' + encodeURIComponent(l.h) + '" title="Open in Log a lead">@' + esc(l.h) + '</a>').join('') +
        '</div>'
      : '') +
    '<div class="poolgrid">' + (state.src === 'pool' ? todo : todo.slice(0, 300)).map((l, i) => {
      if (state.src === 'due') {
        return '<label class="poolcell">' +
          '<input type="checkbox" data-id="' + l.id + '"' + (sel.has(l.id) ? ' checked' : '') + '>' +
          '<a href="' + esc(profileHref(l)) + '" target="_blank" rel="noopener">@' + esc(l.h) + '</a>' +
          '<span class="poolage">' + esc(l.last || 'never') + '</span>' +
          '<button class="sentbtn" data-sent="' + l.id + '" title="Mark just this one sent">Sent</button>' +
        '</label>';
      }
      const done = !!l.lastContact;
      // every row is selectable — DMing someone with history is still a
      // follow-up, and marking stamps last_contact + 'Follow up Sent' today.
      // Only the AUTOMATIC selections (↑ here, Next N) skip messaged rows.
      return '<label class="poolcell' + (done ? ' done' : '') + '"' + (done ? ' title="sent ' + esc(l.lastContact) + '"' : '') + '>' +
        '<input type="checkbox" data-id="' + l.id + '"' + (sel.has(l.id) ? ' checked' : '') + '>' +
        '<a href="' + esc(profileHref(l)) + '" target="_blank" rel="noopener">@' + esc(l.h) + '</a>' +
        '<button class="uptobtn" data-upto="' + i + '" title="Select everyone above (not yet messaged) through this row">↑ here</button>' +
        '<button class="nalbtn" data-nal="' + l.id + '" title="Not a lead — dead account, friend, irrelevant. Archives it.">✕</button>' +
      '</label>';
    }).join('') + '</div>' +
    (state.src === 'due' && todo.length > 300 ? '<div class="v2-empty">+ ' + (todo.length - 300).toLocaleString() + ' more…</div>' : '');
  $('count').textContent = state.src === 'pool'
    ? todo.length.toLocaleString() + ' followed · ' + fresh.length.toLocaleString() + ' unmessaged'
    : due.toLocaleString() + ' due a follow-up';
}

function renderTable() {
  if (state.filter === 'Outreach') { renderPool(); return; }
  const rows = visible();
  const realTotal = state.leads.filter((l) => l.level !== 'Outreach' && l.level !== 'Archive').length;
  $('count').textContent = rows.length === realTotal
    ? realTotal + ' leads' : rows.length + ' of ' + realTotal;
  const head = '<div class="v2-thead l-thead l-min">' + COLS.map(([key, label]) =>
    `<button data-s="${key}" style="text-align:left;font:inherit;letter-spacing:inherit;text-transform:uppercase;color:inherit">${label}${state.sort.key === key ? `<span class="arr"> ${state.sort.dir > 0 ? '↑' : '↓'}</span>` : ''}</button>`).join('') + '</div>';
  const t = $('table');
  if (!rows.length) { t.innerHTML = '<div class="v2-scroll">' + head + '</div><div class="v2-empty">No leads match.</div>'; bindHead(); return; }
  const page = rows.slice(0, state.shown);
  t.innerHTML = '<div class="v2-scroll"><div class="l-min">' + head + page.map((l) => {
    const ds = daysSince(l.lastContact);
    const stageCls = l.level === 'Booked' ? 'color:#2a6a4d;font-weight:600'
      : l.level === 'No Close' ? 'color:#b4543e' : '';
    return `<div class="v2-row l-row" data-id="${l.id}">
      <a class="lh" href="${esc(l.url || 'https://instagram.com/' + l.h)}" target="_blank" rel="noopener">@${esc(l.h)}</a>
      <span class="l-cell" style="${stageCls}">${esc(l.level || 'no level')}</span>
      <span class="l-cell">${esc(l.status || '')}</span>
      <span class="v2-age ${core.ageClass(ds, RULES)}">${l.lastContact ? (ds <= 0 ? 'today' : ds + 'd') : '—'}</span>
      <span class="l-mono">${esc((l.dateAdded || '').slice(0, 5))}</span>
      <span class="l-cell dim" title="${esc(l.notes)}">${esc(l.notes || '')}</span>
    </div>`;
  }).join('') + '</div></div>' +
    (rows.length > state.shown
      ? `<div class="pager"><span>1–${Math.min(state.shown, rows.length)} of ${rows.length.toLocaleString()}</span><span class="sp"></span><button class="v2-btn sm" id="more">Show 100 more</button></div>`
      : `<div class="pager"><span>${rows.length.toLocaleString()} shown</span></div>`);
  bindHead();
  Array.prototype.forEach.call(t.querySelectorAll('.l-row'), (r) => {
    r.onclick = () => openDrawer(+r.getAttribute('data-id'));
    const a = r.querySelector('.lh'); if (a) a.addEventListener('click', (e) => e.stopPropagation()); // @ opens IG, not the drawer
  });
  const more = $('more'); if (more) more.onclick = () => { state.shown += 100; renderTable(); };
}
function bindHead() {
  Array.prototype.forEach.call($('table').querySelectorAll('.v2-thead button'), (b) => {
    b.onclick = () => {
      const k = b.getAttribute('data-s');
      if (state.sort.key === k) state.sort.dir *= -1; else state.sort = { key: k, dir: k.includes('Contact') || k.includes('Added') ? -1 : 1 };
      renderTable();
    };
  });
}

/* ---------- drawer ---------- */
function leadById(id) { return state.leads.find((l) => l.id === id); }
async function openDrawer(id) {
  const l = leadById(id); if (!l) return;
  state.editing = id;
  $('d-name').textContent = '@' + l.h;
  const ig = $('d-ig');
  if (l.url) { ig.hidden = false; ig.href = l.url; } else ig.hidden = true;
  $('d-meta').textContent = (l.dateAdded ? 'added ' + l.dateAdded + ' · ' : '') + (l.lastContact ? 'last contact ' + l.lastContact : 'never contacted');
  $('q-log').href = 'log-lead.html?lead=' + encodeURIComponent(l.h);
  $('f-level').value = l.level || '';
  $('f-status').value = core.STATUSES.includes(l.status) ? l.status : '';
  $('f-qual').value = ['Qualified 1','Qualified 2','Qualified 3','Unqualified'].includes(l.qual) ? l.qual : '';
  $('f-notes').value = l.notes || '';
  $('f-pains').value = l.pains || '';
  $('f-email').value = l.email || '';
  $('f-phone').value = l.phone || '';
  $('f-linkedin').value = l.linkedin || '';
  $('scrim').classList.add('on'); $('drawer').classList.add('on');
  // history (async fill)
  $('hist').hidden = true;
  try {
    const acts = await core.loadActivity('leads', id, 8);
    if (acts.length && state.editing === id) {
      $('hist-list').innerHTML = acts.map((a) => {
        const who = a.actor === 'ai:fireflies' ? 'AI (call)' : (a.actor || '').split('@')[0] || 'someone';
        const what = a.action === 'restore' ? 'undid a change' :
          a.action === 'create' ? 'created the lead' :
          'set ' + Object.keys(a.next || {}).join(', ');
        return `<li><span class="who">${esc(who)}</span><span class="what">${esc(what)}</span><span class="when">${esc(core.relTime(a.created_at))}</span></li>`;
      }).join('');
      $('hist').hidden = false;
    }
  } catch (e) { /* history is best-effort */ }
}
function closeDrawer() {
  state.editing = null;
  $('scrim').classList.remove('on'); $('drawer').classList.remove('on');
}
async function saveDrawer() {
  const l = leadById(state.editing); if (!l || state.busy) return;
  const fields = {
    level: $('f-level').value,
    status: $('f-status').value || l.status, qual: $('f-qual').value,
    notes: $('f-notes').value, pains: $('f-pains').value,
    email: $('f-email').value.trim(), phone: $('f-phone').value.trim(), linkedin: $('f-linkedin').value.trim(),
  };
  state.busy = true; $('d-save').disabled = true;
  try {
    const res = await core.setLead(l.id, fields);
    l.level = fields.level; l.status = fields.status; l.qual = fields.qual;
    l.notes = fields.notes; l.pains = fields.pains; l.email = fields.email; l.phone = fields.phone; l.linkedin = fields.linkedin;
    renderSumbar(); renderTable(); closeDrawer();
    if (res.undo) { state.lastUndo = { res, l }; $('d-cancel').textContent = 'Undo last'; }
    toast({ type: 'ok', html: '<span class="mono">@' + esc(l.h) + '</span> saved.', ttl: 7000,
      action: res.undo ? { label: 'Undo', fn: () => undo(res, l) } : null });
  } catch (e) {
    toast({ type: 'err', html: 'Save failed: ' + esc(e.message), sticky: true });
  } finally { state.busy = false; $('d-save').disabled = false; }
}
async function undo(res, l) {
  try {
    await core.undoWrite(res.undo);
    const p = res.prev, M = { level: 'level', last_status: 'status', qualification: 'qual',
      notes: 'notes', pain_points: 'pains', email: 'email', phone: 'phone', linkedin: 'linkedin',
      status: 'status', qual: 'qual', pains: 'pains' };
    Object.keys(p).forEach((k) => { if (M[k]) l[M[k]] = p[k] || ''; });
    renderSumbar(); renderTable();
    toast({ type: 'ok', html: 'Undone — <span class="mono">@' + esc(l.h) + '</span> restored.' });
  } catch (e) { toast({ type: 'err', html: 'Undo failed: ' + esc(e.message), sticky: true }); }
}
async function quickFu() {
  const l = leadById(state.editing); if (!l || state.busy) return;
  state.busy = true;
  try {
    const res = await core.setterUpdate({ handle: l.h, status: 'Follow up Sent' });
    l.status = 'Follow up Sent'; l.lastContact = core.todayDmy();
    renderTable(); closeDrawer();
    toast({ type: 'ok', html: '<span class="mono">@' + esc(l.h) + '</span> — follow-up logged.', ttl: 6000,
      action: res.undo ? { label: 'Undo', fn: () => undo(res, l) } : null });
  } catch (e) { toast({ type: 'err', html: esc(e.message), sticky: true }); }
  finally { state.busy = false; }
}

/* ---------- boot ---------- */
async function load() {
  if (!state.sentDate) state.sentDate = core.dmyToIso(core.todayDmy());
  $('refresh').classList.add('spin');
  try {
    const [leads, stale] = await Promise.all([core.loadLeads(), core.staleBatch({ limit: 500 })]);
    state.leads = leads;
    state.stale = stale;
    renderSumbar(); renderTable();
    // ?lead=<handle> deep link (palette / cross-page)
    const dl = new URLSearchParams(location.search).get('lead');
    if (dl) { const hit = leads.find((l) => l.h === dl.toLowerCase()); if (hit) openDrawer(hit.id); }
  } catch (e) {
    $('table').innerHTML = '<div class="v2-empty">Couldn’t load: ' + esc(e.message) + '</div>';
  } finally { $('refresh').classList.remove('spin'); }
}

// status select options
core.STATUSES.forEach((st) => { const o = document.createElement('option'); o.textContent = st; $('f-status').appendChild(o); });

$('search').oninput = (e) => { state.q = e.target.value; state.shown = 100; renderTable(); };
$('refresh').onclick = load;
$('scrim').onclick = closeDrawer;
$('d-close').onclick = closeDrawer;
$('d-cancel').onclick = () => {
  if (state.lastUndo) {
    const { res, l } = state.lastUndo;
    state.lastUndo = null; $('d-cancel').textContent = 'Close';
    undo(res, l);
    closeDrawer();
  } else closeDrawer();
};
$('d-save').onclick = saveDrawer;
$('d-nocontact').onclick = async () => {
  const l = leadById(state.editing); if (!l) return; // state.editing is the id
  const btn = $('d-nocontact'); btn.disabled = true;
  try {
    const res = await core.noContact(l.id);
    l.level = 'Archive';
    closeDrawer(); renderSumbar(); renderTable();
    toast({ type: 'ok', ttl: 10000,
      html: '<span class="mono">@' + esc(l.h) + '</span> marked not a lead — archived, never contacted.',
      action: { label: 'Undo', fn: async () => { await core.undoNoContact(res.undo); load(); } } });
  } catch (err) {
    toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true });
  } finally { btn.disabled = false; }
};
$('q-fu').onclick = quickFu;
core.pageListen(document, 'keydown', (e) => { if (e.key === 'Escape' && state.editing) closeDrawer(); });

core.installPalette({ leads: () => state.leads, onLead: (l) => openDrawer(l.id) });
/* ---------- pool interactions ---------- */
$('table').addEventListener('change', (e) => {
  const dt = e.target.closest('#sentDate');
  if (dt) { // backdating a batch: keep the button label honest about the day
    state.sentDate = dt.value || core.dmyToIso(core.todayDmy());
    renderPool();
    return;
  }
  const cb = e.target.closest('input[type=checkbox][data-id]');
  if (!cb) return;
  const id = +cb.getAttribute('data-id');
  if (cb.checked) state.sel.add(id); else state.sel.delete(id);
  renderPool();
});
$('table').addEventListener('click', async (e) => {
  const src = e.target.closest('#srcTabs button');
  if (src) {
    state.src = src.getAttribute('data-src');
    state.kind = 'followup'; // most sends are reconnects — flip to Cold DM per batch when they're not
    state.sel = new Set();
    renderPool();
    return;
  }
  const kind = e.target.closest('#kindTabs button');
  if (kind) { state.kind = kind.getAttribute('data-kind'); try { sessionStorage.setItem('ajr_kind', state.kind); } catch (x) {} renderPool(); return; }
  const one = e.target.closest('[data-sent]');
  if (one) {
    e.preventDefault(); // the row is a <label>; don't toggle its checkbox too
    const id = Number(one.getAttribute('data-sent'));
    one.disabled = true;
    try {
      const res = await core.markBatchSent([id], { kind: state.kind });
      const today = core.todayDmy();
      state.leads.forEach((l) => { if (l.id === id) { l.lastContact = today; l.status = 'Follow up Sent'; } });
      if (state.stale) state.stale = state.stale.filter((l) => l.id !== id);
      state.sel.delete(id);
      renderSumbar(); renderPool();
      toast({ type: 'ok', ttl: 8000,
        html: 'Marked sent — counted as ' + (res.kind === 'followup' ? 'a follow-up' : 'a cold DM') + '.',
        action: res.undo ? { label: 'Undo', fn: async () => { await core.undoOutreachSent(res.undo); load(); } } : null });
    } catch (err) {
      one.disabled = false;
      toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true });
    }
    return;
  }
  const ps = e.target.closest('#poolSort button');
  if (ps) { state.poolSort = ps.getAttribute('data-sort'); try { sessionStorage.setItem('ajr_poolsort', state.poolSort); } catch (x) {} state.sel = new Set(); renderPool(); return; }
  const nal = e.target.closest('[data-nal]');
  if (nal) {
    e.preventDefault();
    const id = Number(nal.getAttribute('data-nal'));
    nal.disabled = true;
    try {
      const l = state.leads.find((x) => x.id === id);
      const res = await core.noContact([id]);
      if (l) l.level = 'Archive';
      state.sel.delete(id);
      renderSumbar(); renderPool();
      toast({ type: 'ok', ttl: 8000, html: 'Removed <span class="mono">@' + esc(l ? l.h : id) + '</span> — not a lead.',
        action: { label: 'Undo', fn: async () => { await core.undoNoContact(res.undo); load(); } } });
    } catch (err) {
      nal.disabled = false;
      toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true });
    }
    return;
  }
  const upto = e.target.closest('[data-upto]');
  if (upto) {
    e.preventDefault(); // row is a <label>
    const idx = +upto.getAttribute('data-upto');
    // his session = the top of this order down to the last handle he DM'd —
    // EVERY row in that range, messaged before or not: he worked the IG list
    // top-down and DM'd them all, so all of them get today's stamp.
    // Stash whatever selection this replaces — a stray click on ↑ here used to
    // silently destroy hand-picked checkboxes.
    if (state.sel.size) state.prevSel = state.sel;
    state.sel = new Set(batchList().slice(0, idx + 1).map((l) => l.id));
    renderPool();
    return;
  }
  const take = e.target.closest('[data-take]');
  if (take) {
    const n = +take.getAttribute('data-take');
    if (state.sel.size) state.prevSel = state.sel;
    state.sel = new Set(batchList().slice(0, n).map((l) => l.id));
    renderPool();
    return;
  }
  if (e.target.closest('#poolCopy')) {
    const pick = state.sel.size ? batchList().filter((l) => state.sel.has(l.id)) : batchList().slice(0, 100);
    const txt = pick.map((l) => '@' + l.h).join('\n');
    try { await navigator.clipboard.writeText(txt); toast({ type: 'ok', html: 'Copied ' + pick.length + ' handles.' }); }
    catch (err) { toast({ type: 'err', html: 'Copy failed: ' + esc(err.message) }); }
    return;
  }
  const skip = e.target.closest('#poolSkip');
  if (skip && !skip.disabled) {
    const ids = Array.from(state.sel);
    skip.disabled = true;
    try {
      const res = await core.noContact(ids);
      state.leads.forEach((l) => { if (state.sel.has(l.id)) l.level = 'Archive'; });
      if (state.stale) state.stale = state.stale.filter((l) => !state.sel.has(l.id));
      state.sel = new Set();
      renderSumbar(); renderPool();
      toast({ type: 'ok', ttl: 10000,
        html: 'Marked <b>' + res.marked + '</b> as not a lead — archived, never contacted.',
        action: { label: 'Undo', fn: async () => { await core.undoNoContact(res.undo); load(); } } });
    } catch (err) {
      skip.disabled = false;
      toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true });
    }
    return;
  }
  const sr = e.target.closest('#selRestore');
  if (sr) {
    const cur = state.sel;
    state.sel = state.prevSel;
    state.prevSel = cur.size ? cur : null; // swap, so a second click swaps back
    renderPool();
    return;
  }
  const sd = e.target.closest('#sentDate');
  if (sd) return; // let the picker take the click without the row label eating it
  const pu = e.target.closest('#poolUndo');
  if (pu) {
    pu.disabled = true;
    const u = state.lastBatchUndo;
    state.lastBatchUndo = null;
    try {
      await core.undoOutreachSent(u.undo);
      toast({ type: 'ok', html: 'Batch of ' + u.count + ' un-marked.' });
      load();
    } catch (err) {
      state.lastBatchUndo = u; // keep the chance to retry
      toast({ type: 'err', html: 'Undo failed: ' + esc(err.message), sticky: true });
      renderPool();
    }
    return;
  }
  const mark = e.target.closest('#poolMark');
  if (mark && !mark.disabled) {
    const ids = Array.from(state.sel);
    mark.disabled = true;
    try {
      const when = core.isoToDmy(state.sentDate);
      const res = await core.markBatchSent(ids, { kind: state.kind, when });
      state.leads.forEach((l) => { if (state.sel.has(l.id)) { l.lastContact = when; l.status = 'Follow up Sent'; } });
      if (state.stale) state.stale = state.stale.filter((l) => !state.sel.has(l.id));
      state.sel = new Set();
      // the toast's Undo dies in 10 seconds; the bar button stays until the
      // next batch (or navigation) replaces it
      if (res.undo) state.lastBatchUndo = { undo: res.undo, count: res.marked };
      state.prevSel = null;
      renderSumbar(); renderPool();
      toast({ type: 'ok', ttl: 10000,
        html: 'Marked <b>' + res.marked + '</b> as sent ' +
          (res.when === core.todayDmy() ? 'today' : 'on ' + esc(res.when)) + ' — counted as ' +
          (res.kind === 'followup' ? 'follow-ups' : 'cold DMs') + '.',
        action: res.undo ? { label: 'Undo', fn: async () => { await core.undoOutreachSent(res.undo); load(); } } : null });
    } catch (err) {
      mark.disabled = false;
      toast({ type: 'err', html: 'Failed: ' + esc(err.message), sticky: true });
    }
  }
});

/* ---------- import the IG following export ---------- */
$('importBtn').onclick = () => $('importFile').click();
$('table').addEventListener('click', (e) => {
  if (e.target.closest('#poolImport') || e.target.closest('#poolImport2')) $('importFile').click();
});
$('importFile').onchange = async () => {
  const f = $('importFile').files[0];
  if (!f) return;
  $('importBtn').disabled = true;
  try {
    const text = await f.text();
    const res = await core.importFollowing(text);
    if (!res.total) { toast({ type: 'err', html: 'No handles found in that file. Works with following.json from your IG export, or a CSV/text file with a column of handles or profile links.', sticky: true }); return; }
    await load();
    state.filter = 'Outreach'; renderSumbar(); renderTable();
    const bar = document.createElement('div');
    bar.className = 'impbar';
    bar.innerHTML = 'Imported <b>' + res.added.toLocaleString() + '</b> · <b>' + res.skippedExisting.toLocaleString() +
      '</b> already leads, left untouched<span class="sp"></span>';
    const ub = document.createElement('button');
    ub.className = 'v2-btn sm'; ub.textContent = 'Undo import';
    ub.onclick = async () => {
      ub.disabled = true;
      const u = await core.undoImport(res.ids);
      bar.remove(); load();
      toast({ type: 'ok', html: 'Import undone — ' + u.deleted + ' removed' + (u.kept ? ', ' + u.kept + ' kept (already worked or promoted)' : '') + '.' });
    };
    bar.appendChild(ub);
    $('table').parentNode.insertBefore(bar, $('table'));
    toast({ type: 'ok', ttl: 12000,
      html: 'Imported <b>' + res.added + '</b> into the outreach pool · ' + res.skippedExisting + ' already leads (untouched).',
      action: res.ids && res.ids.length ? { label: 'Undo import', fn: async () => { await core.undoImport(res.ids); load(); } } : null });
  } catch (err) {
    toast({ type: 'err', html: 'Import failed: ' + esc(err.message), sticky: true });
  } finally { $('importBtn').disabled = false; $('importFile').value = ''; }
};

const scanner = core.installScanner({
  statuses: core.STATUSES,
  exists: (h) => { const hit = state.leads.find((l) => l.h === h); return hit ? hit.h : null; },
  onDone: (n) => { toast({ type: 'ok', html: 'Screenshot: ' + n + ' lead' + (n === 1 ? '' : 's') + ' written.' }); load(); },
});
// 'Paste ⌘V' means nothing on a phone; the same button opens the camera roll
if (matchMedia('(max-width: 760px)').matches) $('scanBtn').textContent = 'Add screenshot';
$('scanBtn').onclick = () => scanner.openFile();
load();
}
</script>
</body>
