<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://cukjynfatkyiuzvstgcp.supabase.co" crossorigin>
<title>AJR CRM · Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f9f8f5; --card:#fff; --line:#e6e2da; --line-2:#ddd8cd;
  --ink:#211f1b; --ink-2:#4d4a42; --ink-3:#6d675b; --muted:#8a8375; --off:#ccc5b6;
  --go:#2a6a4d; --go-hi:#1d4d37; --red:#b4543e;
  --font:'Instrument Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:13px;line-height:1.5;
  min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
button,input{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--go);text-decoration:none}
a:hover{color:var(--go-hi)}
:focus{outline:none}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:6px}
[hidden]{display:none!important}
input::placeholder{color:var(--off)}
.card{width:min(360px,calc(100vw - 40px));background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:28px 26px}
.wm{font-weight:700;font-size:15px;letter-spacing:.02em;margin-bottom:6px}
.lede{color:var(--muted);font-size:12.5px;margin-bottom:22px;line-height:1.55}
label{display:block;font:600 10px var(--mono);letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:16px}
input{display:block;width:100%;margin-top:7px;min-height:40px;padding:8px 12px;background:#fff;
  border:1px solid var(--line-2);border-radius:8px;color:var(--ink);font:400 13.5px var(--font)}
input:focus{border-color:var(--muted)}
.btn{width:100%;min-height:40px;border-radius:8px;background:var(--ink);color:var(--bg);
  font:600 13px var(--font);margin-top:4px}
.btn:hover:not(:disabled){filter:brightness(1.35)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:var(--red);font-size:12.5px;margin-top:11px;min-height:18px}
.foot{margin-top:16px;font-size:12px;color:var(--muted);text-align:center}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="card">
  <div class="wm">AJR&nbsp;CRM</div>
  <div class="lede">Setters land on the Worklist, closers on Deals.</div>
  <form id="form">
    <label>Email
      <input id="email" type="email" autocomplete="username" spellcheck="false" required>
    </label>
    <label>Password
      <input id="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="btn" id="go" type="submit">Sign in</button>
    <div class="err" id="err" role="alert"></div>
  </form>
  <div class="foot"><a href="#" id="forgot">Forgot password?</a></div>
</div>
<script type="module">
import { supa, signIn, isDemo, roleFor } from './crm-core.js?v=20260722c';

const qs = new URLSearchParams(location.search);
// Role-based landing. Roles live in the settings table (Settings -> Team), so
// adding a teammate is an edit, not a deploy.
async function destFor(email) {
  if (qs.get('to')) return qs.get('to');
  return (await roleFor(email)) === 'closer' ? 'deals.html' : 'worklist.html';
}

// already signed in? straight through. (skip the network check in demo)
if (!isDemo) {
  const { data: { session } } = await supa.auth.getSession();
  if (session) location.replace(await destFor(session.user.email));
}

const form = document.getElementById('form');
const err = document.getElementById('err');
const go = document.getElementById('go');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  go.disabled = true; go.textContent = 'Signing in…';
  try {
    const sess = await signIn(document.getElementById('email').value.trim(),
                 document.getElementById('password').value);
    location.replace(await destFor(sess.user.email));
  } catch (ex) {
    err.textContent = /invalid/i.test(ex.message) ? 'Wrong email or password.' : ex.message;
    go.disabled = false; go.textContent = 'Sign in';
  }
});
document.getElementById('forgot').onclick = (e) => {
  e.preventDefault();
  err.style.color = 'var(--muted)';
  err.textContent = 'Ask Richard to reset it in Supabase.';
};
</script>
</body>
</html>
