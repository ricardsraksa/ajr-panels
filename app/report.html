<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>Dashboard · AJR</title>
<style>
.demo-banner{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;
  color:#8a8375;text-align:center;padding:6px 12px;border:1px solid #e6e2da;border-radius:8px;
  background:#f4f2ed;margin-bottom:14px}
.colw{max-width:880px}
/* timeframe switcher */
.tf{display:inline-flex;background:#f0ede6;border:1px solid #e6e2da;border-radius:9px;padding:2px;gap:2px}
.tf button{border-radius:7px;padding:5px 12px;min-height:30px;font:600 11.5px 'Instrument Sans',system-ui,sans-serif;
  color:#6d675b;cursor:pointer;background:none;border:none}
.tf button:hover{color:#211f1b}
.tf button[aria-pressed="true"]{background:#fff;color:#211f1b;box-shadow:0 1px 2px rgba(33,31,27,.07)}
/* today cards */
/* 5 metrics, so a narrower min-width than the old 4 — one card stranded on its
   own row reads like a mistake */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e6e2da;border-radius:12px;padding:15px 17px}
.stat .lab{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#98917f}
.stat .big{font:600 26px 'IBM Plex Mono',monospace;color:#211f1b;margin:4px 0 2px;letter-spacing:-.01em}
.stat .big .of{font-size:14px;color:#98917f;font-weight:400}
.stat .sub{font-size:11.5px;color:#8a8375;min-height:16px}
.stat .sub.hit{color:#2a6a4d;font-weight:600}
.chg{font:600 11.5px 'IBM Plex Mono',monospace;margin-left:8px;vertical-align:2px}
.chg.up{color:#2a6a4d}
.chg.down{color:#b4543e}
.chg.flat,.chg.new{color:#98917f}
.bar{height:5px;border-radius:99px;background:#f0ede6;margin-top:9px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:#2a6a4d;transition:width .3s}
.bar i.warn{background:#a8762a}
/* chart */
.chart-card{background:#fff;border:1px solid #e6e2da;border-radius:12px;padding:16px 18px;margin-bottom:20px}
.chart{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:12px}
.col{flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;min-width:0;cursor:default}
.col .seg{border-radius:3px 3px 0 0;min-height:2px}
.col .seg.fu{background:#2a6a4d}
.col .seg.or{background:#c9dfd2}
.col.today .seg.fu{background:#1d4d37}
.xlab{display:flex;gap:6px;margin-top:6px}
.xlab span{flex:1;text-align:center;font:400 9.5px 'IBM Plex Mono',monospace;color:#98917f;overflow:hidden;white-space:nowrap}
.legend{display:flex;gap:16px;font-size:11.5px;color:#6d675b;margin-top:10px}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-1px}
/* history table */
.h-thead,.h-row{grid-template-columns:96px 1fr 1fr 1fr 1fr 1fr 64px}
.h-cell{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#4d4a42}
.h-cell.dim{color:#ccc5b6}
.hit{color:#2a6a4d;font-weight:600}
.miss{color:#b4543e}
.dot-hit{color:#2a6a4d}
.dot-miss{color:#b4543e}
</style>
</head>
<body>
<main class="v2-main colw">
  <div class="demo-banner" id="demoBanner" hidden>DEMO — writes go nowhere</div>
  <header class="v2-h">
    <h1>Dashboard</h1>
    <span class="sub" id="subline">today</span>
    <span class="sp"></span>
    <div class="tf" id="seg" role="group" aria-label="Timeframe">
      <button data-days="1" aria-pressed="true">Today</button>
      <button data-days="7" aria-pressed="false">7 days</button>
      <button data-days="30" aria-pressed="false">30 days</button>
    </div>
    <a class="v2-btn sm" href="settings.html">Edit targets</a>
    <button class="v2-btn sm" id="refresh">Refresh</button>
  </header>

  <section id="skel" class="v2-card v2-empty">Crunching the activity log…</section>

  <div id="app" hidden>
    <div class="cards" id="cards"></div>

    <div class="chart-card">
      <span class="v2-lab" id="chartLab">Last 14 days</span>
      <div class="chart" id="chart"></div>
      <div class="xlab" id="xlab"></div>
      <div class="legend">
        <span><i style="background:#2a6a4d"></i>Follow-ups</span>
        <span><i style="background:#c9dfd2"></i>Cold DMs ÷10</span>
      </div>
    </div>

    <section class="v2-card">
      <div class="v2-thead h-thead"><span>Day</span><span>Follow-ups</span><span>Cold DMs</span><span>New leads</span><span>Booked</span><span>Closed</span><span>Target</span></div>
      <div id="hist"></div>
    </section>
  </div>
</main>

<script type="module">
import * as core from './crm-core.js?v=20260721g';
const session = await core.requireAuth();
if (session) {
await core.installChrome({ active: 'report' });
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

const toast = core.toast;
if (core.isDemo) $('demoBanner').hidden = false;

function card(label, value, target, sub, chg) {
  const pct = target ? Math.min(100, Math.round((value / target) * 100)) : null;
  const hit = target && value >= target;
  return `<div class="stat">
    <span class="lab">${esc(label)}</span>
    <div class="big">${value}${target ? `<span class="of"> / ${target}</span>` : ''}${chg ? chip(chg) : ''}</div>
    <div class="sub${hit ? ' hit' : ''}">${hit ? 'target hit' : esc(chg ? chg.note : (sub || ''))}</div>
    ${target ? `<div class="bar"><i class="${pct < 50 ? 'warn' : ''}" style="width:${pct}%"></i></div>` : ''}
  </div>`;
}

/** Period-over-period change. `prev` is a like-for-like baseline: the window
 *  immediately before this one, or — for a single day, which is still in
 *  progress and would lose every comparison against a finished one — the daily
 *  average of the past week. */
function change(value, prev, basis) {
  if (!(prev > 0)) return value > 0 ? { cls: 'new', txt: 'new', note: 'nothing to compare with ' + basis } : null;
  const d = Math.round(((value - prev) / prev) * 100);
  const shown = Math.round(prev * 10) / 10;
  return {
    cls: d > 0 ? 'up' : d < 0 ? 'down' : 'flat',
    txt: (d > 0 ? '+' : '') + d + '%',
    note: `${d === 0 ? 'level with' : (d > 0 ? 'up on' : 'down on')} ${basis} (${shown})`,
  };
}
function chip(c) { return `<span class="chg ${c.cls}">${esc(c.txt)}</span>`; }

// Rolling windows, not calendar ones: "last 7 days" is always 7 days of work,
// so Monday morning doesn't reset the week to a near-empty box.
const WINDOWS = { 1: 'today', 7: 'Last 7 days', 30: 'Last 30 days' };
let win = 1;      // days in the selected window
let allStats = null;  // 60 days: the selected window plus the one it's compared against

function dayLabel(iso) { // yyyy-mm-dd -> dd/MM
  return iso.slice(8, 10) + '/' + iso.slice(5, 7);
}
function weekday(iso) {
  return new Intl.DateTimeFormat('en-GB', { weekday: 'short' }).format(new Date(iso + 'T12:00:00'));
}

function render(targets) {
  const stats = allStats.slice(-Math.max(win, 14)); // chart/history context: never fewer than 14 days
  const sum = allStats.slice(-win).reduce((a, d) => {
    for (const k of core.TARGET_KEYS) a[k] += d[k] || 0;
    return a;
  }, Object.fromEntries(core.TARGET_KEYS.map((k) => [k, 0])));

  const last = allStats[allStats.length - 1];
  const first = allStats[allStats.length - win];
  $('subline').textContent = win === 1
    ? weekday(last.day) + ' ' + dayLabel(last.day)
    : WINDOWS[win] + ' · ' + dayLabel(first.day) + ' – ' + dayLabel(last.day);
  $('chartLab').textContent = 'Last ' + stats.length + ' days';

  // a daily target covers the whole window when the window is wider than a day
  const t = (k) => Number(targets[k] || 0) * win;
  // baseline: the window before this one; for Today, the past week's daily
  // average (a half-finished day vs a whole one is a rigged comparison)
  const basisDays = win === 1 ? 7 : win;
  const before = allStats.slice(-(win + basisDays), -win);
  const base = (k) => before.reduce((a, d) => a + (d[k] || 0), 0) / (win === 1 ? basisDays : 1);
  const basis = win === 1 ? 'the 7-day daily average' : 'the previous ' + win + ' days';
  const c = (k) => change(sum[k], base(k), basis);
  $('cards').innerHTML =
    card('Cold DMs sent', sum.outreach, t('outreach'), '', c('outreach')) +
    card('Follow-ups logged', sum.followups, t('followups'), '', c('followups')) +
    card('New leads', sum.newLeads, t('newLeads'), '', c('newLeads')) +
    card('Meetings booked', sum.booked, t('booked'), 'handed to the closer', c('booked')) +
    card('Closed deals', sum.closed, t('closed'), 'won by the closer', c('closed'));

  // chart: follow-ups full scale, outreach divided by 10 so both read on one axis
  {
    const max = Math.max(1, ...stats.map((d) => Math.max(d.followups, d.outreach / 10)));
    $('chart').innerHTML = stats.map((d, i) => {
      const fu = Math.round((d.followups / max) * 100);
      const or = Math.round(((d.outreach / 10) / max) * 100);
      const t = `${dayLabel(d.day)}: ${d.followups} follow-ups · ${d.outreach} cold DMs · ${d.newLeads} new · ${d.booked} booked · ${d.closed} closed`;
      return `<div class="col${i === stats.length - 1 ? ' today' : ''}" title="${esc(t)}">
        <div class="seg fu" style="height:${fu}%"></div>
        <div class="seg or" style="height:${or}%"></div>
      </div>`;
    }).join('');
    $('xlab').innerHTML = stats.map((d) => `<span>${dayLabel(d.day).slice(0, 2)}</span>`).join('');
  }

  // history is always per-day, whatever window is selected — the daily targets
  // apply as-is here, and a day with no targets set can't be judged.
  $('hist').innerHTML = stats.slice().reverse().map((d) => {
    const hit = core.targetsHit(d, targets);
    const any = d.followups || d.outreach || d.newLeads || d.booked || d.closed;
    const c = (v) => `<span class="h-cell${v ? '' : ' dim'}">${v || '—'}</span>`;
    const verdict = !any || hit == null ? '—' : (hit ? '● hit' : '○ miss');
    return `<div class="v2-row h-row">
      <span class="h-cell">${weekday(d.day)} ${dayLabel(d.day)}</span>
      ${c(d.followups)}${c(d.outreach)}${c(d.newLeads)}${c(d.booked)}${c(d.closed)}
      <span class="h-cell ${any && hit != null ? (hit ? 'dot-hit' : 'dot-miss') : 'dim'}">${verdict}</span>
    </div>`;
  }).join('');
}

async function load() {
  $('refresh').disabled = true;
  try {
    const [stats, targets] = await Promise.all([core.setterStats(60), core.setterTargets()]);
    allStats = stats;
    render(targets);
    $('seg').onclick = (e) => {
      const b = e.target.closest('button[data-days]');
      if (!b) return;
      win = Number(b.dataset.days);
      [...$('seg').children].forEach((x) => x.setAttribute('aria-pressed', String(x === b)));
      render(targets);
    };
    $('skel').hidden = true; $('app').hidden = false;
  } catch (e) {
    $('skel').textContent = 'Couldn’t load: ' + e.message;
  } finally { $('refresh').disabled = false; }
}
$('refresh').onclick = load;
core.installPalette({});
load();
}
</script>
</body>
</html>
