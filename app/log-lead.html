<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>Log a lead · AJR</title>
<style>
.wrapc{max-width:720px}
.demo-banner{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;
  color:#8a8375;text-align:center;padding:6px 12px;border-bottom:1px solid #e6e2da;background:#f4f2ed;margin-bottom:16px}
.srch{display:flex;gap:9px;align-items:center;margin-bottom:16px;position:relative}
.srch input{flex:1}
.ac{position:absolute;top:calc(100% + 5px);left:0;right:0;background:#fff;border:1px solid #e6e2da;
  border-radius:10px;box-shadow:0 12px 30px -14px rgba(33,31,27,.3);z-index:20;overflow:hidden;max-height:300px;overflow-y:auto}
.ac div{padding:9px 13px;font-size:13px;cursor:pointer;display:flex;gap:9px;align-items:center}
.ac div:hover,.ac div.on{background:#fdfcf9}
.ac .h{font-weight:600}
.ac .m{color:#8a8375;font-size:12px;margin-left:auto}
.lead-card{background:#fff;border:1px solid #e6e2da;border-radius:12px;padding:16px 18px;margin-bottom:16px}
.lead-card .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:5px}
.lead-card .hh{font-size:15px;font-weight:700}
.lead-card .meta{color:#6d675b;font-size:12.5px}
.lead-card .note{color:#4d4a42;font-size:12.5px;margin-top:2px}
.sect{margin-bottom:15px}
.sect > .v2-lab{display:block;margin-bottom:7px}
.stg{display:flex;gap:7px;flex-wrap:wrap}
.stg button{min-height:34px;padding:0 14px;border-radius:99px;border:1px solid #ddd8cd;background:#fff;
  font-size:12.5px;font-weight:500;color:#4d4a42}
.stg button:hover{border-color:#8a8375;color:#211f1b}
.stg button.now{border:2px solid #211f1b;background:#f4f2ed;color:#211f1b;font-weight:600}
.stg button.booked{border-color:#c9dfd2;color:#2a6a4d}
.stg button.booked:hover{background:#eef5f0}
.stg.sec button{color:#8a8375;font-size:12px}
.chips-r{display:flex;gap:7px;flex-wrap:wrap}
.chips-r button{min-height:30px;padding:0 12px;border-radius:99px;border:1px solid #ddd8cd;background:#fff;
  font-size:12px;color:#4d4a42}
.chips-r button.on{background:#211f1b;border-color:#211f1b;color:#f9f8f5;font-weight:600}
.chips-r button.hot.on{background:#faf3e6;border-color:#e0cba0;color:#a8762a}
.conf{display:flex;align-items:center;gap:11px;flex-wrap:wrap;padding:13px 16px;border:1px solid #c9dfd2;
  border-radius:12px;background:#eef5f0;margin-bottom:15px}
.conf .sp{flex:1}
.recent{margin-top:24px}
.recent ul{list-style:none;margin-top:8px}
.recent li{display:flex;gap:10px;align-items:center;padding:8px 0;border-top:1px solid #f0ede6;font-size:12.5px;color:#4d4a42}
.recent li:first-child{border-top:none}
.recent .t{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#98917f;flex:none}
.recent .sp{flex:1}
.mic{width:34px;height:34px;flex:none;border-radius:50%;background:#2a6a4d;color:#fff;display:inline-flex;
  align-items:center;justify-content:center;font-size:11px}
.mic.on{background:#b4543e;animation:pul 1.3s ease infinite}
@keyframes pul{0%,100%{box-shadow:0 0 0 0 rgba(180,84,62,.4)}50%{box-shadow:0 0 0 9px rgba(180,84,62,0)}}
.drop{position:fixed;inset:0;background:rgba(33,31,27,.45);z-index:75;display:flex;align-items:center;
  justify-content:center;color:#f9f8f5;font-size:15px;font-weight:600}
/* dead-token aliases still referenced by scripts */
:root{--dim:#8a8375;--mono-font:'IBM Plex Mono',ui-monospace,monospace}
/* local scanner review cards (lc-*) */
.lc-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.lc-h{flex:1;min-height:34px;padding:0 11px;background:#fff;border:1px solid #ddd8cd;border-radius:8px;
  color:#211f1b;font-weight:600;font-size:13.5px}
.lc-x{width:30px;height:30px;border-radius:8px;color:#8a8375;display:inline-flex;align-items:center;
  justify-content:center;cursor:pointer;background:none;border:none}
.lc-x:hover{color:#b4543e}
.lc-x svg{width:14px;height:14px}
.lc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.lc-grid select{width:100%;min-height:32px;padding:4px 9px;background:#fff;border:1px solid #ddd8cd;
  border-radius:8px;color:#211f1b;font-size:12.5px}
.lc-note{width:100%;min-height:32px;padding:5px 10px;background:#fff;border:1px solid #ddd8cd;
  border-radius:8px;color:#211f1b;font-size:12.5px}
.sc-card .exists{font-size:11px;color:#a8762a;margin-top:6px}
.thinking{padding:26px;text-align:center;color:#8a8375;font-size:13px}
.recent-extra{color:#98917f;font-size:11.5px}
/* screenshot review modal */
.modal{position:fixed;inset:0;background:rgba(33,31,27,.45);z-index:80;display:flex;align-items:flex-start;
  justify-content:center;padding:40px 20px;overflow-y:auto}
.modal .box{width:min(680px,100%);background:#f9f8f5;border:1px solid #e6e2da;border-radius:14px}
.modal .mh{padding:18px 22px;border-bottom:1px solid #e6e2da}
.modal .mh h2{font-size:16px;font-weight:700}
.modal .mh p{color:#8a8375;font-size:12.5px;margin-top:3px}
.modal .mb{padding:16px 22px;display:flex;flex-direction:column;gap:11px}
.modal .mf{padding:14px 22px;border-top:1px solid #e6e2da;display:flex;align-items:center;gap:10px}
.modal .mf .sp{flex:1}
.sc-card{background:#fff;border:1px solid #e6e2da;border-radius:12px;padding:13px 15px}
.sc-card.low{border-color:#e0cba0}
.sc-card.dupe{opacity:.6}
</style>
</head>
<body>
<main class="v2-main wrapc">
  <div class="demo-banner" id="demoBanner" hidden>DEMO — writes go nowhere</div>

  <header class="v2-h">
    <h1>Log a lead</h1>
    <span class="sub"><span id="metaCount">—</span> leads · <span id="metaDate">—</span></span>
    <span class="sp"></span>
    <button class="v2-btn sm" id="refreshBtn" disabled>Refresh</button>
  </header>

  <section id="skeleton" class="v2-card" style="padding:30px;text-align:center;color:#8a8375" hidden>Loading…</section>
  <section id="loadError" class="v2-card" style="padding:24px;text-align:center" hidden>
    <p id="loadErrorMsg" style="margin-bottom:12px;color:#8a8375">Couldn’t load.</p>
    <button class="v2-btn" id="loadRetry">Retry</button>
  </section>

  <div id="app" hidden>
    <div id="viewUpdate">
      <div class="srch">
        <input class="v2-in" id="searchInput" type="text" placeholder="Search a handle, or say what happened…"
               autocomplete="off" spellcheck="false">
        <button class="mic" id="micBtn" hidden aria-label="Speak">●</button>
        <button class="v2-btn dash" id="scanBtn" type="button">Paste screenshot ⌘V</button>
        <input id="scanFile" type="file" accept="image/*" hidden>
        <div class="ac" id="acList" hidden></div>
      </div>
      <div class="v2-lab" id="voiceHint" hidden style="margin:-8px 0 12px">listening…</div>

      <div class="lead-card" id="armChip" hidden></div>

      <div class="conf" id="confirmBar" hidden>
        <span class="v2-ai">AI</span>
        <span id="confirmText"></span>
        <span class="sp"></span>
        <button class="v2-btn go sm" id="confirmBtn">Confirm</button>
        <button class="v2-btn sm" id="cancelBtn">Edit</button>
      </div>

      <div class="sect">
        <span class="v2-lab">Move stage</span>
        <div class="stg" role="group" aria-label="Primary stages">
          <button data-stage="Engaged 1">Engaged 1</button>
          <button data-stage="Engaged 2">Engaged 2</button>
          <button data-stage="Engaged 3">Engaged 3</button>
          <button class="booked" data-stage="Booked">Booked</button>
          <button data-stage="Archive">Archive</button>
        </div>
        <div class="stg sec" role="group" aria-label="Secondary stages" style="margin-top:7px">
          <button data-stage="No Close">No Close</button>
          <button data-stage="No Reply">No Reply</button>
          <button data-stage="Closed">Closed</button>
        </div>
      </div>

      <div class="sect">
        <span class="v2-lab">Status</span>
        <div class="chips-r" id="statusChips"></div>
      </div>

      <div class="sect">
        <span class="v2-lab">Temp</span>
        <div class="chips-r" id="tempChips"></div>
        <select id="tempSel" hidden><option value="">Temp — no change</option></select>
      </div>

      <div class="sect">
        <input class="v2-in" id="noteInput" type="text" placeholder="Quick note…" autocomplete="off">
      </div>

      <div style="display:flex;gap:9px;align-items:center">
        <button class="v2-btn go" id="logBtn" disabled><span id="logBtnLabel">Log it</span></button>
      </div>

      <div class="recent">
        <span class="v2-lab">Recent</span>
        <ul id="recentList"></ul>
      </div>
    </div>
  </div>
</main>

<div class="drop" id="dropOver" hidden>Drop the screenshot to read it</div>

<div class="modal" id="scanModal" hidden>
  <div class="box">
    <div class="mh" style="display:flex;align-items:flex-start;gap:10px">
      <div style="flex:1"><h2 id="scanTitle">Screenshot → leads</h2>
        <p id="scanSub">AI reads the handles — edit anything before adding.</p></div>
      <button class="v2-btn sm" id="scanClose">×</button>
    </div>
    <div class="mb" id="scanBody"></div>
    <div class="mf">
      <span id="scanCount" style="color:#8a8375;font-size:12.5px"></span>
      <span class="sp"></span>
      <button class="v2-btn" id="scanCancel">Cancel</button>
      <button class="v2-btn go" id="scanAdd">Add leads</button>
    </div>
  </div>
</div>


<script src="./parser.js"></script>
<script type="module">
import * as core from './crm-core.js?v=20260721g';
const session = await core.requireAuth();
if (session) {
await core.installChrome({ active: 'log-lead' });

var $ = function (id) { return document.getElementById(id); };

var PRIMARY = ['Engaged 1', 'Engaged 2', 'Engaged 3', 'Booked', 'Archive'];
var SECONDARY = ['No Close', 'No Reply', 'Closed'];
var ALL_STAGES = PRIMARY.concat(SECONDARY);
var LEVEL_COLORS = {
  'Engaged 1': '#a9a9b1', 'Engaged 2': '#c9c9cf', 'Engaged 3': '#e9e9ec',
  'Booked': '#8ee59a', 'No Close': '#d99a9a', 'Archive': '#6e6e78', 'No Reply': '#8a8a92', 'Closed': '#c9c9cf'
};

var state = {
  demo: false,
  leads: [],                 // raw bootstrap rows
  byHandle: new Map(),       // handle -> bottom-most lead row (mirrors server duplicate rule)
  unique: [],                // deduped leads in sheet order
  statuses: [], temps: [],
  serverDate: '',
  armed: null,               // {mode:'existing',lead} | {mode:'new',handle} | {mode:'hint'}
  selectedStatus: '',
  pending: null,             // parsed utterance awaiting confirm
  busy: false,
  acResults: [], acIndex: -1, acOpen: false,
  listening: false
};

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
function squash(s) { return String(s || '').replace(/[\s._]/g, ''); }
function newReqId() { return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function daysSince(dmy) {
  var d = CRMParse.parseDMY(dmy);
  var ref = CRMParse.parseDMY(state.serverDate) || new Date();
  if (!d) return null;
  return Math.round((ref - d) / 864e5);
}
function daysBadge(dmy) {
  var n = daysSince(dmy);
  if (n === null) return '<span class="v2-age late">never</span>';
  return '<span class="v2-age ' + core.ageClass(n) + '">' + (n <= 0 ? 'today' : n + 'd') + '</span>';
}
function canonIn(list, v) {
  if (!v) return null;
  var t = String(v).trim().toLowerCase();
  for (var i = 0; i < list.length; i++) if (list[i].toLowerCase() === t) return list[i];
  return null;
}

/* ---------- toasts ---------- */
var toast = core.toast;

/* ---------- data layer: Supabase via crm-core ---------- */
function api(action, payload) {
  if (action === 'bootstrap') {
    return core.bootstrap().then(function (d) {
      setDot('ok');
      return { ok: true, serverDate: d.serverDate, leads: d.leads,
        stages: core.STAGES.slice(), statuses: core.STATUSES.slice(), temps: core.TEMPS.slice() };
    }).catch(function (e) { setDot('err'); throw e; });
  }
  if (action === 'setterUpdate') {
    return core.setterUpdate(payload).then(function (r) { setDot('ok'); return r; })
      .catch(function (e) { setDot('err'); throw e; });
  }
  if (action === 'interpret') {
    return core.interpret(payload.text, payload.mode, payload.deal)
      .then(function (r) { setDot('ok'); return r; })
      .catch(function (e) { setDot('err'); throw e; });
  }
  throw new Error('unknown action ' + action);
}
function setDot() { /* v2 chrome has no status dot */ }

/* ---------- bootstrap ---------- */
function runBootstrap(firstLoad) {
  var btn = $('refreshBtn');
  btn.disabled = true; btn.classList.add('spinning');
  if (firstLoad) { $('skeleton').hidden = false; $('loadError').hidden = true; $('app').hidden = true; }
  api('bootstrap').then(function (data) {
    state.serverDate = data.serverDate || '';
    state.leads = data.leads || [];
    state.statuses = data.statuses || [];
    state.temps = data.temps || [];
    buildIndex();
    $('metaDate').textContent = state.serverDate || '—';
    $('metaCount').textContent = String(state.leads.length);
    renderStatusChips();
    renderTempSelect();
    updateLogBtn();
    $('skeleton').hidden = true; $('loadError').hidden = true; $('app').hidden = false;
    if (state.deepLead) { $('searchInput').value = state.deepLead; state.deepLead = ''; }
    applyQuery($('searchInput').value);
    if (state.deepSay) { var say = state.deepSay; state.deepSay = ''; $('searchInput').value = say; aiInterpret(say); }
    if (firstLoad) $('searchInput').focus();
  }).catch(function (err) {
    if (firstLoad || $('app').hidden) {
      $('skeleton').hidden = true;
      $('loadError').hidden = false;
      $('loadErrorMsg').textContent = 'Couldn’t load leads: ' + err.message;
    } else {
      toast({ type: 'err', html: 'Refresh failed: ' + esc(err.message), sticky: true,
        action: { label: 'Retry', fn: function () { runBootstrap(false); } } });
    }
  }).finally(function () {
    btn.disabled = false; btn.classList.remove('spinning');
  });
}

function buildIndex() {
  state.byHandle = new Map();
  state.leads.forEach(function (l) { state.byHandle.set(l.h, l); }); // later rows win = bottom-most
  state.unique = [];
  var seen = new Set();
  state.leads.forEach(function (l) {
    if (!seen.has(l.h)) { seen.add(l.h); state.unique.push(state.byHandle.get(l.h)); }
  });
}

/* ---------- status chips + temp ---------- */
function renderStatusChips() {
  var box = $('statusChips');
  box.innerHTML = '';
  state.selectedStatus = '';
  state.statuses.forEach(function (s) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = s;
    b.setAttribute('aria-pressed', 'false');
    b.addEventListener('click', function () { selectStatus(state.selectedStatus === s ? '' : s); });
    box.appendChild(b);
  });
  box.parentNode.hidden = state.statuses.length === 0;
}
function selectStatus(s) {
  state.selectedStatus = s;
  if ($('logBtnLabel')) updateLogBtn();
  var chips = $('statusChips').children;
  for (var i = 0; i < chips.length; i++) {
    var on = chips[i].textContent === s;
    chips[i].setAttribute('aria-pressed', on ? 'true' : 'false');
    chips[i].classList.toggle('on', on);
  }
}
function renderTempSelect() {
  var sel = $('tempSel');
  while (sel.options.length > 1) sel.remove(1);
  state.temps.forEach(function (t) {
    var o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  // chips are the UI; the select stays as the value store the rest of the page reads
  var box = $('tempChips');
  box.innerHTML = '';
  state.temps.forEach(function (t) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = t.replace(' Lead', '');
    if (/hot/i.test(t)) b.className = 'hot';
    b.addEventListener('click', function () {
      sel.value = (sel.value === t) ? '' : t;
      syncTempChips();
      if ($('logBtnLabel')) updateLogBtn();
    });
    box.appendChild(b);
  });
  syncTempChips();
}
function syncTempChips() {
  var v = $('tempSel').value;
  Array.prototype.forEach.call($('tempChips').children, function (b, i) {
    b.classList.toggle('on', state.temps[i] === v);
  });
}

/* ---------- search / autocomplete / arming ---------- */
function searchLeads(q) {
  var qs = squash(q);
  var out = [];
  state.unique.forEach(function (l) {
    var rank = -1;
    if (l.h === q) rank = 0;
    else if (l.h.indexOf(q) === 0) rank = 1;
    else if (l.h.indexOf(q) !== -1) rank = 2;
    else if (qs && squash(l.h).indexOf(qs) !== -1) rank = 3;
    if (rank >= 0) out.push({ rank: rank, lead: l });
  });
  out.sort(function (a, b) { return a.rank - b.rank || a.lead.h.localeCompare(b.lead.h); });
  return out.slice(0, 8).map(function (r) { return r.lead; });
}

function applyQuery(raw) {
  var q = CRMParse.normalizeHandle(raw);
  if (!q) {
    state.armed = null;
    renderChip(); closeAc();
    return;
  }
  var exact = state.byHandle.get(q);
  if (exact) state.armed = { mode: 'existing', lead: exact };
  else if (/\s/.test(q)) state.armed = { mode: 'hint', handle: q };
  else state.armed = { mode: 'new', handle: q };
  renderChip();
  renderAc(searchLeads(q));
  updateLogBtn();
}

function renderChip() {
  var chip = $('armChip');
  var a = state.armed;
  if (!a) { chip.hidden = true; chip.innerHTML = ''; return; }
  chip.hidden = false;
  chip.className = 'lead-card';
  if (a.mode === 'existing') {
    var l = a.lead;
    var dups = state.leads.filter(function (x) { return x.h === l.h; }).length;
    chip.innerHTML = '<div class="top">' +
        '<span class="hh">@' + esc(l.h) + '</span>' +
        (l.url ? '<a href="' + esc(l.url) + '" target="_blank" rel="noopener" style="font-size:12.5px">open profile ↗</a>' : '') +
      '</div>' +
      '<div class="meta">' + esc(l.level || 'no level') +
        (l.status ? ' · ' + esc(l.status) : '') +
        (l.lastContact ? ' · ' + daysBadge(l.lastContact) + ' since contact' : '') +
        (l.qual ? ' · ' + esc(l.qual) : '') +
        (dups > 1 ? ' · ' + dups + ' rows' : '') + '</div>' +
      (l.notes ? '<div class="note">' + esc(l.notes) + '</div>' : '');
  } else if (a.mode === 'new') {
    chip.innerHTML = '<div class="top"><span class="hh">@' + esc(a.handle) + '</span>' +
      '<span class="v2-ai" style="color:#2a6a4d;border-color:#c9dfd2">new</span></div>' +
      '<div class="meta">Not in the CRM yet — pick a stage to create it.</div>';
  } else {
    chip.innerHTML = '<div class="meta">Press Enter to run this command.</div>';
  }
}

function renderAc(results) {
  state.acResults = results;
  state.acIndex = -1;
  var list = $('acList');
  if (!results.length) { closeAc(); return; }
  list.innerHTML = results.map(function (l, i) {
    return '<div class="ac-item" id="ac-opt-' + i + '" role="option" aria-selected="false" data-i="' + i + '">' +
      '<span class="h">@' + esc(l.h) + '</span>' +
      '<span style="color:#6d675b;font-size:12px">' + esc(l.level || '—') + '</span>' +
      (l.temp === 'Hot Lead' ? '<span class="v2-hot" style="font-size:11.5px">Hot</span>' : '') +
      '<span class="m">' + esc(l.status || '') + (l.lastContact ? ' · ' + esc(l.lastContact) : '') + '</span>' +
      '</div>';
  }).join('');
  list.hidden = false;
  state.acOpen = true;
  $('searchInput').setAttribute('aria-expanded', 'true');
}

function closeAc() {
  $('acList').hidden = true;
  $('acList').innerHTML = '';
  state.acOpen = false;
  state.acIndex = -1;
  $('searchInput').setAttribute('aria-expanded', 'false');
  $('searchInput').removeAttribute('aria-activedescendant');
}

function moveAc(delta) {
  if (!state.acOpen) { applyQuery($('searchInput').value); if (!state.acOpen) return; }
  var n = state.acResults.length;
  state.acIndex = (state.acIndex + delta + n) % n;
  var items = $('acList').children;
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('active', i === state.acIndex);
    items[i].setAttribute('aria-selected', i === state.acIndex ? 'true' : 'false');
  }
  items[state.acIndex].scrollIntoView({ block: 'nearest' });
  $('searchInput').setAttribute('aria-activedescendant', 'ac-opt-' + state.acIndex);
}

function pickLead(lead) {
  $('searchInput').value = lead.h;
  state.armed = { mode: 'existing', lead: lead };
  renderChip();
  closeAc();
  updateLogBtn();
}

/* ---------- AI: natural sentences -> interpret (mode:'setter') ---------- */
function aiBadge() {
  return '<span style="display:inline-flex;align-items:center;gap:4px;color:var(--dim);font:600 10.5px var(--mono-font);letter-spacing:.06em;text-transform:uppercase;margin-right:6px">' +
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.8 15.9 9 18.75l-.8-2.85a4.5 4.5 0 0 0-3.1-3.1L2.25 12l2.85-.8a4.5 4.5 0 0 0 3.1-3.1L9 5.25l.8 2.85a4.5 4.5 0 0 0 3.1 3.1L15.75 12l-2.85.8a4.5 4.5 0 0 0-3.1 3.1Z"/></svg>Claude</span>';
}
var aiBusy = false;
function aiInterpret(text) {
  if (aiBusy) return;
  aiBusy = true;
  var chip = $('armChip');
  chip.hidden = false; chip.className = 'lead-card';
  chip.innerHTML = aiBadge() + ' <span>Reading…</span>';
  var armed = state.armed && state.armed.mode === 'existing' ? state.armed.lead.h : '';
  api('interpret', { text: text, mode: 'setter', deal: armed || undefined })
    .then(function (res) {
      var cmd = CRMParse.intentToCommand(res.intent, {
        now: new Date(), leads: state.unique, closing: [], statuses: state.statuses
      });
      if (cmd.route !== 'setter' || !cmd.setter.handle) {
        renderChip();
        toast({ html: aiBadge() + (cmd.route === 'closer'
          ? 'That sounds like a sales-call update — that’s Reinis’s Log-the-call tool.'
          : esc((cmd.hint || 'Couldn’t tell what to update — name the lead and what changed.'))), ttl: 6000 });
        return;
      }
      var st = cmd.setter;
      if (!st.stage && !st.status && !st.temp && !st.notes) {
        renderChip();
        toast({ html: aiBadge() + 'Heard the lead but no change — say a stage, status or temp.', ttl: 5000 });
        return;
      }
      var isNew = !state.byHandle.get(st.handle);
      if (isNew && !st.stage) {
        renderChip();
        toast({ html: aiBadge() + '<span class="mono">@' + esc(st.handle) + '</span> isn’t a lead yet — include a stage (e.g. “engaged 1”) to create it.', ttl: 6000 });
        return;
      }
      $('searchInput').value = st.handle;
      applyQuery(st.handle);
      if (st.status) selectStatus(canonIn(state.statuses, st.status) || '');
      if (st.temp) { $('tempSel').value = st.temp; syncTempChips(); }
      if (st.notes) $('noteInput').value = st.notes;
      state.pending = { handle: st.handle, stage: st.stage, status: st.status, isNew: isNew, ai: true,
        note: st.notes, why: st.stage === 'Booked' ? ' · pings Reinis on WhatsApp' : '' };
      showConfirmBar();
    })
    .catch(function (err) {
      renderChip();
      if (/not configured/i.test(err.message)) {
        toast({ html: 'AI isn’t configured — use “handle stage”, e.g. “oscarwxng engaged 2”.', ttl: 6000 });
      } else {
        toast({ type: 'err', html: 'Couldn’t read that: ' + esc(err.message), ttl: 6000 });
      }
    })
    .finally(function () { aiBusy = false; });
}

/* ---------- utterance parse (typed Enter or voice final) ---------- */
function tryUtterance(text) {
  var r = CRMParse.parseSetterUtterance(text, { leads: state.unique });
  if (!r || !r.handle) return false;
  var stage = canonIn(ALL_STAGES, r.stage);
  var match = (r.matches && r.matches.length) ? r.matches[0] : null;
  if (r.matches && r.matches.length > 1) {
    toast({ html: r.matches.length + ' leads match — using <span class="mono">@' + esc(match.h) + '</span>. Check before confirming.', ttl: 5000 });
  }
  // keep dots/underscores for genuinely new handles; squash only joins spoken spaces
  var handle = match ? match.h : (r.handle.indexOf(' ') === -1 ? r.handle : squash(r.handle));
  if (!stage) {
    if (r.stage) {
      toast({ type: 'err', html: 'Didn’t recognize stage “' + esc(r.stage) + '” — say e.g. “engaged 2” or “booked”.' });
      return true;
    }
    if (match) { pickLead(match); return true; } // plain handle utterance: just arm it
    return false;
  }
  var status = canonIn(state.statuses, r.status) || r.status || '';
  if (canonIn(state.statuses, r.status)) selectStatus(canonIn(state.statuses, r.status));
  $('searchInput').value = handle;
  applyQuery(handle);
  state.pending = { handle: handle, stage: stage, status: status, isNew: !state.byHandle.get(handle) };
  showConfirmBar();
  return true;
}

function showConfirmBar() {
  var p = state.pending;
  markStage(p.stage);
  var effStatus = p.status || state.selectedStatus;
  $('confirmText').innerHTML =
    (p.ai ? aiBadge() : '') +
    (p.isNew ? '<span class="tag-new" style="color:#0b1f10;background:#8ee59a;padding:1px 8px;border-radius:999px;font-size:.72rem;font-weight:700">NEW</span> ' : '') +
    '<span class="mono">@' + esc(p.handle) + '</span> → <span class="mono">' + esc(p.stage) + '</span>' +
    (effStatus ? ' · ' + esc(effStatus) : '') +
    ($('tempSel').value ? ' · ' + esc($('tempSel').value) : '') +
    (p.note ? ' · <span class="opt">“' + esc(p.note.length > 40 ? p.note.slice(0, 40) + '…' : p.note) + '”</span>' : '') +
    (p.why ? '<span class="opt">' + esc(p.why) + '</span>' : '');
  $('confirmBar').hidden = false;
  $('confirmBtn').focus();
}

function hideConfirmBar() {
  state.pending = null;
  $('confirmBar').hidden = true;
  markStage(null);
}

function markStage(stage) {
  document.querySelectorAll('.stg button').forEach(function (b) {
    b.classList.toggle('now', !!stage && b.dataset.stage === stage);
  });
}

/* ---------- the ONE action: write ---------- */
function setBusy(v) {
  state.busy = v;
  document.querySelectorAll('.stg button, #confirmBtn').forEach(function (b) { b.disabled = v; });
}

function doWrite(args) {
  if (state.busy) return;
  setBusy(true);
  var payload = { handle: args.handle };
  if (args.stage) payload.stage = args.stage;
  if (args.status) payload.status = args.status;
  if (args.temp) payload.temp = args.temp;
  if (args.note) payload.note = args.note;
  api('setterUpdate', payload).then(function (res) {
    var extras = [];
    if (args.status) extras.push(args.status);
    if (args.temp) extras.push(args.temp);
    if (args.note) extras.push('note saved');
    var html = (res.mode === 'created' ? 'Created ' : '') +
      '<span class="mono">@' + esc(res.handle) + '</span>' +
      (args.stage ? ' → <span class="mono">' + esc(args.stage) + '</span>' : ' logged') +
      (extras.length ? ' (' + esc(extras.join(', ')) + ')' : '') +
      (args.stage ? '' : ' — stage unchanged') + ', contact date stamped.';
    // the booked ping now fires centrally in core (ensureDealForLead), so every
    // path that books a lead alerts the channel — nothing to do here.
    var undoAction = (res.mode === 'updated' && res.prev)
      ? { label: 'Undo', fn: function () { undoWrite(res); } } : null;
    toast({ type: 'ok', html: html, ttl: 8000, action: undoAction });
    addRecent(res, args);
    applyWriteLocally(res, args);
    resetAction();
  }).catch(function (err) {
    toast({ type: 'err', html: 'Write failed: ' + esc(err.message), sticky: true,
      action: { label: 'Retry', fn: function () { doWrite(args); } } });
  }).finally(function () { setBusy(false); });
}

function undoWrite(res) {
  core.undoWrite(res.undo)
    .then(function () {
      var l = state.byHandle.get(res.handle);
      if (l) {
        l.level = res.prev.level; l.status = res.prev.last_status;
        l.temp = res.prev.temp; l.lastContact = core.isoToDmy(res.prev.last_contact);
      }
      toast({ type: 'ok', html: 'Undone — <span class="mono">@' + esc(res.handle) + '</span> restored to ' + esc(res.prev.level || 'no level') + '.' });
    })
    .catch(function (err) {
      toast({ type: 'err', html: 'Undo failed: ' + esc(err.message), sticky: true });
    });
}

function applyWriteLocally(res, args) {
  if (res.mode === 'updated') {
    var l = state.byHandle.get(res.handle);
    if (!l) return;
    if (args.stage) l.level = args.stage;
    if (args.status) l.status = args.status;
    if (args.temp) l.temp = args.temp;
    l.lastContact = state.serverDate;
    return;
  }
  {
    var nl = {
      h: res.handle, url: 'https://www.instagram.com/' + res.handle + '/',
      level: args.stage || '', status: args.status || '', temp: args.temp || 'Warm Lead',
      qual: '', notes: args.note || '', lastContact: state.serverDate
    };
    state.leads.push(nl);
    state.byHandle.set(nl.h, nl);
    state.unique.push(nl);
    $('metaCount').textContent = String(state.leads.length);
  }
}

function resetAction() {
  $('searchInput').value = '';
  state.armed = null;
  renderChip(); closeAc(); hideConfirmBar();
  // status chip + temp stay STICKY for batch logging; note is per-lead
  $('noteInput').value = '';
  updateLogBtn();
  $('searchInput').focus();
}

/* ---------- recent actions ---------- */
var recent = [];
function addRecent(res, args) {
  recent.unshift({
    row: res.row, handle: res.handle, mode: res.mode, stage: args.stage,
    status: args.status || '', temp: args.temp || '',
    time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  });
  var list = $('recentList');
  list.innerHTML = recent.map(function (r) {
    var extras = [r.status, r.temp].filter(Boolean).join(', ');
    return '<li class="recent-item">' +
      '<span class="recent-row-num">row ' + esc(r.row) + '</span>' +
      '<span class="recent-handle">@' + esc(r.handle) + '</span>' +
      '<span>→ ' + esc(r.stage || (r.status ? 'logged' : 'updated')) + '</span>' +
      (extras ? '<span class="recent-extra">' + esc(extras) + '</span>' : '') +
      '<span class="recent-mode ' + esc(r.mode) + '">' + esc(r.mode) + '</span>' +
      '<span class="recent-time">' + esc(r.time) + '</span>' +
      '</li>';
  }).join('');
}

/* ---------- voice ---------- */
var SRCls = window.SpeechRecognition || window.webkitSpeechRecognition;
var recog = null;

function initVoice() {
  if (!SRCls) {
    $('voiceHint').textContent = 'Use your keyboard’s dictation key to talk.';
    return;
  }
  $('micBtn').hidden = false;
  $('voiceHint').textContent = '“moved oscar to engaged 2, story reply, seems warm”';
  $('micBtn').addEventListener('click', function () {
    if (state.listening) { recog.stop(); return; }
    recog = new SRCls();
    recog.lang = 'en-US';
    recog.interimResults = true;
    recog.continuous = false;
    recog.maxAlternatives = 1;
    var finalText = '';
    recog.onstart = function () {
      state.listening = true;
      $('micBtn').classList.add('listening');
      $('micBtn').setAttribute('aria-pressed', 'true');
    };
    recog.onresult = function (e) {
      var text = '';
      for (var i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
      text = text.trim();
      $('searchInput').value = text;
      applyQuery(text);
      if (e.results[e.results.length - 1].isFinal) finalText = text;
    };
    recog.onerror = function (e) { toast({ type: 'err', html: esc(voiceErrorHint(e.error)), ttl: 7000 }); };
    recog.onend = function () {
      state.listening = false;
      $('micBtn').classList.remove('listening');
      $('micBtn').setAttribute('aria-pressed', 'false');
      if (finalText && !tryUtterance(finalText)) aiInterpret(finalText);
    };
    try { recog.start(); } catch (err) { toast({ type: 'err', html: 'Mic couldn’t start — try again.' }); }
  });
}

function voiceErrorHint(code) {
  var safari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  switch (code) {
    case 'not-allowed':
    case 'service-not-allowed':
      return safari
        ? 'Mic blocked. On Safari enable Siri & Dictation in system settings, or use your keyboard’s mic key.'
        : 'Mic access blocked — allow the microphone for this site, or use your keyboard’s mic key.';
    case 'no-speech': return 'Didn’t hear anything — tap the mic and speak.';
    case 'audio-capture': return 'No microphone found on this device.';
    case 'network': return 'Speech service unreachable — use your keyboard’s mic key instead.';
    default: return 'Voice error (' + code + ') — use your keyboard’s mic key instead.';
  }
}

/* ---------- stage / log actions (guards live here) ---------- */
function stageAction(stage) {
  var a = state.armed;
  if (!a || a.mode === 'hint') {
    if (a && a.mode === 'hint' && tryUtterance($('searchInput').value)) return;
    toast({ html: 'Couldn’t tell which lead — pick one from the list first.', ttl: 3000 });
    $('searchInput').focus();
    return;
  }
  var needsConfirm = false;
  var why = '';
  if (a.mode === 'new') {
    needsConfirm = true; // creating a row deserves one deliberate confirm
    var similar = searchLeads(a.handle).slice(0, 2).map(function (l) { return '@' + l.h; });
    why = similar.length ? ' · similar: ' + similar.join(', ') : '';
  } else if (stage === 'Booked') {
    needsConfirm = true; why = ' · creates the deal handoff';
  } else if (a.lead.level === 'Closed' && stage !== 'Closed') {
    needsConfirm = true; why = ' · this lead is CLOSED';
  }
  var args = {
    handle: a.mode === 'existing' ? a.lead.h : a.handle,
    stage: stage,
    status: state.selectedStatus,
    temp: $('tempSel').value,
    note: $('noteInput').value.trim()
  };
  if (needsConfirm) {
    state.pending = { handle: args.handle, stage: stage, status: args.status, isNew: a.mode === 'new', why: why, note: args.note };
    showConfirmBar();
    return;
  }
  hideConfirmBar();
  doWrite(args);
}

function logAction() {
  var a = state.armed;
  if (!a || a.mode !== 'existing') {
    toast({ html: 'Pick a lead first.', ttl: 3000 });
    return;
  }
  doWrite({
    handle: a.lead.h,
    status: state.selectedStatus || 'Follow up Sent',
    temp: $('tempSel').value,
    note: $('noteInput').value.trim()
  });
}

function updateLogBtn() {
  var a = state.armed;
  var st = state.selectedStatus || 'Follow up Sent';
  $('logBtnLabel').textContent = 'Log “' + st + '” · keep stage';
  $('logBtn').disabled = !(a && a.mode === 'existing') || state.busy;
}

/* ---------- events ---------- */
function bindEvents() {
  var input = $('searchInput');

  input.addEventListener('input', function () {
    if (state.pending) hideConfirmBar(); // editing invalidates a parsed command
    var v = input.value;
    if (v.indexOf('instagram.com') !== -1) {
      var h = CRMParse.normalizeHandle(v);
      if (h) { input.value = h; v = h; }
    }
    applyQuery(v);
  });

  input.addEventListener('keydown', function (e) {
    if (!$('confirmBar').hidden) return; // document-level handler owns Enter/Esc then
    if (e.key === 'ArrowDown') { e.preventDefault(); moveAc(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveAc(-1); }
    else if (e.key === 'Escape') { closeAc(); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      // don't let this same keystroke bubble to the document handler and
      // auto-confirm the bar it just opened — confirming takes its own Enter
      e.stopPropagation();
      if (state.acOpen && state.acIndex >= 0) pickLead(state.acResults[state.acIndex]);
      else if (!tryUtterance(input.value) && input.value.trim().indexOf(' ') !== -1) aiInterpret(input.value.trim());
    }
  });

  input.addEventListener('blur', function () {
    setTimeout(closeAc, 150); // let option mousedown land first
  });

  $('acList').addEventListener('mousedown', function (e) {
    var li = e.target.closest('.ac-item');
    if (!li) return;
    e.preventDefault();
    pickLead(state.acResults[Number(li.dataset.i)]);
  });

  document.querySelectorAll('.stg button').forEach(function (btn) {
    btn.addEventListener('click', function () { stageAction(btn.dataset.stage); });
  });

  $('confirmBtn').addEventListener('click', function () {
    var p = state.pending;
    if (!p) return;
    if (!p.stage && p.isNew) { toast({ type: 'err', html: 'New lead needs a stage first.' }); return; }
    hideConfirmBar();
    doWrite({ handle: p.handle, stage: p.stage, status: p.status || state.selectedStatus, temp: $('tempSel').value, note: p.note || $('noteInput').value.trim() });
  });
  $('cancelBtn').addEventListener('click', function () {
    hideConfirmBar();
    $('searchInput').focus();
  });

  document.addEventListener('keydown', function (e) {
    if ($('confirmBar').hidden) return;
    if (e.key === 'Enter' && e.target !== $('confirmBtn') && e.target !== $('cancelBtn')) {
      e.preventDefault();
      $('confirmBtn').click();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      $('cancelBtn').click();
    }
  });

  $('refreshBtn').addEventListener('click', function () { runBootstrap(false); });
  $('loadRetry').addEventListener('click', function () { runBootstrap(true); });

  $('logBtn').addEventListener('click', logAction);

  // keyboard shortcuts when not typing: 1/2/3 stages, B/A/N/C, F = log, Esc = clear
  document.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) {
      if (e.key === 'Escape') { resetAction(); }
      return;
    }
    if (!$('confirmBar').hidden) return; // bar owns Enter/Esc
    var map = { '1': 'Engaged 1', '2': 'Engaged 2', '3': 'Engaged 3', 'b': 'Booked', 'a': 'Archive', 'n': 'No Reply', 'c': 'Closed' };
    var k = e.key.toLowerCase();
    if (map[k] && state.armed) { e.preventDefault(); stageAction(map[k]); }
    else if (k === 'f' && state.armed) { e.preventDefault(); logAction(); }
    else if (e.key === 'Escape') { resetAction(); }
  });

  var hiddenAt = null;
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) { hiddenAt = Date.now(); return; }
    if (hiddenAt && Date.now() - hiddenAt > 5 * 60 * 1000 && !$('app').hidden) runBootstrap(true);
    hiddenAt = null;
  });

}

/* ---------- init ---------- */
function start() {
  var qp = new URLSearchParams(location.search);
  state.deepLead = qp.get('lead') || '';
  state.deepSay = qp.get('say') || '';
  runBootstrap(true);
}
/* ---------- screenshot -> leads (vision) ---------- */
var scanLeads = [];
function fileToB64(file) {
  return new Promise(function (resolve, reject) {
    var r = new FileReader();
    r.onload = function () { var s = String(r.result); resolve({ b64: s.slice(s.indexOf(',') + 1), type: file.type || 'image/jpeg' }); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function openScanModal() { $('scanModal').classList.add('on'); }
function closeScanModal() { $('scanModal').classList.remove('on'); scanLeads = []; }
function scanThinking() {
  openScanModal();
  $('scanTitle').textContent = 'Reading screenshot…';
  $('scanAdd').disabled = true;
  $('scanBody').innerHTML = '<div class="thinking">Claude is reading the image…</div>';
}
async function handleImage(file) {
  if (!file || file.type.indexOf('image/') !== 0) return;
  if (file.size > 7 * 1024 * 1024) { toast({ type: 'err', html: 'Image too big (max 7 MB).' }); return; }
  scanThinking();
  try {
    var img = await fileToB64(file);
    var res = await core.visionScan(img.b64, img.type);
    var leads = (res.leads || []).filter(function (l) { return (l.handle || l.name || '').trim(); });
    if (!leads.length) { $('scanBody').innerHTML = '<div class="thinking">No leads found in that image.</div>'; $('scanTitle').textContent = 'Leads from screenshot'; return; }
    renderScan(leads);
  } catch (e) {
    $('scanBody').innerHTML = '<div class="thinking">Couldn\'t read that: ' + esc(e.message) + '</div>';
    $('scanTitle').textContent = 'Leads from screenshot';
  }
}
function opts(list, sel, blank) {
  return (blank ? '<option value="">' + blank + '</option>' : '') +
    list.map(function (o) { return '<option' + (o === sel ? ' selected' : '') + '>' + esc(o) + '</option>'; }).join('');
}
function renderScan(leads) {
  scanLeads = leads;
  $('scanTitle').textContent = leads.length + ' lead' + (leads.length === 1 ? '' : 's') + ' found';
  $('scanAdd').disabled = false;
  $('scanBody').innerHTML = leads.map(function (l, i) {
    var handle = CRMParse.normalizeHandle(l.handle) || (l.name || '').trim();
    l._suggested = { handle: handle, stage: l.stage || 'Engaged 1', status: canonIn(state.statuses, l.status) || l.status || '', temp: l.temp || '', notes: l.notes || '' };
    var exists = state.byHandle.get(CRMParse.normalizeHandle(handle));
    return '<div class="sc-card" data-i="' + i + '">' +
      '<div class="lc-top"><input class="lc-h" data-f="handle" value="' + esc(handle) + '" placeholder="handle">' +
        '<button class="lc-x" data-rm="' + i + '" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div>' +
      '<div class="lc-grid">' +
        '<select data-f="stage">' + opts(['Engaged 1','Engaged 2','Engaged 3','Booked','No Reply'], l.stage || 'Engaged 1') + '</select>' +
        '<select data-f="temp">' + opts(['Hot Lead','Warm Lead','Cold Lead'], l.temp, 'Temp —') + '</select>' +
        '<select data-f="status">' + opts(state.statuses, canonIn(state.statuses, l.status) || l.status, 'Status —') + '</select>' +
        '</div>' +
      '<input class="lc-note" data-f="notes" value="' + esc(l.notes || '') + '" placeholder="note">' +
      (l.confidence && l.confidence !== 'high' ? '<div class="exists">low confidence — double-check this one</div>' : '') +
      (exists ? '<div class="exists">already a lead — this updates @' + esc(exists.h) + '</div>' : '') +
      '</div>';
  }).join('');
  Array.prototype.forEach.call($('scanBody').querySelectorAll('[data-rm]'), function (b) {
    b.onclick = function () {
      var card = b.closest('.sc-card'); card.remove();
      if (!$('scanBody').querySelector('.sc-card')) closeScanModal();
    };
  });
}
async function addScanned() {
  var cards = [].slice.call($('scanBody').querySelectorAll('.sc-card'));
  if (!cards.length) return;
  $('scanAdd').disabled = true; $('scanAdd').textContent = 'Adding…';
  var added = 0, updated = 0, failed = 0;
  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    var g = function (f) { var el = card.querySelector('[data-f="' + f + '"]'); return el ? el.value.trim() : ''; };
    var handle = CRMParse.normalizeHandle(g('handle'));
    if (!handle) { failed++; continue; }
    try {
      var res = await api('setterUpdate', { handle: handle, stage: g('stage'), status: g('status'), temp: g('temp'), note: g('notes') });
      if (res.mode === 'created') added++; else updated++;
      var orig = scanLeads[+card.getAttribute('data-i')];
      if (orig && orig._suggested) {
        core.logAiFeedback('vision', handle, orig._suggested,
          { handle: handle, stage: g('stage'), status: g('status'), temp: g('temp'), notes: g('notes') });
      }
      applyWriteLocally(res, { handle: handle, stage: g('stage'), status: g('status'), temp: g('temp'), note: g('notes') });
      pushRecentFromScan(res, handle, g('stage'));
    } catch (e) { failed++; }
  }
  $('scanAdd').disabled = false; $('scanAdd').textContent = 'Add leads';
  closeScanModal();
  var parts = [];
  if (added) parts.push(added + ' added');
  if (updated) parts.push(updated + ' updated');
  if (failed) parts.push(failed + ' failed');
  toast({ type: failed && !added && !updated ? 'err' : 'ok', html: 'Screenshot: ' + parts.join(', ') + '.', ttl: 7000 });
}
function pushRecentFromScan(res, handle, stage) {
  if (typeof addRecent === 'function') addRecent(res, { handle: handle, stage: stage });
}
function bindScan() {
  $('scanBtn').addEventListener('click', function () { $('scanFile').click(); });
  $('scanFile').addEventListener('change', function (e) { if (e.target.files[0]) handleImage(e.target.files[0]); e.target.value = ''; });
  $('scanClose').addEventListener('click', closeScanModal);
  $('scanCancel').addEventListener('click', closeScanModal);
  $('scanAdd').addEventListener('click', addScanned);
  $('scanModal').addEventListener('mousedown', function (e) { if (e.target === $('scanModal')) closeScanModal(); });
  // paste an image
  window.addEventListener('paste', function (e) {
    var items = (e.clipboardData && e.clipboardData.items) || [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].type && items[i].type.indexOf('image/') === 0) { e.preventDefault(); handleImage(items[i].getAsFile()); return; }
    }
  });
  // drag & drop
  var over = $('dropOver'), depth = 0;
  window.addEventListener('dragenter', function (e) { if (e.dataTransfer && [].indexOf.call(e.dataTransfer.types, 'Files') !== -1) { depth++; over.classList.add('on'); } });
  window.addEventListener('dragover', function (e) { if (over.classList.contains('on')) e.preventDefault(); });
  window.addEventListener('dragleave', function () { depth = Math.max(0, depth - 1); if (!depth) over.classList.remove('on'); });
  window.addEventListener('drop', function (e) {
    if (!over.classList.contains('on')) return;
    e.preventDefault(); depth = 0; over.classList.remove('on');
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) handleImage(f);
  });
}

function boot() {
  if (typeof window.CRMParse === 'undefined') {
    document.querySelector('.v2-main').insertAdjacentHTML('beforeend',
      '<section class="v2-card" style="padding:20px;color:#b4543e">parser.js failed to load — ' +
      'the page can’t run without it.</section>');
    return;
  }
  initVoice();
  bindEvents();
  bindScan();
  core.installPalette({ leads: function () { return state.unique; }, onLead: function (l) { pickLead(l); } });
  start();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
}
</script>
</body>
</html>
