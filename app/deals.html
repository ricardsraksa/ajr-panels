<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>Deals · AJR</title>
<style>
:root{--faint:#98917f}
.d-thead,.d-row{grid-template-columns:124px 88px 60px 74px 62px minmax(0,1fr)}
.d-row{cursor:pointer}
.d-min{min-width:600px}
.dname{font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
.d-cell{font-size:12.5px;color:#4d4a42;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-cell.dim{color:#8a8375}
.st-amber{color:#a8762a}
.st-red{color:#b4543e}
.st-green{color:#2a6a4d;font-weight:600}
.row-won{background:#f7faf7}
.d-mono{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6d675b}
.d-mono.today{color:#a8762a;font-weight:600}
.d-mono.late{color:#b4543e;font-weight:600}
.d-cash{font-family:'IBM Plex Mono',monospace;font-weight:600;color:#2a6a4d;text-align:right}
/* unlinked calendly booking */
.calstrip{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.calrow{display:flex;align-items:center;gap:11px;flex-wrap:wrap;padding:13px 16px;border:1px solid #e2d9f4;
  border-radius:12px;background:#f6f2fb;font-size:13px;color:#4d4a42}
.calrow .lab{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:#7c56c9}
.calrow .who{font-weight:700;color:#211f1b}
.calrow .sp{flex:1}
.calrow select{min-height:32px;padding:0 9px;border:1px solid #ddd8cd;border-radius:8px;background:#fff;font-size:12.5px;max-width:190px}
.calrow .lnk{min-height:32px;padding:0 13px;border-radius:8px;border:1px solid #d5c8ef;background:#fff;color:#7c56c9;font-weight:600;font-size:12.5px}
.calrow .lnk:hover{background:#f0eafb}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(33,31,27,.45);opacity:0;pointer-events:none;transition:opacity .18s;z-index:60}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(320px,100vw);background:#fdfcf9;
  border-left:1px solid #e6e2da;transform:translateX(100%);transition:transform .2s cubic-bezier(.2,.8,.2,1);
  z-index:70;display:flex;flex-direction:column}
.drawer.on{transform:none}
.dhead{padding:18px 20px 12px;border-bottom:1px solid #f0ede6;flex:none}
.dhead .lab{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:#98917f;display:block;margin-bottom:6px}
.dhead h2{font-size:16px;font-weight:700;display:inline-block;margin-right:8px}
.dbody{flex:1;overflow-y:auto;padding:16px 20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.fld{margin-bottom:13px}
.ctype{display:inline-flex;gap:2px;padding:2px;margin-top:6px;background:#f0ede6;border:1px solid #e6e2da;border-radius:9px}
.ctype button{min-height:32px;padding:5px 15px;border:none;background:none;border-radius:7px;cursor:pointer;
  font:600 12px 'Instrument Sans',system-ui,sans-serif;color:#6d675b}
.ctype button:hover{color:#211f1b}
.ctype button[aria-pressed="true"]{background:#fff;color:#211f1b;box-shadow:0 1px 2px rgba(33,31,27,.07)}
.fld label{display:flex;align-items:center;gap:6px;font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;
  text-transform:uppercase;color:#98917f;margin-bottom:5px}
.ai-box{border:1px dashed #ddd8cd;border-radius:12px;padding:13px;margin-bottom:16px}
.ai-box .lab{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:#98917f;display:block;margin-bottom:9px}
.ai-row{display:flex;gap:8px;align-items:center}
.ai-row input{flex:1}
.mic{width:32px;height:32px;flex:none;border-radius:50%;background:#2a6a4d;color:#fff;display:inline-flex;
  align-items:center;justify-content:center;font-size:10px}
.mic.on{background:#b4543e;animation:pul 1.3s ease infinite}
@keyframes pul{0%,100%{box-shadow:0 0 0 0 rgba(180,84,62,.4)}50%{box-shadow:0 0 0 9px rgba(180,84,62,0)}}
.cash-card{border:1px solid #c9dfd2;border-radius:12px;background:#eef5f0;padding:13px 15px;margin-bottom:14px}
.cash-card .lab{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:#2a6a4d;display:block;margin-bottom:7px}
.cash-card .row{display:flex;align-items:center;gap:10px}
.cash-card input{flex:1;font:600 16px 'IBM Plex Mono',monospace;background:transparent;border:none;color:#211f1b;padding:0}
.cash-card input:focus{outline:none}
.cash-warn{color:#4d4a42;font-size:12px;margin-top:8px}
.fu-nudge{display:flex;align-items:center;gap:6px;margin:-6px 0 13px;font-size:12px;color:#8a8375}
.fu-nudge button{min-height:26px;padding:0 9px;border-radius:8px;border:1px solid #ddd8cd;background:#fff;font-size:11.5px;color:#4d4a42}
.hist{margin-top:4px;border-top:1px solid #f0ede6;padding-top:13px}
.hist h3{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#98917f;margin-bottom:8px}
.hist ul{list-style:none}
.hist li{display:flex;gap:8px;padding:5px 0;font-size:12px;color:#4d4a42}
.hist .who{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6d675b;flex:none}
.hist .who.ai{color:#7c56c9}
.hist .what{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist .when{color:#98917f;font-size:11px;flex:none}
.dfoot{padding:13px 20px;border-top:1px solid #f0ede6;flex:none;display:flex;flex-direction:column;gap:8px}
.dfoot .v2-btn{width:100%}
.pick{padding:16px 20px}
.pick-list{display:flex;flex-direction:column;gap:6px;margin-top:10px;max-height:60vh;overflow-y:auto}
.pick-list button{text-align:left;padding:9px 12px;border:1px solid #e6e2da;border-radius:9px;background:#fff;font-size:13px}
.pick-list button:hover{background:#fdfcf9}
.pick-list .pn{font-weight:600}
.pick-list .ps{color:#8a8375;font-size:12px;margin-left:8px}

</style>
</head>
<body>
<main class="v2-main">
  <header class="v2-h">
    <h1>Deals</h1>
    <span class="sub" id="today"></span>
    <span class="sp"></span>
    <button class="v2-btn go" id="voiceLog">Log a call</button>
    <button class="v2-btn sm" id="refresh">Refresh</button>
    <span id="count" hidden></span>
  </header>

  <div class="calstrip" id="calstrip" hidden></div>

  <div class="v2-chips" id="filters">
    <button class="v2-chip on" data-f="open">Open<span class="n" id="n-open"></span></button>
    <button class="v2-chip" data-f="today">Today<span class="n" id="n-today"></span></button>
    <button class="v2-chip" data-f="closed">Closed<span class="n" id="n-closed"></span></button>
    <button class="v2-chip" data-f="all">All<span class="n" id="n-all"></span></button>
    <input class="v2-in" id="search" type="text" placeholder="Search deals…" style="flex:1;min-width:140px;max-width:240px;margin-left:auto">
  </div>

  <div class="v2-card" id="table"><div class="v2-empty" id="skel">Loading deals…</div></div>
</main>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Deal editor">
  <div class="dhead">
    <span class="lab">Selected deal</span>
    <h2 id="d-name">Deal</h2>
    <button class="v2-btn sm" id="d-close" style="float:right;min-height:24px;padding:0 8px">×</button>
    <div id="f-ff-wrap" hidden style="margin-top:4px"><a id="f-ff" target="_blank" rel="noopener" style="font-size:12.5px">View call transcript ↗</a></div>
  </div>

  <div class="pick" id="pick" hidden>
    <span class="v2-lab">Which deal did you talk to?</span>
    <input class="v2-in" id="pick-search" type="text" placeholder="Search…" style="margin-top:9px">
    <div class="pick-list" id="pick-list"></div>
  </div>

  <div class="dbody" id="dbody">
    <div class="ai-box">
      <span class="lab">Log the call</span>
      <div class="ai-row">
        <input class="v2-in" id="ai-in" type="text" placeholder="closed for 3k, follow up next tuesday">
        <button class="mic" id="ai-mic" hidden aria-label="Record">●</button>
      </div>
    </div>

    <div class="g2">
      <div class="fld"><label>Status<span class="v2-ai" id="tag-f-status" hidden>AI</span></label>
        <select class="v2-in" id="f-status">
          <option value="">— no change —</option>
          <option>Discovery Call</option><option>Closing call</option><option>Followup</option><option>Closed</option><option>No Close</option>
        </select>
      </div>
      <div class="fld"><label>Qualification</label>
        <select class="v2-in" id="f-qual"><option value="">—</option><option>Qualified 1</option><option>Qualified 2</option><option>Qualified 3</option><option>Unqualified</option></select>
      </div>
    </div>

    <div class="fld" id="f-reason-wrap" hidden><label>Why no close?<span class="v2-ai" id="tag-f-reason" hidden>AI</span></label>
      <input class="v2-in" id="f-reason" type="text" placeholder="price · timing · went with competitor"></div>

    <div class="g2">
      <div class="fld"><label>Meeting<span class="v2-ai" id="tag-f-meeting" hidden>AI</span></label>
        <input class="v2-in" id="f-meeting" type="date"></div>
      <div class="fld"><label>Time</label><input class="v2-in" id="f-mtime" type="time"></div>
    </div>

    <div class="fld"><label>Follow-up<span class="v2-ai" id="tag-f-followup" hidden>AI</span></label>
      <input class="v2-in" id="f-followup" type="date"></div>
    <div class="fu-nudge" id="fu-nudge" hidden>No follow-up set
      <button data-d="3">+3d</button><button data-d="7">+1w</button><button data-d="14">+2w</button></div>

    <div class="cash-card">
      <span class="lab">Cash collected<span class="v2-ai" id="tag-f-cash" hidden style="margin-left:6px">AI</span></span>
      <div class="row">
        <span style="font:600 16px 'IBM Plex Mono',monospace;color:#2a6a4d">$</span>
        <input id="f-cash" type="number" min="0" step="1" inputmode="numeric" placeholder="0">
      </div>
      <div class="cash-warn" id="cash-warn" hidden></div>
      <button class="v2-btn go sm" id="cash-confirm" hidden style="width:100%;margin-top:9px">Confirm amount</button>
    </div>

    <div class="g2">
      <div class="fld"><label>Phone</label><input class="v2-in" id="f-phone" type="tel"></div>
      <div class="fld"><label>Email</label><input class="v2-in" id="f-email" type="email" spellcheck="false"></div>
    </div>
    <div class="fld"><label>Call type</label>
      <div class="ctype" id="f-ctype" role="group">
        <button type="button" data-v="Sales" aria-pressed="true">Sales</button>
        <button type="button" data-v="Connection" aria-pressed="false">Connection</button>
      </div>
    </div>
    <div class="fld" id="about-wrap"><label>Call about</label>
      <input class="v2-in" id="f-service" type="text" placeholder="flows / campaigns / both / partnership"></div>

    <div class="fld"><label>Notes<span class="v2-ai" id="tag-f-notes" hidden>AI</span></label>
      <textarea class="v2-in mono" id="f-notes" style="font-size:12px"></textarea></div>

    <div class="hist" id="hist" hidden><h3>History</h3><ul id="hist-list"></ul></div>
  </div>

  <div class="dfoot" id="dfoot">
    <button class="v2-btn dark" id="d-save">Save changes</button>
    <button class="v2-btn" id="d-cancel">Close</button>
  </div>
</aside>


<script src="./parser.js"></script>
<script type="module">
import * as core from './crm-core.js?v=20260721j';
const session = await core.requireAuth();
if (session) {
await core.installChrome({ active: 'deals' });
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

const state = { deals: [], leads: [], serverDate: '', filter: 'open', q: '', editing: null, cashConfirmed: false, busy: false };

const toast = core.toast;
function setDot() { return; }

function daysUntil(dmy) {
  const d = CRMParse.parseDMY(dmy), ref = CRMParse.parseDMY(state.serverDate) || new Date();
  if (!d) return null;
  return Math.round((d - ref) / 864e5);
}
/** Sales or Connection. Only connection calls carry a 'Call about' — for a
 *  sales call it's noise, which is why the field hides with the toggle. */
function callType() {
  const on = document.querySelector('#f-ctype button[aria-pressed="true"]');
  return on ? on.dataset.v : 'Sales';
}
function setCallType(v) {
  const val = v === 'Connection' ? 'Connection' : 'Sales';
  document.querySelectorAll('#f-ctype button').forEach((b) =>
    b.setAttribute('aria-pressed', String(b.dataset.v === val)));
  document.getElementById('about-wrap').hidden = val !== 'Connection';
}

function displayName(d) {
  if (d.name && !/^#(N\/A|REF!)/.test(d.name)) return d.name;
  const h = CRMParse.normalizeHandle(d.link);
  return h ? '@' + h : (d.link || 'deal ' + d.row);
}
const isDone = (d) => d.status === 'Closed' || d.status === 'No Close';
function statusBadge(s) {
  if (!s) return '';
  const cls = s === 'Closed' ? 'st-green' : s === 'No Close' ? 'st-red'
    : (s === 'Closing call' || s === 'Discovery Call') ? 'st-amber' : '';
  const label = s === 'Closed' ? 'Closed ✓' : s === 'Discovery Call' ? 'Discovery' : s;
  return `<span class="d-cell ${cls}">${esc(label)}</span>`;
}
function dateCell(dmy, isFollowup) {
  if (!dmy) return '<span class="d-cell dim">—</span>';
  const n = daysUntil(dmy);
  if (n === 0) return '<span class="d-mono today">today</span>';
  if (isFollowup && n !== null && n < 0) return `<span class="d-mono late">${-n}d late</span>`;
  return `<span class="d-mono${n !== null && n < 0 ? ' dim' : ''}">${esc(dmy.slice(0, 5))}</span>`;
}

function sortDeals(list) {
  return list.slice().sort((a, b) => {
    const ad = isDone(a), bd = isDone(b);
    if (ad !== bd) return ad ? 1 : -1;
    const key = (x) => {
      const m = daysUntil(x.meeting), f = daysUntil(x.followup);
      const vals = [m, f].filter((v) => v !== null);
      return vals.length ? Math.min(...vals.map((v) => v < 0 ? 1e5 - v : v)) : 1e6;
    };
    return key(a) - key(b);
  });
}

function visibleDeals() {
  const q = state.q.toLowerCase().trim();
  let list = state.deals.filter((d) => {
    if (state.filter === 'open') return !isDone(d);
    if (state.filter === 'closed') return isDone(d);
    if (state.filter === 'today') return daysUntil(d.meeting) === 0 || daysUntil(d.followup) === 0;
    return true;
  });
  if (q) list = list.filter((d) => (displayName(d) + ' ' + d.link + ' ' + d.notes).toLowerCase().includes(q));
  return sortDeals(list);
}

function render() {
  $('n-open').textContent = state.deals.filter((d) => !isDone(d)).length;
  $('n-closed').textContent = state.deals.filter(isDone).length;
  $('n-today').textContent = state.deals.filter((d) => daysUntil(d.meeting) === 0 || daysUntil(d.followup) === 0).length;
  $('n-all').textContent = state.deals.length;
  $('count').textContent = state.deals.length + ' deals';
  const meetsToday = state.deals.filter((d) => daysUntil(d.meeting) === 0 && !isDone(d)).length;
  const fuOver = state.deals.filter((d) => { const n = daysUntil(d.followup); return n !== null && n < 0 && !isDone(d); }).length;
  const strip = $('today');
  const bits = [];
  if (meetsToday) bits.push('<span class="st-amber" style="font-weight:600">' + meetsToday + ' call' + (meetsToday === 1 ? '' : 's') + ' today</span>');
  if (fuOver) bits.push('<span class="st-red" style="font-weight:600">' + fuOver + ' follow-up' + (fuOver === 1 ? '' : 's') + ' overdue</span>');
  strip.innerHTML = bits.join('&nbsp;&nbsp;');
  const rows = visibleDeals();
  const t = $('table');
  const head = '<div class="v2-thead d-thead d-min"><span>Name</span><span>Status</span><span>Meeting</span>' +
    '<span>Follow-up</span><span style="text-align:right">Cash</span><span>Notes</span></div>';
  if (!rows.length) { t.innerHTML = '<div class="v2-scroll">' + head + '</div><div class="v2-empty">No deals here.</div>'; return; }
  t.innerHTML = '<div class="v2-scroll"><div class="d-min">' + head + rows.map((d) => `
    <div class="v2-row d-row${d.status === 'Closed' ? ' row-won' : ''}" data-id="${d.row}">
      <span class="dname">${esc(displayName(d))}${d.hasFF ? '<span title="Call transcript attached" style="color:#2a6a4d">◆</span>' : ''}</span>
      <span>${statusBadge(d.status)}</span>
      ${dateCell(d.meeting)}
      ${dateCell(d.followup, true)}
      <span class="d-cash">${d.cash !== '' && d.cash != null ? '$' + Number(d.cash).toLocaleString('en-US') : '<span class="d-cell dim">—</span>'}</span>
      <span class="d-cell dim" title="${esc(d.notes)}">${esc(core.notesOneLine ? core.notesOneLine(d.notes) : (d.notes || ''))}</span>
    </div>`).join('') + '</div></div>';
  Array.prototype.forEach.call(t.querySelectorAll('.d-row'), (r) => {
    r.onclick = () => openDrawer(+r.getAttribute('data-id'));
  });
}

/* ---------- drawer ---------- */
function dealById(id) { return state.deals.find((d) => d.row === id); }

const TAG = { 'f-status':'tag-f-status','f-meeting':'tag-f-meeting','f-followup':'tag-f-followup','f-cash':'tag-f-cash','f-notes':'tag-f-notes' };
function setTag(fid, on) { const t = document.getElementById(TAG[fid]); if (t) t.hidden = !on; }
function clearTags() { Object.values(TAG).forEach((id) => { const t = document.getElementById(id); if (t) t.hidden = true; }); }
function showEditor() { $('pick').hidden = true; $('dbody').hidden = false; $('dfoot').hidden = false; }
document.addEventListener('click', (e) => {
  const b = e.target.closest('#f-ctype button');
  if (b) setCallType(b.dataset.v);
});

function openDrawer(id) {
  const d = dealById(id); if (!d) return;
  showEditor(); clearTags();
  state.aiSnapshot = null;
  state.editing = id; state.cashConfirmed = false;
  $('d-name').textContent = displayName(d);
  $('f-status').value = ['Discovery Call','Closing call','Followup','Closed','No Close'].includes(d.status) ? d.status : '';
  $('f-meeting').value = core.dmyToIso(d.meeting) || '';
  $('f-followup').value = core.dmyToIso(d.followup) || '';
  $('f-cash').value = (d.cash === '' || d.cash == null) ? '' : d.cash;
  $('f-notes').value = d.notes || '';
  $('f-reason').value = d.noCloseReason || '';
  $('f-mtime').value = d.meetingTime || '';
  $('f-qual').value = ['Qualified 1','Qualified 2','Qualified 3','Unqualified'].includes(d.qual) ? d.qual : '';
  $('f-phone').value = d.phone || '';
  $('f-email').value = d.email || '';
  $('f-service').value = d.service || '';
  setCallType(d.callType || 'Sales');
  syncReasonRow();
  $('ai-in').value = '';
  $('cash-warn').hidden = true;
  $('cash-confirm').hidden = true;
  const ffWrap = $('f-ff-wrap');
  if (d.hasFF && d.fireflies_link) { ffWrap.hidden = false; $('f-ff').href = d.fireflies_link; }
  else ffWrap.hidden = true;
  $('scrim').classList.add('on'); $('drawer').classList.add('on');
  checkFuNudge();
  loadHist(d.row);
  setTimeout(() => $('ai-in').focus(), 60);
}
async function loadHist(id) {
  $('hist').hidden = true;
  try {
    const acts = await core.loadActivity('deals', id, 8);
    if (acts.length && state.editing === id) {
      $('hist-list').innerHTML = acts.map((a) => {
        const who = a.actor === 'ai:fireflies' ? 'AI (call)' : (a.actor || '').split('@')[0] || 'someone';
        const what = a.action === 'restore' ? 'undid a change' : 'set ' + Object.keys(a.next || {}).join(', ');
        return '<li><span class="who">' + esc(who) + '</span><span class="what">' + esc(what) + '</span><span class="when">' + esc(core.relTime(a.created_at)) + '</span></li>';
      }).join('');
      $('hist').hidden = false;
    }
  } catch (e) { /* best-effort */ }
}
function closeDrawer() {
  state.editing = null;
  $('scrim').classList.remove('on'); $('drawer').classList.remove('on');
}
function openVoiceLog() {
  state.editing = null;
  $('d-name').textContent = 'Log a call';
  $('pick').hidden = false; $('dbody').hidden = true; $('dfoot').hidden = true;
  $('pick-search').value = '';
  renderPickList('');
  $('scrim').classList.add('on'); $('drawer').classList.add('on');
  setTimeout(() => $('pick-search').focus(), 60);
}
function renderPickList(q) {
  q = (q || '').toLowerCase().trim();
  const rows = sortDeals(state.deals.filter((d) => !isDone(d)))
    .filter((d) => !q || (displayName(d) + ' ' + d.link).toLowerCase().includes(q));
  const ul = $('pick-list');
  if (!rows.length) { ul.innerHTML = '<li style="color:var(--faint);cursor:default">No open deals match.</li>'; return; }
  ul.innerHTML = rows.slice(0, 40).map((d) =>
    `<li data-id="${d.row}"><span class="pn">${esc(displayName(d))}</span><span class="ps">${esc(d.status || '')}</span></li>`).join('');
  Array.prototype.forEach.call(ul.querySelectorAll('li[data-id]'), (li) => {
    li.onclick = () => openDrawer(+li.getAttribute('data-id'));
  });
}

// AI box: sentence -> interpret -> fill the drawer fields (notes appended in-view)
let aiBusy = false;
async function runAI() {
  const text = $('ai-in').value.trim(); if (!text || aiBusy) return;
  const d = dealById(state.editing); if (!d) return;
  aiBusy = true; $('ai-in').disabled = true;
  try {
    const res = await core.interpret(text, 'closer', displayName(d));
    const cmd = CRMParse.intentToCommand(res.intent, { now: new Date(), leads: state.leads, closing: state.deals, statuses: core.STATUSES });
    const f = (cmd.closer && cmd.closer.fields) || {};
    if (f.status) { $('f-status').value = ['Discovery Call','Closing call','Followup','Closed','No Close'].includes(f.status) ? f.status : $('f-status').value; setTag('f-status', true); syncReasonRow(); }
    // clock time for the call, when stated ("booked follow up tuesday 3pm")
    if (res.intent && res.intent.meeting_time && /^\d{2}:\d{2}$/.test(res.intent.meeting_time)) {
      $('f-mtime').value = res.intent.meeting_time;
    }
    // no-close reason: the AI pulls it from whatever was said/typed (often a DM, not a call)
    if ($('f-status').value === 'No Close' && res.intent && res.intent.no_close_reason) {
      $('f-reason').value = res.intent.no_close_reason; setTag('f-reason', true);
    }
    if (f.meeting) { $('f-meeting').value = core.dmyToIso(f.meeting) || $('f-meeting').value; setTag('f-meeting', true); }
    if (f.followup) { $('f-followup').value = core.dmyToIso(f.followup) || $('f-followup').value; setTag('f-followup', true); }
    if (f.cash != null && f.cash !== '') { $('f-cash').value = f.cash; setTag('f-cash', true); }
    if (f.notes) { $('f-notes').value = $('f-notes').value ? $('f-notes').value + '\n' + f.notes : f.notes; setTag('f-notes', true); }
    const warns = (cmd.closer && cmd.closer.warnings) || [];
    toast({ type: 'ok', html: 'Claude filled the fields' + (warns.length ? ' · ' + esc(warns.join(' ')) : '') });
    $('ai-in').value = '';
    state.aiSnapshot = { status: $('f-status').value, meeting: $('f-meeting').value,
      followup: $('f-followup').value, cash: $('f-cash').value, notes: $('f-notes').value };
    checkCashWarn();
    checkFuNudge();
  } catch (e) {
    toast({ type: 'err', html: 'Couldn’t read that: ' + esc(e.message) });
  } finally { aiBusy = false; $('ai-in').disabled = false; }
}

function checkFuNudge() {
  const d = dealById(state.editing); if (!d) { $('fu-nudge').hidden = true; return; }
  const status = $('f-status').value;
  const open = status !== 'Closed' && status !== 'No Close';
  $('fu-nudge').hidden = !(open && !$('f-followup').value);
}
Array.prototype.forEach.call(document.querySelectorAll('#fu-nudge button'), (b) => {
  b.onclick = () => {
    const d = new Date(); d.setDate(d.getDate() + Number(b.getAttribute('data-d')));
    $('f-followup').value = d.toISOString().slice(0, 10);
    $('fu-nudge').hidden = true;
  };
});
function syncCashConfirm() {
  const d = dealById(state.editing);
  const cash = $('f-cash').value.trim();
  const changed = d && cash !== '' && Number(cash) !== (d.cash === '' || d.cash == null ? null : Number(d.cash));
  $('cash-confirm').hidden = !(changed && !state.cashConfirmed);
}
function checkCashWarn() {
  const d = dealById(state.editing); if (!d) return false;
  const cash = $('f-cash').value.trim();
  const changed = cash !== '' && Number(cash) !== (d.cash === '' || d.cash == null ? null : Number(d.cash));
  if (changed && !state.cashConfirmed) {
    $('cash-warn').hidden = false;
    $('cash-warn').textContent = 'Save $' + Number(cash).toLocaleString('en-US') + ' — ' + CRMParse.moneyToWords(Number(cash)) + '?';
    return true;
  }
  $('cash-warn').hidden = true;
  return false;
}

// the "why no close?" row only makes sense when the status is No Close
function syncReasonRow() {
  const show = $('f-status').value === 'No Close';
  $('f-reason-wrap').hidden = !show;
}
async function saveDrawer() {
  const d = dealById(state.editing); if (!d || state.busy) return;
  // cash gate: first Save with a changed cash just shows the words; second Save writes
  const cash = $('f-cash').value.trim();
  const cashChanged = cash !== '' && Number(cash) !== (d.cash === '' || d.cash == null ? null : Number(d.cash));
  if (cashChanged && !state.cashConfirmed) { checkCashWarn(); syncCashConfirm(); state.cashConfirmed = true; $('d-save').textContent = 'Confirm & save'; return; }

  const fields = {
    status: $('f-status').value || undefined,
    meeting: $('f-meeting').value || '',
    followup: $('f-followup').value || '',
    meeting_time: $('f-mtime').value || '',
    notes: $('f-notes').value,
    qualification: $('f-qual').value,
    phone: $('f-phone').value.trim(),
    email: $('f-email').value.trim(),
    service_type: $('f-service').value.trim(),
    call_type: callType(),
  };
  if (cash !== '') fields.cash = Number(cash); else fields.cash = '';
  // strip undefined status (no change)
  if (fields.status === undefined) delete fields.status;
  // no-close reason: store it when No Close, clear it when moving to any other explicit status
  if ($('f-status').value === 'No Close') fields.no_close_reason = $('f-reason').value.trim();
  else if ('status' in fields) fields.no_close_reason = '';

  state.busy = true; $('d-save').disabled = true;
  try {
    const res = await core.setDeal(d.row, fields, { cashConfirmed: true });
    if (state.aiSnapshot) {
      core.logAiFeedback('interpret', displayName(d), state.aiSnapshot,
        { status: $('f-status').value, meeting: $('f-meeting').value,
          followup: $('f-followup').value, cash: $('f-cash').value, notes: $('f-notes').value });
      state.aiSnapshot = null;
    }
    // reflect locally
    if ('status' in fields) d.status = fields.status || '';
    if ('no_close_reason' in fields) d.noCloseReason = fields.no_close_reason;
    d.qual = fields.qualification || '';
    d.phone = fields.phone; d.email = fields.email; d.service = fields.service_type;
    d.callType = fields.call_type;
    d.meeting = core.isoToDmy($('f-meeting').value);
    d.meetingTime = fields.meeting_time;
    d.followup = core.isoToDmy($('f-followup').value);
    d.cash = cash === '' ? '' : Number(cash);
    d.notes = fields.notes;
    render();
    closeDrawer();
    if (res.undo) { state.lastUndo = { res, d }; $('d-cancel').textContent = 'Undo last'; }
    toast({ type: 'ok', html: '<span class="mono">' + esc(displayName(d)) + '</span> saved.', ttl: 8000,
      action: res.undo ? { label: 'Undo', fn: () => undo(res, d) } : null });
  } catch (e) {
    toast({ type: 'err', html: 'Save failed: ' + esc(e.message), sticky: true });
  } finally {
    state.busy = false; $('d-save').disabled = false; $('d-save').textContent = 'Save changes'; state.cashConfirmed = false;
  }
}
async function undo(res, d) {
  try {
    await core.undoWrite(res.undo);
    const p = res.prev;
    if ('status' in p) d.status = p.status || '';
    if ('meeting' in p) d.meeting = core.isoToDmy(p.meeting);
    if ('followup' in p) d.followup = core.isoToDmy(p.followup);
    if ('cash' in p) d.cash = p.cash == null ? '' : p.cash;
    if ('notes' in p) d.notes = p.notes || '';
    render();
    toast({ type: 'ok', html: 'Undone — <span class="mono">' + esc(displayName(d)) + '</span> restored.' });
  } catch (e) { toast({ type: 'err', html: 'Undo failed: ' + esc(e.message), sticky: true }); }
}

/* ---------- voice ---------- */
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  $('ai-mic').hidden = false;
  let rec = null, listening = false;
  $('ai-mic').onclick = () => {
    if (listening) { try { rec.stop(); } catch (e) {} return; }
    rec = new SR(); rec.lang = 'en-US'; rec.interimResults = true;
    const base = $('ai-in').value ? $('ai-in').value.trim() + ' ' : '';
    rec.onresult = (ev) => { let t = ''; for (let i = 0; i < ev.results.length; i++) t += ev.results[i][0].transcript; $('ai-in').value = base + t.trim(); };
    rec.onend = () => { listening = false; $('ai-mic').classList.remove('on'); if ($('ai-in').value.trim()) runAI(); };
    rec.onerror = () => { listening = false; $('ai-mic').classList.remove('on'); };
    try { rec.start(); listening = true; $('ai-mic').classList.add('on'); } catch (e) {}
  };
}

/* ---------- unlinked Calendly bookings (ambiguous auto-attach fallback) ---------- */
const CAL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>';
function slotLabel(iso) {
  const d = new Date(iso);
  const day = new Intl.DateTimeFormat('en-GB', { timeZone: 'Europe/Riga', weekday: 'short', day: '2-digit', month: '2-digit' }).format(d);
  const t = new Intl.DateTimeFormat('en-GB', { timeZone: 'Europe/Riga', hour: '2-digit', minute: '2-digit', hour12: false }).format(d);
  return day + ' ' + t;
}
async function loadStrip() {
  const el = $('calstrip');
  try {
    const loose = await core.looseBookings();
    if (!loose || !loose.length) { el.hidden = true; el.innerHTML = ''; return; }
    const open = state.deals.filter((d) => d.status !== 'Closed' && d.status !== 'No Close');
    el.innerHTML = loose.map((b) => {
      const opts = open.map((d) => '<option value="' + d.row + '">' + esc(displayName(d)) + '</option>').join('');
      return '<div class="calrow" data-b="' + esc(b.id) + '">' +
        '<span class="lab">UNLINKED BOOKING</span>' +
        '<span class="who">' + esc(b.name || b.email || 'Booking') + '</span>' +
        '<span>· ' + esc(slotLabel(b.start_iso)) + (b.email ? ' · ' + esc(b.email) : '') + '</span>' +
        '<span class="sp"></span>' +
        '<select><option value="">Pick a deal ▾</option>' + opts + '</select>' +
        '<button class="lnk">Link</button></div>';
    }).join('');
    el.hidden = false;
  } catch (e) { el.hidden = true; }
}
$('calstrip').addEventListener('click', async (e) => {
  const btn = e.target.closest('.lnk'); if (!btn) return;
  const rowEl = btn.closest('.calrow');
  const dealRow = Number(rowEl.querySelector('select').value);
  if (!dealRow) { toast({ type: 'err', html: 'Pick a deal first.' }); return; }
  btn.disabled = true;
  try {
    const res = await core.linkBooking(rowEl.getAttribute('data-b'), dealRow);
    const d = dealById(dealRow);
    if (d) {
      d.meeting = res.meeting || d.meeting; d.meetingTime = res.time || d.meetingTime;
      if (res.phone) d.phone = res.phone;
      if (res.email) d.email = res.email;
    }
    render(); loadStrip();
    toast({ type: 'ok', html: 'Booking linked to <span class="mono">' + esc(res.name) + '</span>.', ttl: 8000,
      action: res.undo ? { label: 'Undo', fn: async () => { await core.undoWrite(res.undo); load(); } } : null });
  } catch (err) {
    btn.disabled = false;
    toast({ type: 'err', html: 'Link failed: ' + esc(err.message), sticky: true });
  }
});

/* ---------- boot ---------- */
async function load() {
  $('refresh').classList.add('spin');
  try {
    const d = await core.bootstrap();
    state.deals = d.deals; state.leads = d.leads; state.serverDate = d.serverDate;
    setDot(false); render(); loadStrip();
  } catch (e) {
    setDot(true);
    $('table').innerHTML = '<div class="empty">Couldn’t load: ' + esc(e.message) + '</div>';
  } finally { $('refresh').classList.remove('spin'); }
}

$('filters').onclick = (e) => {
  const b = e.target.closest('.v2-chip'); if (!b) return;
  state.filter = b.getAttribute('data-f');
  Array.prototype.forEach.call($('filters').querySelectorAll('.v2-chip'), (c) => c.classList.toggle('on', c === b));
  render();
};
$('search').oninput = (e) => { state.q = e.target.value; render(); };
$('refresh').onclick = load;
$('voiceLog').onclick = openVoiceLog;
$('pick-search').oninput = (e) => renderPickList(e.target.value);
$('scrim').onclick = closeDrawer;
$('d-close').onclick = closeDrawer;
$('d-cancel').onclick = () => {
  // once a save exists this session the button is a true undo; before that it just closes
  if (state.lastUndo) {
    const { res, d } = state.lastUndo;
    state.lastUndo = null; $('d-cancel').textContent = 'Close';
    undo(res, d);
    closeDrawer();
  } else closeDrawer();
};
$('d-save').onclick = saveDrawer;
['f-status','f-meeting','f-followup','f-notes'].forEach((id) => $(id).addEventListener('input', () => { setTag(id, false); state.cashConfirmed = false; $('d-save').textContent = 'Save changes'; checkFuNudge(); }));
$('f-status').addEventListener('change', syncReasonRow);
$('f-cash').addEventListener('input', () => { setTag('f-cash', false); state.cashConfirmed = false; $('d-save').textContent = 'Save changes'; checkCashWarn(); syncCashConfirm(); });
$('cash-confirm').onclick = () => { state.cashConfirmed = true; syncCashConfirm(); checkCashWarn(); toast({ html: 'Amount confirmed — hit Save changes.' }); };
$('ai-in').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); runAI(); } });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && state.editing) closeDrawer(); });

core.installPalette({ deals: () => state.deals, onDeal: (d) => openDrawer(d.row) });
initVoice();
load().then(() => {
  const dl = parseInt(new URLSearchParams(location.search).get('deal'), 10);
  if (dl) openDrawer(dl);
});
}
</script>
