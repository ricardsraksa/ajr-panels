<script type="module">
import * as core from './crm-core.js?v=20260723k';
const session = await core.requireAuth();
if (session) {
await core.installChrome({ active: 'worklist' });
var RULES = await core.worklistRules();
var $ = function (id) { return document.getElementById(id); };
var LS_DONE = 'ajr_worklist_done', LS_FILTERS = 'ajr_worklist_filters', LS_SNOOZE = 'ajr_worklist_snooze';
var LEVEL_COLORS = {
  'Engaged 1': '#a9a9b1', 'Engaged 2': '#c9c9cf', 'Engaged 3': '#e9e9ec',
  'Booked': '#8ee59a', 'No Close': '#d99a9a', 'Archive': '#6e6e78', 'No Reply': '#8a8a92', 'Closed': '#c9c9cf', '': '#6e6e78'
};

var state = {
  demo: false,
  leads: [], byHandle: new Map(), unique: [], dupCount: new Map(),
  serverDate: '', busy: false,
  rows: [],            // currently rendered queue leads, in order
  cursor: -1,          // keyboard cursor index into rows
  done: {},            // handle -> 'HH:MM' logged today
  sweepOpen: false
};

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
function newReqId() { return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function daysSince(dmy) {
  var d = CRMParse.parseDMY(dmy);
  var ref = CRMParse.parseDMY(state.serverDate) || new Date();
  if (!d) return null;
  return Math.round((ref - d) / 864e5);
}
function daysBadge(dmy) {
  var n = daysSince(dmy);
  if (n === null) return '<span class="v2-age late">never</span>';
  return '<span class="v2-age ' + core.ageClass(n, RULES) + '">' + (n <= 0 ? 'today' : n + 'd') + '</span>';
}

/* ---------- toasts (shared v2) ---------- */
var toast = core.toast;

/* ---------- snooze (hide a lead from the queue until a date) ---------- */
function snoozes() {
  try { return JSON.parse(localStorage.getItem(LS_SNOOZE) || '{}'); } catch (e) { return {}; }
}
function isSnoozed(h) {
  var until = snoozes()[h];
  return !!until && new Date(until) > new Date();
}
function snoozeLead(h, days) {
  var m = snoozes();
  var d = new Date(); d.setDate(d.getDate() + days);
  m[h] = d.toISOString();
  localStorage.setItem(LS_SNOOZE, JSON.stringify(m));
  renderQueue();
  toast({ html: '<span class="mono">@' + esc(h) + '</span> snoozed ' + days + 'd.', ttl: 5000,
    action: { label: 'Undo', fn: function () { delete m[h]; localStorage.setItem(LS_SNOOZE, JSON.stringify(m)); renderQueue(); } } });
}

/* ---------- done-today (survives reloads, resets each sheet day) ---------- */
function loadDone() {
  try {
    var d = JSON.parse(localStorage.getItem(LS_DONE) || '{}');
    state.done = (d.date === state.serverDate && d.done) ? d.done : {};
  } catch (e) { state.done = {}; }
  paintDoneChip();
}
function markDone(handle) {
  state.done[handle] = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  localStorage.setItem(LS_DONE, JSON.stringify({ date: state.serverDate, done: state.done }));
  paintDoneChip();
}
function unmarkDone(handle) {
  delete state.done[handle];
  localStorage.setItem(LS_DONE, JSON.stringify({ date: state.serverDate, done: state.done }));
  paintDoneChip();
}
function paintDoneChip() {
  var n = Object.keys(state.done).length;
  $('doneChip').hidden = n === 0;
  $('doneCount').textContent = String(n);
}

/* ---------- data layer: Supabase via crm-core ---------- */
function api(action, payload) {
  if (action === 'bootstrap') {
    return core.bootstrap().then(function (d) {
      setDot('ok');
      return { ok: true, serverDate: d.serverDate, leads: d.leads, statuses: [] };
    }).catch(function (e) { setDot('err'); throw e; });
  }
  if (action === 'setterUpdate') {
    return core.setterUpdate(payload).then(function (r) { setDot('ok'); return r; })
      .catch(function (e) { setDot('err'); throw e; });
  }
  throw new Error('unknown action ' + action);
}
function setDot() { /* v2 chrome has no status dot; errors show in the error card */ }

/* ---------- bootstrap ---------- */
function runBootstrap(firstLoad) {
  var btn = $('refreshBtn');
  btn.disabled = true; btn.classList.add('spinning');
  if (firstLoad) { $('skeleton').hidden = false; $('loadError').hidden = true; $('app').hidden = true; }
  api('bootstrap').then(function (data) {
    state.serverDate = data.serverDate || '';
    state.leads = data.leads || [];
    buildIndex();
    loadDone();
    $('skeleton').hidden = true; $('loadError').hidden = true; $('app').hidden = false;
    renderFilters();
    renderQueue();
    // start on the first row so the primary actions are one keystroke away
    if (state.cursor < 0 && state.rows.length) setCursor(0, true);
    renderSweep();
  }).catch(function (err) {
    if (firstLoad || $('app').hidden) {
      $('skeleton').hidden = true; $('loadError').hidden = false;
      $('loadErrorMsg').textContent = 'Couldn’t load leads: ' + err.message;
    } else {
      toast({ type: 'err', html: 'Refresh failed: ' + esc(err.message), sticky: true,
        action: { label: 'Retry', fn: function () { runBootstrap(false); } } });
    }
  }).finally(function () { btn.disabled = false; btn.classList.remove('spinning'); });
}
function buildIndex() {
  state.byHandle = new Map(); state.dupCount = new Map();
  state.leads.forEach(function (l) {
    state.byHandle.set(l.h, l);
    state.dupCount.set(l.h, (state.dupCount.get(l.h) || 0) + 1);
  });
  state.unique = [];
  var seen = new Set();
  state.leads.forEach(function (l) {
    if (!seen.has(l.h)) { seen.add(l.h); state.unique.push(state.byHandle.get(l.h)); }
  });
}

/* ---------- the queue: value first, staleness second ---------- */
// A No-Close lead (deal didn't close) auto-returns to the daily queue once it
// has cooled this many days — a built-in "circle back later". The No Close
// filter chip still force-shows all of them regardless of age.
var NOCLOSE_RESURFACE_DAYS = 30;
var LVL_W = { 'Engaged 3': 3, 'Engaged 2': 2, 'Engaged 1': 1, 'No Close': 0.5, 'No Reply': 0.5, '': 0.5 };
function leadScore(l) {
  var qualW = l.qual && !/^unqual/i.test(l.qual) ? 2 : 0;
  return (LVL_W[l.level] || 0) * 3 + qualW;
}
// dead tail: cold Engaged-1, no qualification, silent 60+ days -> sweep, not queue
function isSweepable(l) {
  var d = daysSince(l.lastContact);
  // never-contacted is a legitimate pre-outreach state now (the prospect
  // queue), not evidence of death — only real 60-day silence sweeps
  return l.level === 'Engaged 1' && !l.qual && d !== null && d > 60;
}
// Filters are chips now. 'engaged' is one chip covering Engaged 1-3 (that's how
// the setter thinks about the queue); the rest are opt-in buckets.
var FILTER_DEFS = [
  { id: 'engaged', label: 'Engaged 1–3', levels: ['Engaged 1', 'Engaged 2', 'Engaged 3'] },
  { id: 'No Close', label: 'No Close', levels: ['No Close'] },
  { id: 'No Reply', label: 'No Reply', levels: ['No Reply'] },
  { id: '', label: 'No level', levels: [''] }
];
var filterOn = new Set(['engaged']);

function activeFilters() {
  var f = {};
  FILTER_DEFS.forEach(function (d) {
    if (filterOn.has(d.id)) d.levels.forEach(function (lv) { f[lv] = true; });
  });
  // levels never shown in the queue still need a defined key so the No-Close
  // resurfacing branch can tell "off" from "unknown"
  if (!filterOn.has('No Close')) f['No Close'] = false;
  return f;
}
function countFor(d) {
  return state.unique.filter(function (l) {
    return d.levels.indexOf(l.level || '') !== -1 && !isSweepable(l) && !isSnoozed(l.h);
  }).length;
}
function renderFilters() {
  $('queueFilters').innerHTML = FILTER_DEFS.map(function (d) {
    return '<button class="v2-chip' + (filterOn.has(d.id) ? ' on' : '') + '" data-f="' + esc(d.id) + '">' +
      esc(d.label) + '<span class="n">' + countFor(d) + '</span></button>';
  }).join('');
}
function saveFilters() { localStorage.setItem(LS_FILTERS, JSON.stringify(Array.from(filterOn))); }
function restoreFilters() {
  try {
    var on = JSON.parse(localStorage.getItem(LS_FILTERS) || 'null');
    if (on && on.length) filterOn = new Set(on);
  } catch (e) { /* defaults stand */ }
}

function queueLeads() {
  var f = activeFilters();
  var rows = state.unique.filter(function (l) {
    // added-but-never-DMd prospects live in the Uncontacted queue, not here —
    // this list is who to FOLLOW UP, and there's nothing to follow up yet
    if (l.prospected && !l.lastContact) return false;
    // No-Close leads: show on demand (filter chip) OR auto-resurface once cooled
    if (l.level === 'No Close') {
      if (f['No Close']) return true;
      var days = daysSince(l.lastContact);
      return days !== null && days >= NOCLOSE_RESURFACE_DAYS;
    }
    return f[l.level] !== undefined ? f[l.level] : false;
  }).filter(function (l) { return !isSweepable(l) && !isSnoozed(l.h); });
  rows.sort(function (a, b) {
    var s = leadScore(b) - leadScore(a);
    if (s) return s;
    var da = daysSince(a.lastContact), db = daysSince(b.lastContact);
    return (db === null ? -1 : db) - (da === null ? -1 : da); // within a tier: oldest first
  });
  // done-today rows sink to the bottom, keep their order
  var open = rows.filter(function (l) { return !state.done[l.h]; });
  var done = rows.filter(function (l) { return state.done[l.h]; });
  return open.concat(done);
}

function rowHtml(l, i, sweep) {
  var done = state.done[l.h];
  var focused = (i === state.cursor && !sweep);
  var dups = state.dupCount.get(l.h) || 1;
  var note = [l.status, l.notes].filter(Boolean).join(' · ');
  var acts;
  if (done) {
    acts = '<span class="q-done-at">✓ logged ' + esc(done) + '</span>' +
           '<button class="v2-btn sm" data-undone="' + esc(l.h) + '">Undo</button>';
  } else if (sweep) {
    acts = '<button class="v2-btn sm" data-arch="' + esc(l.h) + '">Archive</button>';
  } else if (focused) {
    acts = '<button class="v2-btn go sm" data-log="' + esc(l.h) + '">Log follow-up</button>' +
           '<button class="v2-btn sm" data-snz="' + esc(l.h) + '">Snooze 7d</button>';
  } else {
    acts = '<button class="v2-btn goline sm" data-log="' + esc(l.h) + '">Log</button>';
  }
  return '<div class="v2-row q-row' + (done ? ' done' : '') + (focused ? ' cursor' : '') + '" data-h="' + esc(l.h) + '">' +
    '<a class="q-handle" href="' + esc(l.url || ('https://instagram.com/' + l.h)) + '" target="_blank" rel="noopener">@' + esc(l.h) + '</a>' +
    '<span class="q-stage">' + esc(l.level || 'no level') + '</span>' +
    daysBadge(l.lastContact) +
    '<span class="q-note" title="' + esc(note) + '">' +
      (l.qual ? '<span class="v2-ai" style="color:#6d675b;border-color:#ddd8cd">' + esc(l.qual) + '</span>' : '') +
      '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(note) + '</span>' +
      (dups > 1 ? '<span class="dot">·</span><span style="color:#98917f;white-space:nowrap">' + dups + ' rows</span>' : '') +
    '</span>' +
    '<span class="q-acts">' + acts + '</span>' +
  '</div>';
}

function renderQueue() {
  state.rows = queueLeads();
  if (state.cursor >= state.rows.length) state.cursor = state.rows.length - 1;
  var el = $('queueList');
  var waiting = state.rows.filter(function (l) { return !state.done[l.h]; }).length;
  $('qTotal').textContent = String(waiting);
  core.setChromeBadge('worklist', waiting); // keep the sidebar honest
  if (!state.rows.length) { el.innerHTML = '<div class="v2-empty">All caught up.</div>'; return; }
  el.innerHTML = state.rows.slice(0, 120).map(function (l, i) { return rowHtml(l, i, false); }).join('') +
    (state.rows.length > 120 ? '<div class="v2-empty">…and ' + (state.rows.length - 120) + ' more</div>' : '');
}

/* ---------- sweep (dead-lead review) ---------- */
function sweepLeads() {
  return state.unique.filter(isSweepable).sort(function (a, b) {
    return (daysSince(b.lastContact) || 1e6) - (daysSince(a.lastContact) || 1e6);
  });
}
function renderSweep() {
  var rows = sweepLeads();
  $('sweepCard').hidden = rows.length === 0;
  $('sweepCount').textContent = String(rows.length);
  var list = $('sweepList');
  $('sweepListCard').hidden = !state.sweepOpen || rows.length === 0;
  $('sweepToggle').textContent = state.sweepOpen ? 'Hide' : 'Review & archive';
  if (state.sweepOpen) {
    list.innerHTML = rows.slice(0, 40).map(function (l) { return rowHtml(l, -1, true); }).join('') +
      (rows.length > 40 ? '<div class="v2-empty">…and ' + (rows.length - 40) + ' more (archive some to see the rest)</div>' : '');
  } else {
    list.innerHTML = '';
  }
}

/* ---------- writes ---------- */
function logFu(handle) {
  if (state.busy) return;
  var lead = state.byHandle.get(handle);
  if (!lead || state.done[handle]) return;
  state.busy = true;
  // optimistic: mark done now, roll back on failure
  markDone(handle);
  advanceCursor();
  renderQueue();
  api('setterUpdate', { handle: handle, status: 'Follow up Sent' }).then(function (res) {
    lead.lastContact = state.serverDate;
    lead.status = 'Follow up Sent';
    toast({ type: 'ok', html: '<span class="mono">@' + esc(handle) + '</span> — follow-up logged.', ttl: 4000,
      action: res.prev ? { label: 'Undo', fn: function () { undoWrite(res, handle); } } : null });
  }).catch(function (err) {
    unmarkDone(handle);
    renderQueue();
    toast({ type: 'err', html: 'Write failed for <span class="mono">@' + esc(handle) + '</span>: ' + esc(err.message), sticky: true,
      action: { label: 'Retry', fn: function () { logFu(handle); } } });
  }).finally(function () { state.busy = false; });
}
function archiveLead(handle) {
  if (state.busy) return;
  var lead = state.byHandle.get(handle);
  if (!lead) return;
  state.busy = true;
  api('setterUpdate', { handle: handle, stage: 'Archive' }).then(function (res) {
    lead.level = 'Archive';
    lead.lastContact = state.serverDate;
    renderFilters(); renderQueue(); renderSweep();
    toast({ type: 'ok', html: '<span class="mono">@' + esc(handle) + '</span> archived.', ttl: 5000,
      action: res.prev ? { label: 'Undo', fn: function () { undoWrite(res, handle); } } : null });
  }).catch(function (err) {
    toast({ type: 'err', html: 'Archive failed: ' + esc(err.message), sticky: true });
  }).finally(function () { state.busy = false; });
}
function undoWrite(res, handle) {
  core.undoWrite(res.undo).then(function () {
    var l = state.byHandle.get(handle);
    if (l) { l.level = res.prev.level; l.status = res.prev.last_status;
      l.lastContact = core.isoToDmy(res.prev.last_contact); }
    unmarkDone(handle);
    renderFilters(); renderQueue(); renderSweep();
    toast({ type: 'ok', html: 'Undone — <span class="mono">@' + esc(handle) + '</span> restored.' });
  }).catch(function (err) { toast({ type: 'err', html: 'Undo failed: ' + esc(err.message), sticky: true }); });
}

/* ---------- keyboard grinding ---------- */
function setCursor(i, noScroll) {
  state.cursor = Math.max(0, Math.min(i, Math.min(state.rows.length, 120) - 1));
  renderQueue();
  if (noScroll) return;
  var row = document.querySelector('#queueList .q-row.cursor');
  if (row) row.scrollIntoView({ block: 'nearest' });
}
function advanceCursor() {
  // next not-done row after the current one
  for (var i = state.cursor + 1; i < state.rows.length; i++) {
    if (!state.done[state.rows[i].h]) { state.cursor = i; return; }
  }
}
function cursorLead() {
  return state.cursor >= 0 && state.cursor < state.rows.length ? state.rows[state.cursor] : null;
}

/* ---------- events ---------- */
function bindEvents() {
  $('queueList').addEventListener('click', function (e) {
    var t;
    if ((t = e.target.closest('[data-snz]'))) snoozeLead(t.getAttribute('data-snz'), 7);
    else if ((t = e.target.closest('[data-log]'))) logFu(t.getAttribute('data-log'));
    else if ((t = e.target.closest('[data-undone]'))) {
      // local un-mark only (sheet write already happened; use toast Undo to revert the sheet)
      unmarkDone(t.getAttribute('data-undone'));
      renderQueue();
    }
    else if ((t = e.target.closest('[data-open]'))) location.href = 'log-lead.html?lead=' + encodeURIComponent(t.getAttribute('data-open'));
    else if ((t = e.target.closest('.q-row'))) {
      var h = t.getAttribute('data-h');
      state.rows.forEach(function (l, i) { if (l.h === h) setCursor(i); });
    }
  });
  $('sweepList').addEventListener('click', function (e) {
    var t;
    if ((t = e.target.closest('[data-arch]'))) archiveLead(t.getAttribute('data-arch'));
    else if ((t = e.target.closest('[data-open]'))) location.href = 'log-lead.html?lead=' + encodeURIComponent(t.getAttribute('data-open'));
  });
  $('sweepToggle').addEventListener('click', function () { state.sweepOpen = !state.sweepOpen; renderSweep(); });
  $('queueFilters').addEventListener('click', function (e) {
    var b = e.target.closest('[data-f]'); if (!b) return;
    var id = b.getAttribute('data-f');
    if (filterOn.has(id)) filterOn.delete(id); else filterOn.add(id);
    saveFilters(); state.cursor = -1; renderFilters(); renderQueue();
  });
  $('refreshBtn').addEventListener('click', function () { runBootstrap(false); });
  $('loadRetry').addEventListener('click', function () { runBootstrap(true); });

  core.pageListen(document, 'keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT')) return;
    if ($('app').hidden) return;
    var k = e.key;
    if (k === 'ArrowDown' || k === 'j') { e.preventDefault(); setCursor(state.cursor + 1); }
    else if (k === 'ArrowUp' || k === 'k') { e.preventDefault(); setCursor(state.cursor - 1); }
    else if (k.toLowerCase() === 'l') {
      var l = cursorLead();
      if (l && !state.done[l.h]) { e.preventDefault(); logFu(l.h); }
    }
    else if (k.toLowerCase() === 's') {
      var ls = cursorLead();
      if (ls && !state.done[ls.h]) { e.preventDefault(); snoozeLead(ls.h, 7); }
    }
    else if (k.toLowerCase() === 'o') {
      var l2 = cursorLead();
      if (l2 && l2.url) { e.preventDefault(); window.open(l2.url, '_blank', 'noopener'); }
    }
    else if (k === 'Enter') {
      var l3 = cursorLead();
      if (l3) { e.preventDefault(); location.href = 'log-lead.html?lead=' + encodeURIComponent(l3.h); }
    }
  });

  var hiddenAt = null;
  core.pageListen(document, 'visibilitychange', function () {
    if (document.hidden) { hiddenAt = Date.now(); return; }
    if (hiddenAt && Date.now() - hiddenAt > 5 * 60 * 1000 && !$('app').hidden) runBootstrap(false);
    hiddenAt = null;
  });
}

/* ---------- init ---------- */
function start() { runBootstrap(true); }
function boot() {
  if (typeof window.CRMParse === 'undefined') {
    document.querySelector('.v2-main').insertAdjacentHTML('beforeend',
      '<section class="v2-card" style="padding:20px;color:#b4543e">parser.js failed to load — keep it next to worklist.html.</section>');
    return;
  }
  restoreFilters();
  bindEvents();
  core.installPalette({ leads: function () { return state.unique; } });
  start();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
}
</script>
</body>
</html>
