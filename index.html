<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>AJR CRM</title>
<!-- The app lives in /app/. This exists so the short URL — the one people
     actually bookmark — opens it instead of GitHub's 404 page. -->
<link rel="canonical" href="./app/index.html">
<meta http-equiv="refresh" content="0; url=./app/index.html">
<style>
html{background:#f9f8f5}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  font:13px 'Instrument Sans',system-ui,sans-serif;color:#8a8375}
a{color:#2a6a4d}
</style>
<script>
// meta refresh drops the query string; a redirect that loses ?demo=1 is a
// worse bug than the 404 it replaces
location.replace('./app/index.html' + location.search + location.hash);
</script>
</head>
<body>
<p>Opening AJR CRM… <a href="./app/index.html">continue</a></p>
</body>
</html>
